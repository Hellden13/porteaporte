    <style>

        body {

            background: linear-gradient(135deg, #0A0C0F 0%, #0F1117 100%);

        .container {

        .header {

            gap: 2rem;

        .profile-card {
            background: #12151A;
            border: 1px solid #1F242C;
            border-radius: 12px;
            padding: 2rem;

        }

        .avatar {

            justify-content: center;

            font-size: 1.5rem;

        .profile-email {

            font-size: 0.9rem;

        .profile-stats {

            gap: 1rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #1F242C;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #B8F53E;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #9BA1A9;
            text-transform: uppercase;
            margin-top: 0.25rem;
        }

        .info-card {
            background: #12151A;
            border: 1px solid #1F242C;
            border-radius: 12px;
            padding: 2rem;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #B8F53E;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #1F242C;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #9BA1A9;
            font-size: 0.9rem;
        }

        .info-value {
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #1F242C;
        }

        .btn {
            flex: 1;
            padding: 0.9rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #B8F53E 0%, #0BFFCB 100%);
            color: #0A0C0F;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(184, 245, 62, 0.3);
        }

        .btn-danger {
            background: #EF4444;
            color: white;
        }

        .btn-danger:hover {
            background: #DC2626;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #9BA1A9;
        }

        @media (max-width: 768px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 1rem;
            }

            .btn-group {
                flex-direction: column;
            }
        }
    </style>
    <link rel="stylesheet" href="/assets/brand-uniform.css">
</head>

    <script>
        const SUPABASE_URL = 'https://miqrircrfpzkmvvacgwt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcXJpcmNyZnB6a212dmFjZ3d0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1ODk3MzAsImV4cCI6MjA5MjE2NTczMH0.LJ8m2Vo7U0bmLbdoN1BqBuYlJZWUQxnZCwLwAZvVIaM';
        
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadProfile() {
            try {
                const { data } = await db.auth.getSession();
                
                if (!data || !data.session) {
                    window.location.href = '/login.html';
                    return;
                }

                const userId = data.session.user.id;
                const userEmail = data.session.user.email;

                const { data: profile } = await db
                    .from('profiles')
                    .select('*')
                    .eq('id', userId)
                    .single();

                document.getElementById('loadingContainer').style.display = 'none';
                document.getElementById('profileContainer').style.display = 'grid';

                if (profile) {
                    document.getElementById('profileName').textContent = `${profile.prenom || ''} ${profile.nom || ''}`.trim() || 'Utilisateur';
                    document.getElementById('livraisons').textContent = profile.livraisons || 0;
                    document.getElementById('score').textContent = (profile.score || 0).toFixed(1);
                    document.getElementById('xp').textContent = profile.xp || 0;
                    document.getElementById('coins').textContent = `$${((profile.coins || 0) / 100).toFixed(2)}`;

                    document.getElementById('infoPrÃ©nom').textContent = profile.prenom || '-';
                    document.getElementById('infoNom').textContent = profile.nom || '-';
                    document.getElementById('infoTÃ©lÃ©phone').textContent = profile.telephone || '-';
                    document.getElementById('infoVille').textContent = profile.ville || '-';
                    document.getElementById('infoProvince').textContent = profile.province || '-';
                    document.getElementById('infoNiveau').textContent = profile.niveau || '-';
                    document.getElementById('infoStreak').textContent = profile.streak_semaines || 0;
                }
                
                document.getElementById('profileEmail').textContent = userEmail;
                document.getElementById('infoEmail').textContent = userEmail;

            } catch (error) {
                document.getElementById('loadingContainer').innerHTML = 'â Erreur: ' + error.message;
            }
        }

        async function logout() {
            if (confirm('Es-tu sÃ»r de vouloir te dÃ©connecter?')) {
                await db.auth.signOut();
                localStorage.removeItem('auth_token');
                window.location.href = '/index.html';
            }
        }

        window.addEventListener('load', loadProfile);
    </script>
