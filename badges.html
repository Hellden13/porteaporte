<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection de badges — PorteàPorte</title>
  <meta name="description" content="Découvre les 20+ badges à collectionner sur PorteàPorte. Chaque badge = XP + reconnaissance + bonus.">
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <style>
    body { padding: 0; margin: 0; background: #05080c; color: #fff; }
    .hero { padding: 60px 24px 40px; text-align: center; background: radial-gradient(ellipse at center top, rgba(184,245,62,.15) 0%, transparent 70%); border-bottom: 1px solid var(--brand-border); }
    .hero h1 { font-size: clamp(2rem, 6vw, 3.5rem); margin: 0 0 14px; }
    .hero h1 span { background: linear-gradient(135deg, #00d9ff, #b8f53e); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { color: var(--brand-muted); max-width: 720px; margin: 0 auto; font-size: 1.05rem; line-height: 1.7; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }

    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; justify-content: center; }
    .filter-btn { padding: 8px 16px; background: rgba(255,255,255,.04); border: 1px solid #1E2535; color: #a8b0ba; border-radius: 999px; cursor: pointer; font-weight: 700; font-size: .85rem; }
    .filter-btn.active { background: linear-gradient(135deg, #00d9ff, #b8f53e); color: #001828; border: none; }

    .my-stats { background: linear-gradient(135deg, rgba(184,245,62,.06), rgba(0,217,255,.05)); border: 1px solid rgba(184,245,62,.3); border-radius: 14px; padding: 20px; margin-bottom: 28px; display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; }
    .my-stats .stat { text-align: center; }
    .my-stats .val { font-size: 1.8rem; font-weight: 900; color: var(--brand-lime); }
    .my-stats .lbl { font-size: .78rem; color: var(--brand-muted); text-transform: uppercase; margin-top: 4px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .badge-card { background: var(--brand-bg-surface); border: 1px solid var(--brand-border); border-radius: 14px; padding: 20px; text-align: center; position: relative; transition: all .25s ease; }
    .badge-card:hover { transform: translateY(-3px); border-color: rgba(184,245,62,.4); }
    .badge-card.owned { background: linear-gradient(135deg, rgba(184,245,62,.08), rgba(0,217,255,.05)); border-color: rgba(184,245,62,.5); box-shadow: 0 0 30px rgba(184,245,62,.1); }
    .badge-card.owned::before { content: '✓'; position: absolute; top: 10px; right: 10px; width: 24px; height: 24px; background: var(--brand-lime); color: #071006; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; }
    .badge-card.locked { opacity: 0.5; filter: grayscale(0.5); }
    .badge-icon { font-size: 3rem; margin-bottom: 10px; line-height: 1; }
    .badge-card h3 { margin: 0 0 6px; font-size: 1.05rem; }
    .badge-card .desc { color: var(--brand-muted); font-size: .82rem; line-height: 1.5; min-height: 32px; }
    .badge-card .meta { display: flex; gap: 6px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
    .rarity { padding: 3px 10px; border-radius: 999px; font-size: .68rem; font-weight: 800; text-transform: uppercase; letter-spacing: .03em; }
    .rarity.common { background: rgba(168,176,186,.15); color: #a8b0ba; }
    .rarity.rare { background: rgba(0,217,255,.15); color: #7de4ff; }
    .rarity.epic { background: rgba(184,90,255,.15); color: #c99fff; }
    .rarity.legendary { background: rgba(255,200,0,.15); color: #ffd700; }
    .rarity.mythic { background: linear-gradient(135deg, rgba(255,90,90,.2), rgba(184,245,62,.2)); color: #ff6b9d; }
    .xp-pill { padding: 3px 10px; background: rgba(184,245,62,.12); color: var(--brand-lime); border-radius: 999px; font-size: .72rem; font-weight: 800; }

    .empty { text-align: center; color: var(--brand-muted); padding: 60px; }
  </style>
</head>
<body>
  <header style="position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:rgba(10,14,20,.95);border-bottom:1px solid var(--brand-border);backdrop-filter:blur(12px)">
    <a href="/" style="font-weight:900;color:var(--brand-lime);text-decoration:none;font-size:1.15rem">PorteàPorte</a>
    <nav style="display:flex;gap:10px;flex-wrap:wrap">
      <a class="btn secondary" href="/heros.html">Nos héros</a>
      <a class="btn" href="/login.html">Mon profil</a>
    </nav>
  </header>

  <section class="hero">
    <h1>🏆 Collection de <span>badges</span></h1>
    <p>Plus tu livres, plus tu t'engages — plus tu collectionnes ! Chaque badge = XP, reconnaissance et bonus financier.</p>
  </section>

  <main class="wrap">
    <div id="my-stats" class="my-stats" style="display:none">
      <div class="stat"><div class="val" id="ownedCount">0</div><div class="lbl">Mes badges</div></div>
      <div class="stat"><div class="val" id="totalAvail">0</div><div class="lbl">Disponibles</div></div>
      <div class="stat"><div class="val" id="xpFromBadges">0</div><div class="lbl">XP des badges</div></div>
      <div class="stat"><div class="val" id="completionPct">0%</div><div class="lbl">Complétion</div></div>
    </div>

    <div class="filters" id="filters"></div>
    <div id="badge-grid" class="grid"><p class="empty">Chargement...</p></div>
  </main>

  <script>
    let allBadges = [], myBadgeIds = new Set(), currentFilter = 'all';

    async function init() {
      const db = window.getSupabaseClient ? window.getSupabaseClient() : window.supabase;
      const { data } = await db.from('badges').select('*').order('category').order('rarity');
      allBadges = data || [];

      // Mes badges
      const { data: sess } = await db.auth.getSession();
      if (sess?.session) {
        const { data: mine } = await db.from('user_badges').select('badge_id').eq('user_id', sess.session.user.id);
        myBadgeIds = new Set((mine || []).map(b => b.badge_id));
        document.getElementById('my-stats').style.display = 'grid';
        document.getElementById('ownedCount').textContent = myBadgeIds.size;
        document.getElementById('totalAvail').textContent = allBadges.length;
        const xpOwned = allBadges.filter(b => myBadgeIds.has(b.id)).reduce((s,b) => s + (b.xp_reward||0), 0);
        document.getElementById('xpFromBadges').textContent = xpOwned;
        document.getElementById('completionPct').textContent = allBadges.length > 0 ? Math.round(myBadgeIds.size / allBadges.length * 100) + '%' : '0%';
      }

      // Filters
      const cats = ['all', ...new Set(allBadges.map(b => b.category))];
      document.getElementById('filters').innerHTML = cats.map(c =>
        `<button class="filter-btn ${c===currentFilter ? 'active' : ''}" onclick="setFilter('${c}')">${c === 'all' ? '🌟 Tous' : c}</button>`
      ).join('');
      render();
    }

    function setFilter(c) { currentFilter = c; init(); }

    function render() {
      const list = currentFilter === 'all' ? allBadges : allBadges.filter(b => b.category === currentFilter);
      const grid = document.getElementById('badge-grid');
      if (!list.length) { grid.innerHTML = '<p class="empty">Aucun badge dans cette catégorie</p>'; return; }
      grid.innerHTML = list.map(b => {
        const owned = myBadgeIds.has(b.id);
        return `
          <div class="badge-card ${owned ? 'owned' : 'locked'}">
            <div class="badge-icon">${b.icon || '🏆'}</div>
            <h3>${b.name}</h3>
            <div class="desc">${b.description || ''}</div>
            <div class="meta">
              <span class="rarity ${b.rarity || 'common'}">${b.rarity || 'common'}</span>
              ${b.xp_reward ? `<span class="xp-pill">+${b.xp_reward} XP</span>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    init();
  </script>

  <script src="/js/support-widget.js"></script>
  <script src="/js/pwa-install.js"></script>
</body>
</html>
