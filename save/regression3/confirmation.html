<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmation - PorteàPorte</title>
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <style>
    body{min-height:100vh;display:grid;place-items:center;padding:24px}
    .box{max-width:680px;background:var(--brand-bg-surface);border:1px solid var(--brand-border);border-radius:12px;padding:30px;text-align:center}
    .amount{font-size:2rem;font-weight:900;color:var(--brand-lime);margin:18px 0}
    .muted{line-height:1.6}
    .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:22px}
    .btn{display:inline-flex;width:auto;text-decoration:none}
  </style>
</head>
<body>
  <main class="box">
    <h1>Livraison créée</h1>
    <p class="muted">Ton paiement est protégé. Le livreur est payé seulement après confirmation de livraison.</p>
    <div id="amount" class="amount"></div>
    <p id="reference" class="muted"></p>
    <div class="actions">
      <a id="trackingLink" class="btn" href="/dashboard-expediteur.html">Voir le suivi</a>
      <a class="btn secondary" href="/dashboard-expediteur.html">Dashboard expéditeur</a>
      <a class="btn secondary" href="/index.html">Accueil</a>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const livraisonId = params.get('livraison_id');
    const montant = params.get('montant');
    const pi = params.get('pi');
    if (montant) {
      const raw = Number(montant);
      const dollars = Number.isInteger(raw) && raw >= 100 && !montant.includes('.') ? raw / 100 : raw;
      document.getElementById('amount').textContent = dollars.toFixed(2) + ' $';
    }
    if (livraisonId) {
      document.getElementById('trackingLink').href = '/suivi-livraison.html?id=' + encodeURIComponent(livraisonId);
      document.getElementById('reference').textContent = 'Référence livraison : ' + livraisonId + (pi ? ' | Paiement : ' + pi : '');
    }
  </script>
</body>
</html>
