<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte des missions - PorteàPorte</title>
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--brand-bg-dark);
      color: var(--brand-text);
      display: flex;
      flex-direction: column;
    }

    /* ---- Topbar ---- */
    .topbar {
      position: relative;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 20px;
      background: rgba(10,12,16,0.97);
      border-bottom: 1px solid var(--brand-border);
      flex-shrink: 0;
    }
    .brand { font-weight: 900; font-size: 19px; color: var(--brand-lime); text-decoration: none; letter-spacing: -0.5px; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .topbar-btn {
      padding: 7px 13px;
      border: 1px solid var(--brand-border);
      border-radius: 7px;
      background: transparent;
      color: var(--brand-muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .topbar-btn:hover { border-color: var(--brand-cyan); color: var(--brand-cyan); }
    .topbar-btn.active { border-color: var(--brand-lime); color: var(--brand-lime); background: rgba(0,255,159,0.06); }

    /* ---- Layout: map + side panel ---- */
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: 0;
    }

    /* ---- Side panel ---- */
    .side {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--brand-border);
      background: var(--brand-bg-surface);
      overflow: hidden;
    }
    .side-header {
      padding: 16px;
      border-bottom: 1px solid var(--brand-border);
      flex-shrink: 0;
    }
    .side-title { font-size: 0.95rem; font-weight: 800; margin-bottom: 10px; }
    .search-input {
      width: 100%;
      padding: 9px 12px;
      background: var(--brand-bg-dark);
      border: 1px solid var(--brand-border);
      border-radius: 8px;
      color: var(--brand-text);
      font-size: 13px;
      outline: none;
    }
    .search-input:focus { border-color: var(--brand-cyan); }

    .missions-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .missions-scroll::-webkit-scrollbar { width: 4px; }
    .missions-scroll::-webkit-scrollbar-track { background: transparent; }
    .missions-scroll::-webkit-scrollbar-thumb { background: var(--brand-border); border-radius: 2px; }

    .mission-item {
      padding: 12px;
      border: 1px solid var(--brand-border);
      border-radius: 9px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--brand-bg-dark);
    }
    .mission-item:hover { border-color: var(--brand-cyan); background: rgba(0,217,255,0.03); }
    .mission-item.selected { border-color: var(--brand-lime); background: rgba(0,255,159,0.04); }

    .mi-route { font-weight: 700; font-size: 0.88rem; }
    .mi-meta { color: var(--brand-muted); font-size: 0.76rem; margin-top: 3px; }
    .mi-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
    .mi-price { font-weight: 800; color: var(--brand-lime); font-size: 1rem; }
    .mi-pill {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(0,217,255,0.1);
      color: var(--brand-cyan);
      border: 1px solid rgba(0,217,255,0.25);
    }

    /* ---- Map container ---- */
    #map {
      flex: 1;
      z-index: 1;
    }
    .leaflet-container { background: #0a0c10; }

    /* ---- Detail panel (slide from right) ---- */
    .detail-panel {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 340px;
      background: var(--brand-bg-surface);
      border-left: 1px solid var(--brand-border);
      z-index: 500;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .detail-panel.open { transform: translateX(0); }
    .detail-header {
      padding: 16px;
      border-bottom: 1px solid var(--brand-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .detail-header h2 { font-size: 0.95rem; font-weight: 800; }
    .close-btn {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--brand-border);
      border-radius: 6px;
      background: transparent;
      color: var(--brand-muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }
    .close-btn:hover { border-color: var(--brand-cyan); color: var(--brand-cyan); }

    .detail-body { flex: 1; overflow-y: auto; padding: 16px; }

    .detail-field {
      margin-bottom: 14px;
      padding: 12px;
      background: var(--brand-bg-dark);
      border: 1px solid var(--brand-border);
      border-radius: 8px;
    }
    .detail-field label { display: block; color: var(--brand-muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .detail-field span { font-weight: 700; font-size: 0.9rem; }
    .detail-field.locked span { color: var(--brand-muted); font-style: italic; font-weight: 400; }
    .lock-icon { margin-right: 6px; }

    .detail-price {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--brand-lime);
      margin: 16px 0;
      text-align: center;
    }

    .accept-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--brand-lime), var(--brand-cyan));
      color: var(--brand-bg-dark);
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }
    .accept-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .accept-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .bio-note {
      text-align: center;
      color: var(--brand-muted);
      font-size: 0.76rem;
      margin-top: 8px;
    }

    /* ---- Map popup overrides ---- */
    .leaflet-popup-content-wrapper {
      background: var(--brand-bg-surface) !important;
      border: 1px solid var(--brand-border) !important;
      border-radius: 10px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
      color: var(--brand-text) !important;
    }
    .leaflet-popup-tip { background: var(--brand-bg-surface) !important; }
    .leaflet-popup-content { margin: 12px 14px !important; font-family: inherit; }

    /* ---- Biometric overlay ---- */
    .bio-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .bio-overlay.open { display: flex; }
    .bio-box {
      background: var(--brand-bg-surface);
      border: 1px solid var(--brand-border);
      border-radius: 16px;
      padding: 32px;
      max-width: 340px;
      width: 90%;
      text-align: center;
    }
    .bio-icon { font-size: 56px; margin-bottom: 12px; animation: pulse 1.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    .bio-box h2 { font-size: 1.1rem; font-weight: 800; margin-bottom: 8px; }
    .bio-box p { color: var(--brand-muted); font-size: 0.88rem; line-height: 1.6; margin-bottom: 22px; }
    .bio-actions { display: flex; gap: 10px; }
    .bio-confirm {
      flex: 1; padding: 12px; border: none; border-radius: 9px;
      background: linear-gradient(135deg, var(--brand-lime), var(--brand-cyan));
      color: var(--brand-bg-dark); font-weight: 800; font-size: 14px; cursor: pointer;
    }
    .bio-cancel {
      flex: 1; padding: 12px; border: 1px solid var(--brand-border); border-radius: 9px;
      background: transparent; color: var(--brand-muted); font-weight: 700; font-size: 14px; cursor: pointer;
    }
    .bio-cancel:hover { border-color: var(--brand-cyan); color: var(--brand-cyan); }

    /* ---- Filter pills ---- */
    .filter-row {
      display: flex;
      gap: 6px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--brand-border);
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .filter-pill {
      padding: 4px 10px;
      border: 1px solid var(--brand-border);
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--brand-muted);
      cursor: pointer;
      background: transparent;
      transition: all 0.15s;
    }
    .filter-pill:hover, .filter-pill.active { border-color: var(--brand-lime); color: var(--brand-lime); background: rgba(0,255,159,0.07); }

    /* ---- Empty / loading ---- */
    .side-loading { text-align: center; padding: 32px 16px; color: var(--brand-muted); font-size: 0.88rem; }

    /* ---- Map controls ---- */
    .map-wrap { position: relative; flex: 1; display: flex; flex-direction: column; }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .side { display: none; }
      .detail-panel { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Topbar -->
  <header class="topbar">
    <a class="brand" href="/index.html">PorteàPorte</a>
    <div class="topbar-right">
      <button class="topbar-btn active" id="btnMissions" onclick="setMode('missions')">Missions</button>
      <button class="topbar-btn" id="btnMyPos" onclick="centerOnMe()">Ma position</button>
      <a class="topbar-btn" href="/dashboard-livreur.html">Dashboard</a>
    </div>
  </header>

  <!-- Layout -->
  <div class="layout">

    <!-- Side panel: mission list -->
    <aside class="side">
      <div class="side-header">
        <div class="side-title">Missions sur la carte</div>
        <input class="search-input" type="search" id="searchInput" placeholder="Filtrer par ville..." oninput="filterMissions()">
      </div>
      <div class="filter-row">
        <button class="filter-pill active" data-filter="all" onclick="setFilter('all',this)">Toutes</button>
        <button class="filter-pill" data-filter="velo" onclick="setFilter('velo',this)">Vélo</button>
        <button class="filter-pill" data-filter="voiture" onclick="setFilter('voiture',this)">Voiture</button>
        <button class="filter-pill" data-filter="camion" onclick="setFilter('camion',this)">Camion</button>
      </div>
      <div class="missions-scroll" id="missionsList">
        <div class="side-loading">Chargement des missions…</div>
      </div>
    </aside>

    <!-- Map -->
    <div class="map-wrap">
      <div id="map"></div>

      <!-- Detail side panel -->
      <div class="detail-panel" id="detailPanel">
        <div class="detail-header">
          <h2 id="detailTitle">Détails de la mission</h2>
          <button class="close-btn" onclick="closeDetail()">✕</button>
        </div>
        <div class="detail-body" id="detailBody"></div>
      </div>
    </div>
  </div>

  <!-- Biometric overlay -->
  <div class="bio-overlay" id="bioOverlay">
    <div class="bio-box">
      <div class="bio-icon" id="bioIcon">👆</div>
      <h2>Confirmation biométrique</h2>
      <p>Utilise ton empreinte digitale ou Face ID pour déverrouiller les adresses complètes et accepter cette mission.</p>
      <div class="bio-actions">
        <button class="bio-cancel" onclick="closeBio()">Annuler</button>
        <button class="bio-confirm" onclick="confirmBio()">Confirmer</button>
      </div>
    </div>
  </div>

  <script>
    const db = window.db || window.getSupabaseClient();
    let map, session, markers = [], allMissions = [], filteredMissions = [];
    let activeFilter = 'all';
    let pendingMissionId = null;

    /* ============================
       MAP INIT
    ============================= */
    function initMap() {
      map = L.map('map', { zoomControl: true }).setView([46.8, -71.2], 9);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap · © CARTO',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);

      map.on('click', closeDetail);
    }

    /* ============================
       MARKERS
    ============================= */
    function clearMarkers() {
      markers.forEach(m => m.remove());
      markers = [];
    }

    function missionIcon(color) {
      return L.divIcon({
        className: '',
        html: `<div style="
          width:14px;height:14px;border-radius:50%;
          background:${color};
          border:2.5px solid #0A0C10;
          box-shadow:0 0 0 5px ${color}33;
        "></div>`,
        iconSize: [14, 14],
        iconAnchor: [7, 7]
      });
    }

    function addMarker(mission) {
      if (!mission._lat || !mission._lng) return;
      const color = mission._locked ? '#A8ACB1' : '#00FF9F';
      const marker = L.marker([mission._lat, mission._lng], { icon: missionIcon(color) });

      marker.bindPopup(`
        <div style="min-width:160px">
          <div style="font-weight:800;font-size:.88rem;margin-bottom:4px">${mission.ville_depart || '?'} → ${mission.ville_arrivee || '?'}</div>
          <div style="color:#A8ACB1;font-size:.76rem;margin-bottom:8px">${mission.type_colis || 'Colis'}${mission.poids_kg ? ' · ' + mission.poids_kg + ' kg' : ''}</div>
          <div style="font-weight:900;color:#00FF9F;font-size:1rem;margin-bottom:8px">${money(mission.prix_total)}</div>
          <button onclick="showDetail('${mission.id}')" style="width:100%;padding:7px;border:none;border-radius:6px;background:linear-gradient(135deg,#00FF9F,#00D9FF);color:#0A0C10;font-weight:800;font-size:12px;cursor:pointer">
            ${mission._locked ? '🔒 Déverrouiller' : 'Voir détails'}
          </button>
        </div>
      `);

      marker.on('click', () => showDetail(mission.id));
      marker.addTo(map);
      markers.push(marker);
    }

    /* ============================
       MISSIONS LOAD
    ============================= */
    async function loadMissions() {
      const { data } = await db
        .from('livraisons')
        .select('id,code,ville_depart,ville_arrivee,adresse_depart,adresse_arrivee,type_colis,poids_kg,prix_total,distance_km,statut,transport_requis,lat_depart,lng_depart,lat_arrivee,lng_arrivee')
        .in('statut', ['publie', 'paiement_autorise'])
        .is('livreur_id', null)
        .order('cree_le', { ascending: false })
        .limit(50);

      allMissions = (data || []).map((m, i) => ({
        ...m,
        _locked: !session, /* locked if not logged in */
        /* Use real coords if available, else mock from Québec area */
        _lat: m.lat_depart || (46.5 + Math.random() * 0.8),
        _lng: m.lng_depart || (-72.2 + Math.random() * 2.0)
      }));

      filteredMissions = [...allMissions];
      renderList();
      renderMarkers();
    }

    function filterMissions() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      filteredMissions = allMissions.filter(m => {
        const matchText = !q ||
          (m.ville_depart || '').toLowerCase().includes(q) ||
          (m.ville_arrivee || '').toLowerCase().includes(q) ||
          (m.type_colis || '').toLowerCase().includes(q);
        const matchFilter = activeFilter === 'all' || (m.transport_requis || '').toLowerCase().includes(activeFilter);
        return matchText && matchFilter;
      });
      renderList();
      renderMarkers();
    }

    function setFilter(f, el) {
      activeFilter = f;
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      filterMissions();
    }

    function renderList() {
      const el = document.getElementById('missionsList');
      if (!filteredMissions.length) {
        el.innerHTML = '<div class="side-loading">Aucune mission trouvée.</div>';
        return;
      }
      el.innerHTML = filteredMissions.map(m => `
        <div class="mission-item" id="item-${m.id}" onclick="showDetail('${m.id}')">
          <div class="mi-route">${m.ville_depart || '?'} → ${m.ville_arrivee || '?'}</div>
          <div class="mi-meta">${m.type_colis || 'Colis'}${m.poids_kg ? ' · ' + m.poids_kg + 'kg' : ''}${m.distance_km ? ' · ' + m.distance_km + ' km' : ''}</div>
          <div class="mi-bottom">
            <span class="mi-price">${money(m.prix_total)}</span>
            ${m.transport_requis ? `<span class="mi-pill">${m.transport_requis}</span>` : ''}
          </div>
        </div>
      `).join('');
    }

    function renderMarkers() {
      clearMarkers();
      filteredMissions.forEach(addMarker);
    }

    /* ============================
       DETAIL PANEL
    ============================= */
    function showDetail(id) {
      const m = allMissions.find(x => x.id === id);
      if (!m) return;

      /* Highlight list item */
      document.querySelectorAll('.mission-item').forEach(el => el.classList.remove('selected'));
      const item = document.getElementById('item-' + id);
      if (item) item.classList.add('selected');

      /* Center map */
      if (m._lat && m._lng) map.flyTo([m._lat, m._lng], 13, { duration: 0.8 });

      document.getElementById('detailTitle').textContent = (m.ville_depart || '?') + ' → ' + (m.ville_arrivee || '?');

      const locked = m._locked;
      document.getElementById('detailBody').innerHTML = `
        <div class="detail-field ${locked ? 'locked' : ''}">
          <label>Départ</label>
          <span>${locked ? '🔒 Adresse masquée' : (m.adresse_depart || m.ville_depart || 'Non précisé')}</span>
        </div>
        <div class="detail-field ${locked ? 'locked' : ''}">
          <label>Arrivée</label>
          <span>${locked ? '🔒 Adresse masquée' : (m.adresse_arrivee || m.ville_arrivee || 'Non précisé')}</span>
        </div>
        <div class="detail-field">
          <label>Type de colis</label>
          <span>${m.type_colis || 'Non précisé'}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="detail-field">
            <label>Poids</label>
            <span>${m.poids_kg ? m.poids_kg + ' kg' : 'N/A'}</span>
          </div>
          <div class="detail-field">
            <label>Distance</label>
            <span>${m.distance_km ? m.distance_km + ' km' : 'N/A'}</span>
          </div>
        </div>
        ${m.transport_requis ? `<div class="detail-field"><label>Transport requis</label><span>${m.transport_requis}</span></div>` : ''}
        <div class="detail-price">${money(m.prix_total)}</div>
        ${session
          ? `<button class="accept-btn" onclick="openBio('${m.id}')">
               ${locked ? '🔒 Déverrouiller & accepter' : 'Accepter cette mission'}
             </button>
             <p class="bio-note">Confirmation biométrique requise</p>`
          : `<a href="/login.html" style="display:block;width:100%;padding:14px;border:none;border-radius:9px;background:linear-gradient(135deg,#00FF9F,#00D9FF);color:#0A0C10;font-weight:800;font-size:15px;cursor:pointer;text-align:center;text-decoration:none">Se connecter pour accepter</a>`
        }
      `;

      document.getElementById('detailPanel').classList.add('open');
    }

    function closeDetail() {
      document.getElementById('detailPanel').classList.remove('open');
      document.querySelectorAll('.mission-item').forEach(el => el.classList.remove('selected'));
    }

    /* ============================
       BIOMETRIC
    ============================= */
    function openBio(id) {
      pendingMissionId = id;
      const hasWebAuthn = !!window.PublicKeyCredential;
      document.getElementById('bioIcon').textContent = hasWebAuthn ? '👆' : '🔒';
      document.getElementById('bioOverlay').classList.add('open');
    }

    function closeBio() {
      pendingMissionId = null;
      document.getElementById('bioOverlay').classList.remove('open');
    }

    async function confirmBio() {
      if (!pendingMissionId || !session) return;
      const btn = document.querySelector('.bio-confirm');
      btn.textContent = 'Vérification…';
      btn.disabled = true;

      try {
        if (window.PublicKeyCredential) {
          await navigator.credentials.get({
            publicKey: {
              challenge: crypto.getRandomValues(new Uint8Array(32)),
              timeout: 30000,
              userVerification: 'required',
              rpId: window.location.hostname
            }
          }).catch(() => null);
        }
        await acceptMission(pendingMissionId);
      } finally {
        btn.textContent = 'Confirmer';
        btn.disabled = false;
        closeBio();
      }
    }

    async function acceptMission(id) {
      const res = await fetch('/api/assign-driver', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
        body: JSON.stringify({ livraison_id: id })
      });
      const out = await res.json().catch(() => ({}));
      if (!res.ok) { alert(out.error || 'Impossible d\'accepter cette mission'); return; }

      /* Unlock the mission locally */
      const m = allMissions.find(x => x.id === id);
      if (m) m._locked = false;

      alert('Mission acceptée ! Les adresses complètes sont maintenant disponibles.');
      closeDetail();
      await loadMissions();
    }

    /* ============================
       GEOLOCATION
    ============================= */
    let myMarker = null;

    function centerOnMe() {
      if (!navigator.geolocation) { alert('Géolocalisation non disponible'); return; }
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude: lat, longitude: lng } = pos.coords;
        map.flyTo([lat, lng], 14, { duration: 1 });
        if (myMarker) myMarker.remove();
        myMarker = L.circleMarker([lat, lng], {
          radius: 10,
          fillColor: '#00D9FF',
          color: '#0A0C10',
          weight: 2,
          fillOpacity: 1
        }).bindPopup('<strong>Ta position</strong>').addTo(map);
      }, () => alert('Impossible d\'obtenir ta position.'));
    }

    function setMode(mode) {
      document.querySelectorAll('.topbar-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn' + mode.charAt(0).toUpperCase() + mode.slice(1))?.classList.add('active');
    }

    /* ============================
       UTILS
    ============================= */
    function money(v) {
      return Number(v || 0).toLocaleString('fr-CA', { style: 'currency', currency: 'CAD' });
    }

       INIT
    ============================= */
    async function init() {
      initMap();
      const { data } = await db.auth.getSession();
      session = data?.session || null;
      await loadMissions();
    }

    init();
  </script>
