<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - PorteàPorte</title>
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/modal-helper.js"></script>
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: var(--brand-bg-surface);
      border: 1px solid var(--brand-border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    }
    .brand-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand-header a {
      color: var(--brand-lime);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
      text-decoration: none;
    }
    .brand-header p {
      color: var(--brand-muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    /* --- Tabs --- */
    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      background: var(--brand-bg-dark);
      border: 1px solid var(--brand-border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      padding: 9px 6px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--brand-muted);
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab-btn.active {
      background: var(--brand-bg-surface);
      color: var(--brand-text);
      box-shadow: 0 1px 6px rgba(0,0,0,0.3);
    }

    /* --- Panels --- */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* --- Form elements --- */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      color: var(--brand-text);
      margin-bottom: 7px;
      font-weight: 600;
      font-size: 0.88rem;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px 14px;
      background: var(--brand-bg-dark);
      color: var(--brand-text);
      border: 1px solid var(--brand-border);
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
      outline: none;
    }
    .form-group input:focus { border-color: var(--brand-cyan); }
    .form-group .hint {
      color: var(--brand-muted);
      font-size: 0.78rem;
      margin-top: 5px;
    }

    /* Phone prefix+number row */
    .phone-row { display: grid; grid-template-columns: 90px 1fr; gap: 8px; }

    /* OTP boxes */
    .otp-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 20px 0;
    }
    .otp-box {
      width: 48px;
      height: 56px;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0;
      background: var(--brand-bg-dark);
      border: 1px solid var(--brand-border);
      border-radius: 8px;
      color: var(--brand-text);
      outline: none;
      transition: border-color 0.2s;
    }
    .otp-box:focus { border-color: var(--brand-cyan); }

    /* --- Buttons --- */
    .submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--brand-lime), var(--brand-cyan));
      color: var(--brand-bg-dark);
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }
    .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .ghost-btn {
      width: 100%;
      padding: 11px;
      background: transparent;
      color: var(--brand-muted);
      border: 1px solid var(--brand-border);
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .ghost-btn:hover { border-color: var(--brand-cyan); color: var(--brand-cyan); }

    /* OAuth buttons */
    .oauth-grid { display: flex; flex-direction: column; gap: 10px; }
    .oauth-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 13px 16px;
      background: var(--brand-bg-dark);
      color: var(--brand-text);
      border: 1px solid var(--brand-border);
      border-radius: 9px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .oauth-btn:hover { border-color: var(--brand-cyan); background: rgba(0,217,255,0.04); }
    .oauth-icon { width: 22px; height: 22px; flex-shrink: 0; }
    .oauth-separator {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--brand-muted);
      font-size: 0.8rem;
    }
    .oauth-separator::before, .oauth-separator::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--brand-border);
    }

    /* Status */
    .status-msg {
      display: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      margin-top: 12px;
      line-height: 1.5;
    }
    .status-msg.success { background: rgba(0,255,159,0.1); border: 1px solid rgba(0,255,159,0.3); color: var(--brand-lime); }
    .status-msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ffb4b4; }
    .status-msg.info { background: rgba(0,217,255,0.08); border: 1px solid rgba(0,217,255,0.25); color: var(--brand-cyan); }

    .signup-link {
      text-align: center;
      margin-top: 22px;
      color: var(--brand-muted);
      font-size: 0.88rem;
    }
    .signup-link a { color: var(--brand-cyan); text-decoration: none; font-weight: 700; }
    .back-link { text-align: center; margin-bottom: 18px; }
    .back-link a { color: var(--brand-muted); text-decoration: none; font-size: 0.88rem; }
    .back-link a:hover { color: var(--brand-text); }

    @media (max-width: 480px) {
      .login-card { padding: 28px 18px; }
      .tabs { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="back-link"><a href="/index.html">← Retour</a></div>

      <div class="brand-header">
        <a href="/index.html">PorteàPorte</a>
        <p>Connecte-toi pour continuer</p>
      </div>

      <!-- Tab switcher -->
      <div class="tabs" role="tablist">
        <button class="tab-btn active" role="tab" data-tab="email" onclick="switchTab('email')">Email</button>
        <button class="tab-btn" role="tab" data-tab="phone" onclick="switchTab('phone')">Téléphone</button>
        <button class="tab-btn" role="tab" data-tab="oauth" onclick="switchTab('oauth')">Social</button>
      </div>

      <!-- ===== TAB 1 : EMAIL ===== -->
      <div class="tab-panel active" id="panel-email">
        <form id="emailForm" onsubmit="handleEmail(event)">
          <div class="form-group">
            <label for="email">Adresse email</label>
            <input type="email" id="email" name="email" required placeholder="toi@exemple.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
          </div>
          <button type="submit" class="submit-btn" id="emailBtn">Se connecter</button>
        </form>
        <div class="status-msg" id="emailStatus"></div>
        <div class="oauth-separator">ou</div>
        <a class="ghost-btn" href="/signup.html">Pas encore inscrit ? Créer un compte</a>
      </div>

      <!-- ===== TAB 2 : TÉLÉPHONE OTP ===== -->
      <div class="tab-panel" id="panel-phone">
        <div id="phone-step-1">
          <form onsubmit="sendOtp(event)">
            <div class="form-group">
              <label>Numéro de téléphone</label>
              <div class="phone-row">
                <select id="dialCode">
                  <option value="+1">+1 (CA)</option>
                  <option value="+1-us">+1 (US)</option>
                  <option value="+33">+33 (FR)</option>
                  <option value="+32">+32 (BE)</option>
                  <option value="+41">+41 (CH)</option>
                </select>
                <input type="tel" id="phoneNumber" required placeholder="514 123 4567" autocomplete="tel">
              </div>
              <p class="hint">Un code à 6 chiffres sera envoyé par SMS.</p>
            </div>
            <button type="submit" class="submit-btn" id="sendOtpBtn">Envoyer le code</button>
          </form>
          <div class="status-msg" id="phoneStatus1"></div>
        </div>

        <div id="phone-step-2" style="display:none">
          <p style="color:var(--brand-muted);font-size:.9rem;margin-bottom:4px;text-align:center">Code envoyé au</p>
          <p id="phoneDisplay" style="color:var(--brand-text);font-weight:700;text-align:center;margin-bottom:20px"></p>

          <label style="display:block;color:var(--brand-muted);font-size:.85rem;text-align:center;margin-bottom:2px">Saisis les 6 chiffres</label>
          <div class="otp-row" id="otpBoxes">
            <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
          </div>
          <button class="submit-btn" id="verifyOtpBtn" onclick="verifyOtp()">Vérifier le code</button>
          <button class="ghost-btn" onclick="resetPhone()">Changer de numéro</button>
          <div class="status-msg" id="phoneStatus2"></div>
        </div>
      </div>

      <!-- ===== TAB 3 : OAUTH ===== -->
      <div class="tab-panel" id="panel-oauth">
        <p style="color:var(--brand-muted);font-size:.88rem;margin-bottom:20px;text-align:center;line-height:1.6">
          Connecte-toi avec ton compte existant. Aucun mot de passe requis.
        </p>
        <div class="oauth-grid">
          <button class="oauth-btn" onclick="oauthLogin('google')">
            <svg class="oauth-icon" viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continuer avec Google
          </button>

          <button class="oauth-btn" onclick="oauthLogin('apple')">
            <svg class="oauth-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
            Continuer avec Apple
          </button>

          <button class="oauth-btn" onclick="oauthLogin('facebook')">
            <svg class="oauth-icon" viewBox="0 0 24 24" fill="#1877F2">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            Continuer avec Facebook
          </button>
        </div>
        <div class="status-msg" id="oauthStatus"></div>
        <div class="oauth-separator">ou</div>
        <button class="ghost-btn" onclick="switchTab('email')">Utiliser mon email</button>
      </div>

      <div class="signup-link">
        Nouveau sur PorteàPorte ? <a href="/signup.html">Créer un compte</a>
      </div>
    </div>
  </div>

  <script>
    const db = window.db || window.getSupabaseClient();
    let phoneForOtp = '';

    /* ---- Tabs ---- */
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === name);
      });
      document.querySelectorAll('.tab-panel').forEach(p => {
        p.classList.toggle('active', p.id === 'panel-' + name);
      });
    }

    function showStatus(id, msg, type) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.className = 'status-msg ' + type;
      el.style.display = 'block';
    }

    /* ---- After login: redirect based on role ---- */
    async function afterLogin(session) {
      const userId = session.user.id;
      const { data: profile } = await db.from('profiles').select('role').eq('id', userId).single();
      const role = profile?.role || 'expediteur';
      let dest = '/dashboard-expediteur.html';
      if (role === 'livreur') dest = '/dashboard-livreur.html';
      else if (role === 'les deux') dest = '/role-choice.html';
      else if (role === 'admin') dest = '/admin/dashboard-admin.html';
      showStatus('emailStatus', 'Connexion réussie ! Redirection...', 'success');
      setTimeout(() => { window.location.href = dest; }, 1000);
    }

    /* ---- TAB 1 : Email ---- */
    async function handleEmail(e) {
      e.preventDefault();
      const btn = document.getElementById('emailBtn');
      btn.disabled = true;
      btn.textContent = 'Connexion...';
      try {
        const { data, error } = await db.auth.signInWithPassword({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value
        });
        if (error) throw error;
        await afterLogin(data.session);
      } catch (err) {
        showStatus('emailStatus', err.message || 'Erreur de connexion', 'error');
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    }

    /* ---- TAB 2 : Phone OTP ---- */
    async function sendOtp(e) {
      e.preventDefault();
      const rawDial = document.getElementById('dialCode').value.replace('-us', '');
      const num = document.getElementById('phoneNumber').value.replace(/\D/g, '');
      phoneForOtp = rawDial + num;

      const btn = document.getElementById('sendOtpBtn');
      btn.disabled = true;
      btn.textContent = 'Envoi...';

      try {
        const { error } = await db.auth.signInWithOtp({ phone: phoneForOtp });
        if (error) throw error;
        document.getElementById('phone-step-1').style.display = 'none';
        document.getElementById('phone-step-2').style.display = 'block';
        document.getElementById('phoneDisplay').textContent = phoneForOtp;
        setupOtpBoxes();
      } catch (err) {
        showStatus('phoneStatus1', err.message || 'Impossible d\'envoyer le code', 'error');
        btn.disabled = false;
        btn.textContent = 'Envoyer le code';
      }
    }

    function setupOtpBoxes() {
      const boxes = document.querySelectorAll('.otp-box');
      boxes.forEach((box, i) => {
        box.value = '';
        box.addEventListener('input', () => {
          box.value = box.value.replace(/\D/g, '').slice(0, 1);
          if (box.value && i < boxes.length - 1) boxes[i + 1].focus();
          if (allOtpFilled()) verifyOtp();
        });
        box.addEventListener('keydown', (ev) => {
          if (ev.key === 'Backspace' && !box.value && i > 0) boxes[i - 1].focus();
        });
      });
      boxes[0].focus();
    }

    function allOtpFilled() {
      return [...document.querySelectorAll('.otp-box')].every(b => b.value.length === 1);
    }

    async function verifyOtp() {
      const token = [...document.querySelectorAll('.otp-box')].map(b => b.value).join('');
      if (token.length < 6) return;
      const btn = document.getElementById('verifyOtpBtn');
      btn.disabled = true;
      btn.textContent = 'Vérification...';
      try {
        const { data, error } = await db.auth.verifyOtp({ phone: phoneForOtp, token, type: 'sms' });
        if (error) throw error;
        await afterLogin(data.session);
      } catch (err) {
        showStatus('phoneStatus2', err.message || 'Code invalide ou expiré', 'error');
        btn.disabled = false;
        btn.textContent = 'Vérifier le code';
      }
    }

    function resetPhone() {
      phoneForOtp = '';
      document.getElementById('phone-step-1').style.display = 'block';
      document.getElementById('phone-step-2').style.display = 'none';
      document.getElementById('phoneNumber').value = '';
      document.getElementById('sendOtpBtn').disabled = false;
      document.getElementById('sendOtpBtn').textContent = 'Envoyer le code';
    }

    /* ---- TAB 3 : OAuth ---- */
    async function oauthLogin(provider) {
      showStatus('oauthStatus', 'Redirection vers ' + provider + '...', 'info');
      try {
        const { error } = await db.auth.signInWithOAuth({
          provider,
          options: { redirectTo: window.location.origin + '/role-choice.html' }
        });
        if (error) throw error;
      } catch (err) {
        showStatus('oauthStatus', err.message || 'Erreur OAuth', 'error');
      }
    }

    /* ---- Auto-redirect if already logged in ---- */
    db.auth.getSession().then(({ data }) => {
      if (data?.session) afterLogin(data.session);
    });
  </script>
</body>
</html>
