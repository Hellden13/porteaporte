<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Détail du trajet — PorteàPorte</title>
  <link rel="stylesheet" href="/assets/brand-uniform.css"/>
  <link rel="stylesheet" href="/assets/visual-polish.css">
  <style>
    body { background: #f7f8fa; }
    .trajet-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 60px;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 24px;
      align-items: start;
    }
    @media(max-width: 820px){
      .trajet-wrapper { grid-template-columns: 1fr; }
      .sidebar { order: -1; }
    }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
      padding: 22px;
      margin-bottom: 18px;
    }
    .card h2 { font-size: 1rem; font-weight: 700; color: #1a1a2e; margin: 0 0 16px; }
    .skeleton { background: linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%); background-size: 200%; animation: shimmer 1.4s infinite; border-radius: 8px; }
    @keyframes shimmer { from{background-position:200%} to{background-position:-200%} }
    .sk-line { height: 16px; margin-bottom: 10px; }
    .sk-line.wide { width: 80%; }
    .sk-line.med  { width: 55%; }
    .sk-line.short{ width: 35%; }
    .sk-avatar { width: 64px; height: 64px; border-radius: 50%; }
    .route-cities { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .route-cities .city { font-size: 1.5rem; font-weight: 800; color: #1a1a2e; }
    .route-cities .arrow { font-size: 1.4rem; color: #6c63ff; flex-shrink: 0; }
    .route-date { color: #666; font-size: .9rem; margin-bottom: 16px; }
    .meta-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    @media(min-width:500px){ .meta-grid { grid-template-columns: repeat(4, 1fr); } }
    .meta-item { background: #f7f8fa; border-radius: 10px; padding: 10px 12px; text-align: center; }
    .meta-item .mi-icon { font-size: 1.3rem; }
    .meta-item .mi-val  { font-size: .9rem; font-weight: 700; color: #1a1a2e; margin: 2px 0; }
    .meta-item .mi-lbl  { font-size: .75rem; color: #888; }
    .timeline { position: relative; padding-left: 28px; }
    .timeline::before { content: ''; position: absolute; left: 9px; top: 14px; bottom: 14px; width: 2px; background: #e0e0e0; }
    .tl-stop { position: relative; margin-bottom: 18px; }
    .tl-stop:last-child { margin-bottom: 0; }
    .tl-dot { position: absolute; left: -21px; top: 3px; width: 14px; height: 14px; border-radius: 50%; background: #ddd; border: 2px solid #fff; box-shadow: 0 0 0 2px #ddd; }
    .tl-dot.filled { background: #6c63ff; box-shadow: 0 0 0 2px #6c63ff; }
    .tl-stop-name { font-weight: 600; color: #1a1a2e; font-size: .95rem; }
    .tl-stop-sub  { font-size: .8rem; color: #888; margin-top: 2px; }
    .tl-meeting-badge { display: inline-block; font-size: .72rem; background: #fff3cd; color: #856404; border-radius: 20px; padding: 2px 8px; margin-top: 4px; }
    .driver-header { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; }
    .driver-avatar { width: 64px; height: 64px; border-radius: 50%; background: #6c63ff; color: #fff; font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .driver-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .driver-name { font-size: 1.15rem; font-weight: 700; color: #1a1a2e; }
    .driver-verified { display: inline-flex; align-items: center; gap: 4px; font-size: .78rem; color: #198754; background: #d1e7dd; border-radius: 20px; padding: 2px 8px; margin-top: 4px; }
    .driver-bio { font-size: .88rem; color: #555; margin: 12px 0; line-height: 1.5; }
    .score-bars { margin-bottom: 16px; }
    .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .score-row .sr-lbl { width: 110px; font-size: .82rem; color: #555; flex-shrink: 0; }
    .sr-bar-wrap { flex: 1; height: 7px; background: #eee; border-radius: 99px; overflow: hidden; }
    .sr-bar { height: 100%; background: #6c63ff; border-radius: 99px; transition: width .4s; }
    .sr-val { font-size: .8rem; font-weight: 700; color: #1a1a2e; width: 28px; text-align: right; flex-shrink: 0; }
    .pref-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .pref-chip { display: inline-flex; align-items: center; gap: 5px; font-size: .8rem; border-radius: 20px; padding: 4px 11px; background: #f0edff; color: #4b44cc; }
    .pref-chip.bad { background: #fdecea; color: #c0392b; }
    .pref-chip.good { background: #e8f5e9; color: #1b5e20; }
    .pref-chip.neutral { background: #f0f0f0; color: #555; }
    .vehicle-photos { display: flex; gap: 8px; overflow-x: auto; margin: 12px 0; padding-bottom: 4px; }
    .vehicle-photos img { height: 90px; width: 130px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
    .vehicle-info { font-size: .85rem; color: #555; }
    .vehicle-info strong { color: #1a1a2e; }
    .review-item { border-top: 1px solid #f0f0f0; padding: 12px 0; }
    .review-item:first-child { border-top: none; padding-top: 0; }
    .review-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .review-name  { font-size: .88rem; font-weight: 600; color: #1a1a2e; }
    .review-stars { color: #f5a623; font-size: .85rem; letter-spacing: 1px; }
    .review-text  { font-size: .83rem; color: #666; line-height: 1.4; }
    .review-date  { font-size: .75rem; color: #aaa; margin-top: 4px; }
    .sidebar { position: sticky; top: 20px; }
    .price-card .price-big { font-size: 2.2rem; font-weight: 800; color: #6c63ff; margin-bottom: 4px; }
    .price-card .price-sub { font-size: .85rem; color: #888; margin-bottom: 14px; }
    .price-breakdown { background: #f7f8fa; border-radius: 10px; padding: 12px; margin-bottom: 14px; }
    .pb-row { display: flex; justify-content: space-between; font-size: .82rem; color: #555; margin-bottom: 6px; }
    .pb-row:last-child { margin-bottom: 0; }
    .pb-row.total { font-weight: 700; color: #1a1a2e; font-size: .9rem; border-top: 1px solid #e0e0e0; padding-top: 6px; margin-top: 6px; }
    .pb-note { font-size: .75rem; color: #aaa; margin-top: 6px; }
    .group-banner { background: linear-gradient(135deg,#e8f5e9,#c8e6c9); border-radius: 10px; padding: 10px 14px; font-size: .83rem; color: #1b5e20; margin-bottom: 16px; display: none; }
    .group-banner .gb-icon { font-size: 1.1rem; margin-right: 6px; }
    .booking-tabs { display: flex; gap: 0; margin-bottom: 16px; border: 1px solid #e0e0e0; border-radius: 10px; overflow: hidden; }
    .tab-btn { flex: 1; background: #f7f8fa; border: none; padding: 10px; font-size: .88rem; font-weight: 600; cursor: pointer; color: #888; transition: all .2s; }
    .tab-btn.active { background: #6c63ff; color: #fff; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: .83rem; font-weight: 600; color: #444; margin-bottom: 6px; }
    .form-group select,
    .form-group input[type=number],
    .form-group textarea { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 9px; padding: 9px 12px; font-size: .9rem; outline: none; transition: border .2s; background: #fff; font-family: inherit; box-sizing: border-box; }
    .form-group select:focus, .form-group input:focus, .form-group textarea:focus { border-color: #6c63ff; }
    .form-group textarea { resize: vertical; min-height: 70px; }
    .check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: .88rem; color: #444; cursor: pointer; }
    .check-row input[type=checkbox] { width: 17px; height: 17px; accent-color: #6c63ff; cursor: pointer; }
    .pkg-price-preview { background: #f0edff; border-radius: 10px; padding: 10px 14px; font-size: .83rem; color: #4b44cc; margin-bottom: 14px; display: none; }
    .pkg-price-preview strong { font-size: 1.1rem; }
    .pkg-unavail { text-align: center; color: #aaa; font-size: .85rem; padding: 16px 0; display: none; }
    .btn-reserve { width: 100%; background: linear-gradient(135deg,#6c63ff,#8b7fff); color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform .15s, box-shadow .15s; box-shadow: 0 4px 15px rgba(108,99,255,.35); }
    .btn-reserve:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,99,255,.45); }
    .btn-reserve:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: .88rem; color: #6c63ff; text-decoration: none; margin-bottom: 18px; font-weight: 600; }
    .back-link:hover { text-decoration: underline; }
    #toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a2e; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: .9rem; opacity: 0; transition: opacity .3s; z-index: 999; pointer-events: none; }
    #toast.show { opacity: 1; }
    #toast.success { background: #198754; }
    #toast.error   { background: #dc3545; }
  </style>
</head>
<body>

<div id="topbar-placeholder"></div>

<div class="trajet-wrapper" id="main-wrapper">
  <div class="left-col">
    <a href="/covoiturage.html" class="back-link">&#8592; Retour aux resultats</a>

    <div id="skeleton-left">
      <div class="card">
        <div class="skeleton sk-line wide"></div>
        <div class="skeleton sk-line med"></div>
        <div class="skeleton sk-line short"></div>
        <div class="skeleton sk-line" style="height:80px;margin-top:12px"></div>
      </div>
      <div class="card">
        <div class="skeleton sk-line short"></div>
        <div style="display:flex;gap:12px;margin-top:12px">
          <div class="skeleton sk-avatar"></div>
          <div style="flex:1">
            <div class="skeleton sk-line med"></div>
            <div class="skeleton sk-line short"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="content-left" style="display:none">
      <div class="card" id="card-trajet">
        <div class="route-cities">
          <span class="city" id="city-from"></span>
          <span class="arrow">&#8594;</span>
          <span class="city" id="city-to"></span>
        </div>
        <div class="route-date" id="ride-date-line"></div>
        <div class="meta-grid" id="meta-grid"></div>
      </div>

      <div class="card">
        <h2>&#128506;&#65039; Itineraire</h2>
        <div class="timeline" id="timeline"></div>
      </div>

      <div class="card" id="card-chauffeur">
        <h2>&#129333;&#8205;&#9992;&#65039; Votre chauffeur</h2>
        <div class="driver-header">
          <div class="driver-avatar" id="driver-avatar"></div>
          <div>
            <div class="driver-name" id="driver-name"></div>
            <div id="driver-verified-badge"></div>
            <div style="font-size:.8rem;color:#888;margin-top:4px" id="driver-trips"></div>
          </div>
        </div>
        <div id="driver-bio-wrap"></div>
        <div class="score-bars" id="score-bars"></div>
        <div id="pref-chips-wrap" class="pref-chips"></div>
        <div id="vehicle-section"></div>
      </div>

      <div class="card" id="card-avis" style="display:none">
        <h2>&#11088; Avis recents</h2>
        <div id="reviews-list"></div>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div id="skeleton-sidebar" class="card">
      <div class="skeleton sk-line short" style="height:40px;margin-bottom:12px"></div>
      <div class="skeleton sk-line" style="height:100px;margin-bottom:12px"></div>
      <div class="skeleton sk-line" style="height:48px"></div>
    </div>

    <div id="sidebar-real" style="display:none">
      <div class="card price-card">
        <div class="price-big" id="price-total"></div>
        <div class="price-sub">par passager (tout inclus)</div>
        <div class="price-breakdown" id="price-breakdown"></div>
      </div>

      <div class="group-banner" id="group-banner">
        <span class="gb-icon">&#128101;</span>
        <span id="group-banner-text"></span>
      </div>

      <div class="card" id="booking-card">
        <div class="booking-tabs" id="booking-tabs" style="display:none">
          <button class="tab-btn active" id="tab-pax"  onclick="switchTab('passenger')">&#128100; Passager</button>
          <button class="tab-btn"        id="tab-pkg"  onclick="switchTab('package')">&#128230; Colis</button>
        </div>

        <div id="form-passenger">
          <div class="form-group">
            <label>Point de depart</label>
            <select id="pax-pickup"></select>
          </div>
          <div class="form-group">
            <label>Point d'arrivee</label>
            <select id="pax-dropoff"></select>
          </div>
          <div class="form-group">
            <label>Nombre de places</label>
            <select id="pax-seats">
              <option value="1">1 place</option>
              <option value="2">2 places</option>
              <option value="3">3 places</option>
              <option value="4">4 places</option>
            </select>
          </div>
          <label class="check-row">
            <input type="checkbox" id="pax-luggage"> Bagage en soute
          </label>
          <label class="check-row" id="pet-row" style="display:none">
            <input type="checkbox" id="pax-pet"> Voyage avec un animal
          </label>
          <div class="form-group">
            <label>Remarque pour le chauffeur <span style="font-weight:400;color:#aaa">(optionnel)</span></label>
            <textarea id="pax-note" placeholder="Ex: Je suis a l'entree principale..."></textarea>
          </div>
        </div>

        <div id="form-package" style="display:none">
          <div class="form-group">
            <label>Ville de ramassage</label>
            <select id="pkg-pickup"></select>
          </div>
          <div class="form-group">
            <label>Ville de livraison</label>
            <select id="pkg-dropoff"></select>
          </div>
          <div class="form-group">
            <label>Poids (kg) <span id="pkg-max-hint" style="font-weight:400;color:#aaa"></span></label>
            <input type="number" id="pkg-weight" min="0.1" max="50" step="0.1" placeholder="0.0" oninput="updatePkgPrice()"/>
          </div>
          <div class="form-group">
            <label>Description du colis</label>
            <textarea id="pkg-desc" placeholder="Ex: Boite fragile, vetements..."></textarea>
          </div>
          <div class="pkg-price-preview" id="pkg-price-preview">
            Frais d'envoi estimes : <strong id="pkg-price-val"></strong>
            <div style="font-size:.75rem;margin-top:4px;color:#7b74cc">100% verse au chauffeur</div>
          </div>
          <div class="pkg-unavail" id="pkg-unavail">Ce trajet n'accepte pas les colis.</div>
        </div>

        <button class="btn-reserve" id="btn-reserve" onclick="submitBooking()">Reserver ma place</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script>
const db = window.getSupabaseClient ? window.getSupabaseClient() : window.db;

let currentRide  = null;
let currentUser  = null;
let currentSession = null;
let activeTab    = 'passenger';
let rideSettings = null;

const params = new URLSearchParams(location.search);
const rideId = params.get('id') || params.get('ride_id');

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + (type || '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 3500);
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-pax').classList.toggle('active', tab === 'passenger');
  document.getElementById('tab-pkg').classList.toggle('active', tab === 'package');
  document.getElementById('form-passenger').style.display = tab === 'passenger' ? '' : 'none';
  document.getElementById('form-package').style.display   = tab === 'package'   ? '' : 'none';
  document.getElementById('btn-reserve').textContent = tab === 'passenger' ? 'Reserver ma place' : 'Envoyer mon colis';
}

function updatePkgPrice() {
  if (!rideSettings) return;
  const w = parseFloat(document.getElementById('pkg-weight').value) || 0;
  if (w <= 0) { document.getElementById('pkg-price-preview').style.display = 'none'; return; }
  const base  = rideSettings.ride_fee_package_base    || 8.00;
  const perKg = rideSettings.ride_fee_package_per_kg  || 1.50;
  const fee   = base + Math.max(0, w - 5) * perKg;
  document.getElementById('pkg-price-val').textContent = fee.toFixed(2) + ' $';
  document.getElementById('pkg-price-preview').style.display = '';
}

/* Échappement HTML pour prévenir les XSS */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#x27;');
}

function stars(n) {
  const f = Math.round(n || 0);
  return '&#9733;'.repeat(f) + '&#9734;'.repeat(5 - f);
}

function formatDate(dt) {
  if (!dt) return '';
  const d = new Date(dt);
  return d.toLocaleDateString('fr-CA', { weekday:'long', year:'numeric', month:'long', day:'numeric' })
       + ' a ' + d.toLocaleTimeString('fr-CA', { hour:'2-digit', minute:'2-digit' });
}

function formatShortDate(dt) {
  if (!dt) return '';
  return new Date(dt).toLocaleDateString('fr-CA', { day:'2-digit', month:'short', year:'numeric' });
}

function populateCitySelects(ride) {
  const stops = [
    { id: 'depart',  label: ride.departure_city || ride.from_city || '' },
    ...(Array.isArray(ride.stop_points) ? ride.stop_points.map(s => ({ id: s.id || s.city, label: s.city || s.name || s.label || '' })) : []),
    { id: 'arrivee', label: ride.destination_city || ride.to_city || '' }
  ].filter(s => s.label);

  ['pax-pickup','pax-dropoff','pkg-pickup','pkg-dropoff'].forEach(function(selId) {
    const sel = document.getElementById(selId);
    sel.innerHTML = '';
    stops.forEach(function(s) {
      const o = document.createElement('option');
      o.value = s.id;
      o.textContent = s.label;
      sel.appendChild(o);
    });
  });

  ['pax-dropoff','pkg-dropoff'].forEach(function(id) {
    const sel = document.getElementById(id);
    if (sel.options.length > 1) sel.selectedIndex = sel.options.length - 1;
  });
}

function renderRide(r) {
  document.getElementById('city-from').textContent = r.departure_city  || r.from_city || '?';
  document.getElementById('city-to').textContent   = r.destination_city || r.to_city  || '?';
  document.getElementById('ride-date-line').textContent = formatDate(r.departure_time || r.date);

  const seats = r.available_seats ?? r.seats_available ?? 0;
  const dist  = r.distance_km ? r.distance_km + ' km' : '--';
  const trunk = r.trunk_size === 'large' ? 'Grand coffre' : r.trunk_size === 'medium' ? 'Coffre moyen' : r.trunk_size === 'small' ? 'Petit coffre' : '--';
  const flex  = r.flexibility === 'flexible' ? 'Flexible' : r.flexibility === 'on_demand' ? 'Sur demande' : 'Fixe';

  document.getElementById('meta-grid').innerHTML =
    '<div class="meta-item"><div class="mi-icon">&#128186;</div><div class="mi-val">' + seats + '</div><div class="mi-lbl">places dispo.</div></div>' +
    '<div class="meta-item"><div class="mi-icon">&#128207;</div><div class="mi-val">' + dist + '</div><div class="mi-lbl">distance</div></div>' +
    '<div class="meta-item"><div class="mi-icon">&#129533;</div><div class="mi-val">' + trunk + '</div><div class="mi-lbl">coffre</div></div>' +
    '<div class="meta-item"><div class="mi-icon">&#128336;</div><div class="mi-val">' + flex + '</div><div class="mi-lbl">horaire</div></div>';

  var stopArr = [
    { name: r.departure_city || r.from_city, sub: r.departure_address || '', dot: 'filled', time: r.departure_time }
  ];
  if (Array.isArray(r.stop_points)) {
    r.stop_points.forEach(function(s) {
      stopArr.push({ name: s.city || s.name || s.label || '', sub: s.address || '', dot: '', meeting: s.meeting_point_name || null });
    });
  }
  stopArr.push({ name: r.destination_city || r.to_city, sub: r.destination_address || '', dot: 'filled' });

  document.getElementById('timeline').innerHTML = stopArr.map(function(s) {
    return '<div class="tl-stop">' +
      '<div class="tl-dot ' + s.dot + '"></div>' +
      '<div class="tl-stop-name">' + (s.name || '') + '</div>' +
      (s.sub  ? '<div class="tl-stop-sub">' + s.sub + '</div>' : '') +
      (s.time ? '<div class="tl-stop-sub">&#128336; ' + formatDate(s.time) + '</div>' : '') +
      (s.meeting ? '<div class="tl-meeting-badge">&#128205; ' + s.meeting + '</div>' : '') +
      '</div>';
  }).join('');

  var p  = r.driver_profile || {};
  var dp = r.driver_info    || {};
  var prenom = dp.prenom || p.prenom || 'Chauffeur';

  var avatarEl = document.getElementById('driver-avatar');
  avatarEl.innerHTML = '';
  if (dp.avatar_url || p.avatar_url) {
    var _img = document.createElement('img');
    _img.src = dp.avatar_url || p.avatar_url; /* .src via propriété — safe */
    _img.alt = prenom;
    avatarEl.appendChild(_img);
  } else {
    avatarEl.textContent = (prenom[0] || '?').toUpperCase();
  }
  document.getElementById('driver-name').textContent = prenom;

  var verified = dp.identity_verified || p.identity_verified;
  document.getElementById('driver-verified-badge').innerHTML = verified
    ? '<span class="driver-verified">&#10004; Identite verifiee</span>' : '';

  var nCh = dp.nb_trajets_chauffeur || 0;
  document.getElementById('driver-trips').textContent = nCh > 0 ? nCh + ' trajet' + (nCh > 1 ? 's' : '') + ' comme chauffeur' : '';

  // Badge de confiance bidirectionnel (basé sur les avis covoit)
  var driverIdForBadge = r.driver_id || dp.user_id || p.id;
  if (driverIdForBadge && window.RideReview) {
    var badgeWrap = document.createElement('div');
    badgeWrap.id = 'driver-trust-badge';
    badgeWrap.style.marginTop = '6px';
    document.getElementById('driver-trips').parentNode.appendChild(badgeWrap);
    window.RideReview.injectBadge(badgeWrap, driverIdForBadge);
  }

  // Boutons d'action (Contacter / Évaluer) — visibles seulement si connecté
  var actionsWrap = document.getElementById('driver-actions-wrap');
  if (!actionsWrap) {
    actionsWrap = document.createElement('div');
    actionsWrap.id = 'driver-actions-wrap';
    actionsWrap.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;';
    document.getElementById('card-chauffeur').appendChild(actionsWrap);
  }
  actionsWrap.innerHTML = '';
  if (currentUser && driverIdForBadge && driverIdForBadge !== currentUser.id) {
    var btnChat = document.createElement('button');
    btnChat.type = 'button';
    btnChat.style.cssText = 'background:linear-gradient(135deg,#00d9ff,#00b8d4);color:#001828;border:0;padding:10px 16px;border-radius:10px;font-weight:800;cursor:pointer;font-size:.9rem;';
    btnChat.innerHTML = '💬 Contacter le chauffeur';
    btnChat.addEventListener('click', function () {
      window.RideChat.open({
        ride_id: r.id || rideId,
        other_user_id: driverIdForBadge,
        other_name: prenom || 'Chauffeur'
      });
    });
    actionsWrap.appendChild(btnChat);
  }
  // Bouton Évaluer (si trajet terminé OU dans le passé)
  var statusLower = String(r.status || '').toLowerCase();
  var departed = r.departure_time && new Date(r.departure_time).getTime() < Date.now();
  var canReview = currentUser && driverIdForBadge && driverIdForBadge !== currentUser.id
                  && (['termine','completed','done'].includes(statusLower) || departed);
  if (canReview) {
    var btnReview = document.createElement('button');
    btnReview.type = 'button';
    btnReview.style.cssText = 'background:linear-gradient(135deg,#b8f53e,#9ce326);color:#071006;border:0;padding:10px 16px;border-radius:10px;font-weight:800;cursor:pointer;font-size:.9rem;';
    btnReview.innerHTML = '⭐ Évaluer ce trajet';
    btnReview.addEventListener('click', function () {
      window.RideReview.open({
        ride_id: r.id || rideId,
        role: 'passenger',
        target_name: prenom || 'Chauffeur',
        onSuccess: function () { setTimeout(function () { location.reload(); }, 1500); }
      });
    });
    actionsWrap.appendChild(btnReview);
  }

  var bio = p.bio || dp.bio;
  var _bioWrap = document.getElementById('driver-bio-wrap');
  _bioWrap.innerHTML = '';
  if (bio) {
    var _bioP = document.createElement('p');
    _bioP.className = 'driver-bio';
    _bioP.textContent = '“' + bio + '”'; /* textContent — safe */
    _bioWrap.appendChild(_bioP);
  }

  var sc = dp.score_confiance    || 0;
  var sp = dp.score_ponctualite  || 0;
  var sf = dp.score_fiabilite    || 0;
  var sb = dp.score_comportement || 0;

  function scoreRow(lbl, val) {
    return '<div class="score-row"><span class="sr-lbl">' + lbl + '</span>' +
      '<div class="sr-bar-wrap"><div class="sr-bar" style="width:' + val + '%"></div></div>' +
      '<span class="sr-val">' + val + '</span></div>';
  }

  document.getElementById('score-bars').innerHTML =
    '<div style="font-size:.82rem;color:#888;margin-bottom:8px">Score de confiance</div>' +
    scoreRow('Score global', sc) +
    scoreRow('Ponctualite',  sp) +
    scoreRow('Fiabilite',    sf) +
    scoreRow('Comportement', sb);

  var smokeMap = { non_fumeur: ['&#128683;','Non-fumeur','good'], fumeur: ['&#128684;','Fumeur autorise','bad'] };
  var musicMap = { silence: ['&#128263;','Silence','neutral'], musique: ['&#127925;','Musique','neutral'] };
  var chatMap  = { silencieux: ['&#129311;','Trajet silencieux','neutral'], bavard: ['&#128172;','Conversation bienvenue','neutral'] };
  var smK = r.smoking_policy || p.smoking_policy || 'non_fumeur';
  var muK = r.music_policy   || p.music_policy   || 'selon_humeur';
  var chK = r.chat_policy    || p.chat_policy    || 'selon_humeur';
  var sm  = smokeMap[smK] || ['&#128683;','Non-fumeur','good'];
  var mu  = musicMap[muK] || ['&#127926;','Musique selon humeur','neutral'];
  var ch  = chatMap[chK]  || ['&#128483;&#65039;','Conversation selon humeur','neutral'];

  var chips = document.getElementById('pref-chips-wrap');
  chips.innerHTML =
    '<span class="pref-chip ' + sm[2] + '">' + sm[0] + ' ' + sm[1] + '</span>' +
    '<span class="pref-chip ' + mu[2] + '">' + mu[0] + ' ' + mu[1] + '</span>' +
    '<span class="pref-chip ' + ch[2] + '">' + ch[0] + ' ' + ch[1] + '</span>' +
    ((r.ac_available || p.ac_available) ? '<span class="pref-chip good">&#10052;&#65039; Climatisation</span>' : '') +
    (r.accepts_pets   ? '<span class="pref-chip neutral">&#128062; Animaux acceptes</span>' : '') +
    (p.perfume_free   ? '<span class="pref-chip neutral">&#127807; Sans parfum</span>' : '') +
    (r.women_only     ? '<span class="pref-chip neutral">&#128118;&#8205;&#9792;&#65039; Femmes seulement</span>' : '');

  var photos = p.vehicle_photos || [];
  var vHTML = '';
  if (photos.length) {
    vHTML += '<div class="vehicle-photos">' + photos.map(function(u) { return '<img loading="lazy" decoding="async" src="' + u + '" alt="vehicule"/>'; }).join('') + '</div>';
  }
  if (p.vehicle_make || r.vehicle_make) {
    var make  = p.vehicle_make  || r.vehicle_make  || '';
    var model = p.vehicle_model || r.vehicle_model || '';
    var year  = p.vehicle_year  || r.vehicle_year  || '';
    var color = p.vehicle_color || r.vehicle_color || '';
    vHTML += '<div class="vehicle-info"><strong>' + year + ' ' + make + ' ' + model + '</strong>' + (color ? ' &middot; ' + color : '') + '</div>';
  }
  document.getElementById('vehicle-section').innerHTML = vHTML;

  var reviews = r.recent_reviews || [];
  if (reviews.length) {
    document.getElementById('card-avis').style.display = '';
    document.getElementById('reviews-list').innerHTML = reviews.map(function(rv) {
      return '<div class="review-item">' +
        '<div class="review-header">' +
          '<span class="review-name">' + esc(rv.reviewer_name || 'Anonyme') + '</span>' +
          '<span class="review-stars">' + stars(rv.rating || rv.note || 0) + '</span>' +
        '</div>' +
        (rv.comment ? '<div class="review-text">' + esc(rv.comment) + '</div>' : '') +
        '<div class="review-date">' + formatShortDate(rv.created_at) + '</div>' +
        '</div>';
    }).join('');
  }

  var price = r.price_per_seat || r.price || 0;
  document.getElementById('price-total').textContent = parseFloat(price).toFixed(2) + ' $';

  var paxBase    = r.pax_base_price || price;
  var platFee    = r.platform_fee   || 0;
  var lugFee     = r.luggage_fee    || 0;
  document.getElementById('price-breakdown').innerHTML =
    '<div class="pb-row"><span>Trajet de base</span><span>' + parseFloat(paxBase).toFixed(2) + ' $</span></div>' +
    '<div class="pb-row"><span>Frais de plateforme</span><span>' + parseFloat(platFee).toFixed(2) + ' $</span></div>' +
    (lugFee > 0 ? '<div class="pb-row"><span>Supplement bagage</span><span>' + parseFloat(lugFee).toFixed(2) + ' $</span></div>' : '') +
    '<div class="pb-row total"><span>Total passager</span><span>' + parseFloat(price).toFixed(2) + ' $</span></div>' +
    '<div class="pb-note">Les frais de bagage sont verses en totalite au chauffeur.</div>';

  if (r.group_discount && parseFloat(r.group_discount) > 0) {
    var gb = document.getElementById('group-banner');
    gb.style.display = '';
    var cur = r.current_passengers || 0;
    document.getElementById('group-banner-text').textContent =
      '+1 passager = -' + r.group_discount + '% pour tous ! (' + cur + ' passager' + (cur > 1 ? 's' : '') + ' actuellement)';
  }

  populateCitySelects(r);
  if (r.accepts_pets) document.getElementById('pet-row').style.display = '';

  if (r.accepts_packages) {
    document.getElementById('booking-tabs').style.display = '';
    document.getElementById('pkg-max-hint').textContent = r.package_max_kg ? '(max ' + r.package_max_kg + ' kg)' : '';
    document.getElementById('pkg-weight').max = r.package_max_kg || 50;
  } else {
    document.getElementById('pkg-unavail').style.display = '';
  }

  document.getElementById('skeleton-left').style.display    = 'none';
  document.getElementById('skeleton-sidebar').style.display = 'none';
  document.getElementById('content-left').style.display     = '';
  document.getElementById('sidebar-real').style.display     = '';
}

async function loadRide() {
  if (!rideId) { showToast('Trajet introuvable.', 'error'); return; }
  try {
    var [rideRes, settingsRes] = await Promise.all([
      fetch('/api/platform?endpoint=ride-detail&ride_id=' + rideId),
      fetch('/api/platform?endpoint=ride-settings')
    ]);
    var rideData     = await rideRes.json();
    var settingsData = await settingsRes.json();
    if (!rideRes.ok || rideData.error) throw new Error(rideData.error || 'Trajet introuvable');
    const ridePayload = rideData.ride ? {
      ...rideData.ride,
      departure_city: rideData.ride.departure_city || rideData.ride.start_city,
      destination_city: rideData.ride.destination_city || rideData.ride.end_city,
      distance_km: rideData.ride.distance_km || rideData.ride.total_distance_km,
      stop_points: rideData.stops || rideData.ride.stop_points || [],
      driver_info: rideData.driver || rideData.ride.driver_info || {},
      driver_profile: rideData.driver || rideData.ride.driver_profile || {},
      recent_reviews: rideData.driver?.recent_reviews || [],
      price_breakdown: rideData.price_breakdown || null
    } : rideData;
    currentRide  = ridePayload;
    rideSettings = settingsData.settings || settingsData || {};
    renderRide(ridePayload);
  } catch(e) {
    showToast('Trajet indisponible : ' + e.message, 'error');
  }
}

async function submitBooking() {
  if (!currentUser) {
    showToast('Connectez-vous pour reserver.', 'error');
    setTimeout(function() { location.href = '/login.html?next=' + encodeURIComponent(location.href); }, 1200);
    return;
  }
  var btn = document.getElementById('btn-reserve');
  btn.disabled = true;
  btn.textContent = 'En cours...';
  try {
    if (activeTab === 'passenger') {
      await bookPassenger();
    } else {
      await bookPackage();
    }
  } catch(e) {
    showToast('Erreur : ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = activeTab === 'passenger' ? 'Reserver ma place' : 'Envoyer mon colis';
  }
}

async function bookPassenger() {
  var seats   = parseInt(document.getElementById('pax-seats').value) || 1;
  var luggage = document.getElementById('pax-luggage').checked;
  var pet     = document.getElementById('pax-pet').checked;
  var note    = document.getElementById('pax-note').value.trim();
  var pickup  = document.getElementById('pax-pickup').value;
  var dropoff = document.getElementById('pax-dropoff').value;
  var res = await fetch('/api/platform?endpoint=ride-book', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + currentSession.access_token },
    body: JSON.stringify({
      ride_id: rideId,
      seats_reserved: seats,
      has_large_luggage: luggage,
      has_pet: pet,
      special_requests: note,
      pickup_city: pickup,
      dropoff_city: dropoff
    })
  });
  var data = await res.json();
  if (!res.ok || data.error) throw new Error(data.error || 'Erreur reservation');
  showToast('Reservation confirmee !', 'success');
  setTimeout(function() { location.href = '/dashboard-covoiturage.html'; }, 2000);
}

async function bookPackage() {
  var weight  = parseFloat(document.getElementById('pkg-weight').value) || 0;
  var desc    = document.getElementById('pkg-desc').value.trim();
  var pickup  = document.getElementById('pkg-pickup').value;
  var dropoff = document.getElementById('pkg-dropoff').value;
  if (weight <= 0) { showToast('Entrez le poids du colis.', 'error'); return; }
  var res = await fetch('/api/platform?endpoint=ride-package-book', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + currentSession.access_token },
    body: JSON.stringify({ ride_id: rideId, user_id: currentUser.id, package_weight_kg: weight, package_description: desc, pickup_city: pickup, dropoff_city: dropoff })
  });
  var data = await res.json();
  if (!res.ok || data.error) throw new Error(data.error || 'Erreur envoi colis');
  showToast('Colis enregistre !', 'success');
  setTimeout(function() { location.href = '/dashboard-expediteur.html'; }, 2000);
}

(async function() {
  if (!db || !db.auth) {
    showToast('Connexion Supabase indisponible.', 'error');
    return;
  }
  var sessionData = await db.auth.getSession();
  if (sessionData.data && sessionData.data.session) {
    currentSession = sessionData.data.session;
    currentUser = currentSession.user;
  }
  await loadRide();
})();
</script>
