<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi GPS en Direct · PorteàPorte</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async function () {
  const db = window.getSupabaseClient ? window.getSupabaseClient() : null;
  if (!db) return;
  const { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.href = '/login.html'; }
});
</script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--brand-bg-dark);
            color: var(--brand-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background: var(--brand-bg-surface);
            border-bottom: 1px solid var(--brand-bg-surface-light);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-brand { font-weight: bold; font-size: 1.2rem; color: var(--brand-lime); }
        .navbar-links { display: flex; gap: 1.5rem; }
        .navbar-links a { color: var(--brand-muted); text-decoration: none; transition: color 0.2s; }
        .navbar-links a:hover { color: var(--brand-lime); }
        .container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1rem;
            padding: 1rem;
        }
        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr; }
            .sidebar { order: -1; }
        }
        .map-container {
            background: var(--brand-bg-surface);
            border: 1px solid var(--brand-bg-surface-light);
            border-radius: 8px;
            overflow: hidden;
        }
        #map { width: 100%; height: 100%; min-height: 500px; }
        .sidebar {
            background: var(--brand-bg-surface);
            border: 1px solid var(--brand-bg-surface-light);
            border-radius: 8px;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .section { display: flex; flex-direction: column; gap: 0.75rem; }
        .section h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--brand-lime);
            border-bottom: 1px solid var(--brand-bg-surface-light);
            padding-bottom: 0.5rem;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            background: var(--brand-bg-dark);
            border-radius: 4px;
            border-left: 3px solid var(--brand-lime);
        }
        .info-label { font-size: 0.8rem; color: var(--brand-muted); text-transform: uppercase; }
        .info-value { font-size: 1rem; color: var(--brand-lime); font-weight: bold; }
        .tracking-status { padding: 1rem; border-radius: 4px; text-align: center; font-weight: bold; }
        .status-active   { background: #006400; color: #90EE90; border: 1px solid #90EE90; }
        .status-inactive { background: #333;    color: #999;    border: 1px solid #666; }
        .status-error    { background: #8B0000; color: #FFB6B6; border: 1px solid #FFB6B6; }
        .controls { display: flex; flex-direction: column; gap: 0.5rem; }
        button {
            padding: 0.75rem;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .btn-primary { background: var(--brand-lime); color: var(--brand-bg-dark); }
        .btn-primary:hover { background: #a5dd2d; }
        .btn-primary:disabled { background: #666; color: #999; cursor: not-allowed; opacity: 0.5; }
        .btn-secondary { background: var(--brand-bg-surface-light); color: var(--brand-lime); border: 1px solid var(--brand-lime); }
        .btn-secondary:hover { background: var(--brand-lime); color: var(--brand-bg-dark); }
        .btn-secondary.active { background: var(--brand-lime); color: var(--brand-bg-dark); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        .stat-card { background: var(--brand-bg-dark); border: 1px solid var(--brand-bg-surface-light); border-radius: 4px; padding: 0.75rem; text-align: center; }
        .stat-value { font-size: 1.5rem; color: var(--brand-lime); font-weight: bold; }
        .stat-label { font-size: 0.7rem; color: var(--brand-muted); text-transform: uppercase; margin-top: 0.25rem; }
        .alert { padding: 0.75rem; border-radius: 4px; font-size: 0.85rem; border-left: 3px solid; }
        .alert-info    { background: #1a1f2e; border-left-color: var(--brand-lime);   color: var(--brand-lime); }
        .alert-warning { background: #2e2400; border-left-color: #FFB800;             color: #FFB800; }
        .alert-error   { background: #2e1a1a; border-left-color: var(--brand-danger); color: var(--brand-danger); }
        .alert-success { background: #1a2e1a; border-left-color: #90EE90;             color: #90EE90; }
        .mode-toggle { display: flex; gap: 0.5rem; }
        .mode-toggle button { flex: 1; padding: 0.5rem; font-size: 0.8rem; }
        #confirm-btn {
            background: #16a34a;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 0.85rem;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            width: 100%;
            text-transform: none;
            letter-spacing: 0;
        }
        #confirm-btn:hover { background: #15803d; }
        #confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
    <link rel="stylesheet" href="/assets/brand-uniform.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand">🚚 PorteàPorte - Suivi GPS</div>
        <div class="navbar-links">
            <a href="javascript:history.back()">← Retour</a>
            <a href="/" onclick="logout(); return false;">Déconnexion</a>
        </div>
    </div>

    <div class="container">
        <div class="map-container">
            <div id="map"></div>
        </div>

        <div class="sidebar">
            <div class="section">
                <h3>Mode de suivi</h3>
                <div class="mode-toggle">
                    <button id="mode-livreur" class="btn-secondary active">📍 Je livre</button>
                    <button id="mode-client"  class="btn-secondary">👁 Suivre</button>
                </div>
            </div>

            <div class="section">
                <h3>Statut</h3>
                <div class="tracking-status status-inactive" id="status">⚪ GPS Inactif</div>
            </div>

            <div class="section" id="livreur-controls">
                <h3>Contrôles livreur</h3>
                <div class="controls">
                    <button id="start-tracking" class="btn-primary">🟢 Démarrer le suivi</button>
                    <button id="stop-tracking"  class="btn-primary" disabled>🔴 Arrêter le suivi</button>
                </div>
                <div id="accuracy-info" style="font-size:0.85rem;color:#9BA1A9;text-align:center;display:none;">
                    Précision : <span id="accuracy-value">--</span> m
                </div>
                <div id="confirm-section" style="display:none;margin-top:0.5rem;">
                    <button id="confirm-btn">✅ Confirmer la livraison</button>
                </div>
            </div>

            <div class="section" id="client-controls" style="display:none;">
                <h3>Position du livreur</h3>
                <div id="client-status" style="font-size:0.85rem;color:var(--brand-muted);text-align:center;">En attente...</div>
            </div>

            <div class="section">
                <h3>📍 Localisation actuelle</h3>
                <div class="info-item">
                    <span class="info-label">Latitude</span>
                    <span class="info-value" id="latitude">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Longitude</span>
                    <span class="info-value" id="longitude">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Altitude</span>
                    <span class="info-value" id="altitude">--</span>
                </div>
            </div>

            <div class="section">
                <h3>📊 Statistiques</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="distance">0 km</div>
                        <div class="stat-label">Distance</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="speed">0 km/h</div>
                        <div class="stat-label">Vitesse</div>
                    </div>
                </div>
            </div>

            <div id="alerts-container" style="display:none;">
                <div id="alert-message" class="alert alert-info"></div>
            </div>
        </div>
    </div>

    <script>
        let map, userMarker, livreurMarker, polyline;
        let watchId = null, clientPollInterval = null;
        let locationHistory = [], isTracking = false, mode = 'livreur';
        const params = new URLSearchParams(window.location.search);
        const livraisonId = params.get('id') || params.get('livraison_id');

        function initMap() {
            map = L.map('map').setView([46.7749, -71.2783], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
            polyline = L.polyline([], { color: '#B8F53E', weight: 4 }).addTo(map);
            userMarker = L.circleMarker([46.7749, -71.2783], {
                radius: 10, fillColor: '#B8F53E', color: '#0A0C0F', weight: 2, fillOpacity: 1
            }).addTo(map).bindPopup('Votre position');
        }

        function startTracking() {
            if (!navigator.geolocation) { showAlert('Géolocalisation non supportée', 'error'); return; }
            isTracking = true;
            locationHistory = [];
            updateStatus('active', '🟢 GPS Actif');
            watchId = navigator.geolocation.watchPosition(handleLocationSuccess, handleLocationError,
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
            document.getElementById('start-tracking').disabled = true;
            document.getElementById('stop-tracking').disabled  = false;
            document.getElementById('accuracy-info').style.display = 'block';
            if (livraisonId) {
                document.getElementById('confirm-section').style.display = 'block';
                showAlert('Suivi GPS actif — position transmise en temps réel.', 'success');
            } else {
                showAlert('Suivi GPS actif (aucune livraison liée).', 'info');
            }
        }

        function stopTracking() {
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            isTracking = false;
            updateStatus('inactive', '⚪ GPS Arrêté');
            document.getElementById('start-tracking').disabled = false;
            document.getElementById('stop-tracking').disabled  = true;
        }

        function handleLocationSuccess(position) {
            const { latitude, longitude, altitude, accuracy } = position.coords;
            const heading = position.coords.heading || 0;
            locationHistory.push({ latitude, longitude, timestamp: Date.now() });
            document.getElementById('latitude').textContent  = latitude.toFixed(6);
            document.getElementById('longitude').textContent = longitude.toFixed(6);
            document.getElementById('altitude').textContent  = altitude ? altitude.toFixed(0) + ' m' : '--';
            document.getElementById('accuracy-value').textContent = accuracy.toFixed(0);
            userMarker.setLatLng([latitude, longitude]);
            polyline.addLatLng([latitude, longitude]);
            map.setView([latitude, longitude], map.getZoom());
            calculateStats();
            savLocationToSupabase(latitude, longitude, accuracy, position.coords.speed, heading);
        }

        function handleLocationError(error) {
            const msgs = { 1: ['❌ Accès GPS refusé.', 'error'], 2: ['Position indisponible.', 'warning'], 3: ["Délai dépassé.", 'warning'] };
            const [msg, type] = msgs[error.code] || ['❌ Erreur GPS : ' + error.message, 'error'];
            showAlert(msg, type);
            updateStatus('error', msg);
        }

        async function startClientTracking() {
            if (!livraisonId) { document.getElementById('client-status').textContent = "Aucune livraison dans l'URL."; return; }
            document.getElementById('client-status').textContent = 'Chargement...';
            await fetchLivreurPosition();
            clientPollInterval = setInterval(fetchLivreurPosition, 10000);
        }

        function stopClientTracking() {
            if (clientPollInterval) { clearInterval(clientPollInterval); clientPollInterval = null; }
        }

        async function fetchLivreurPosition() {
            try {
                const db = window.getSupabaseClient ? window.getSupabaseClient() : null;
                if (!db) return;
                const { data: { session } } = await db.auth.getSession();
                if (!session) return;
                const res = await fetch('/api/tracking?livraison_id=' + livraisonId, {
                    headers: { Authorization: 'Bearer ' + session.access_token }
                });
                if (!res.ok) { document.getElementById('client-status').textContent = 'Position indisponible.'; return; }
                const data = await res.json();
                const lat = data.livreur_lat ?? data.latitude;
                const lng = data.livreur_lng ?? data.longitude;
                if (lat == null || lng == null) {
                    document.getElementById('client-status').textContent = "Le livreur n'a pas encore partagé sa position.";
                    updateStatus('inactive', '⏳ En attente du livreur');
                    return;
                }
                document.getElementById('latitude').textContent  = Number(lat).toFixed(6);
                document.getElementById('longitude').textContent = Number(lng).toFixed(6);
                document.getElementById('altitude').textContent  = '--';
                document.getElementById('client-status').textContent = 'Mis à jour : ' + new Date().toLocaleTimeString('fr-CA');
                if (!livreurMarker) {
                    livreurMarker = L.circleMarker([lat, lng], {
                        radius: 12, fillColor: '#B8F53E', color: '#0A0C0F', weight: 2, fillOpacity: 1
                    }).addTo(map).bindPopup('🚚 Livreur');
                } else {
                    livreurMarker.setLatLng([lat, lng]);
                }
                map.setView([lat, lng], Math.max(map.getZoom(), 14));
                updateStatus('active', '🟢 Livreur en route');
            } catch (err) {
                console.error('fetchLivreurPosition:', err);
                document.getElementById('client-status').textContent = 'Erreur de chargement.';
            }
        }

        function calculateStats() {
            if (locationHistory.length < 2) return;
            let total = 0;
            for (let i = 1; i < locationHistory.length; i++) {
                const p = locationHistory[i-1], c = locationHistory[i];
                total += getDistance(p.latitude, p.longitude, c.latitude, c.longitude);
            }
            document.getElementById('distance').textContent = (total / 1000).toFixed(2) + ' km';
            const p = locationHistory[locationHistory.length - 2];
            const c = locationHistory[locationHistory.length - 1];
            const t = (c.timestamp - p.timestamp) / 1000;
            if (t > 0) {
                const d = getDistance(p.latitude, p.longitude, c.latitude, c.longitude);
                document.getElementById('speed').textContent = (d / t * 3.6).toFixed(1) + ' km/h';
            }
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function savLocationToSupabase(lat, lng, accuracy, speed, heading) {
            try {
                const db = window.getSupabaseClient ? window.getSupabaseClient() : null;
                if (!db || !livraisonId) return;
                const { data: { session } } = await db.auth.getSession();
                if (!session) return;
                const res = await fetch('/api/gps-update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + session.access_token },
                    body: JSON.stringify({ livraison_id: livraisonId, latitude: lat, longitude: lng, accuracy, speed, heading, recorded_at: new Date().toISOString() })
                });
                if (!res.ok) console.warn('Erreur GPS API:', res.status);
            } catch (err) { console.error('Erreur GPS API:', err); }
        }

        async function confirmerLivraison() {
            const btn = document.getElementById('confirm-btn');
            btn.disabled = true;
            btn.textContent = 'Envoi en cours...';
            try {
                const db = window.getSupabaseClient ? window.getSupabaseClient() : null;
                if (!db) throw new Error('Client Supabase indisponible');
                const { data: { session } } = await db.auth.getSession();
                if (!session) throw new Error('Session expirée');
                const res = await fetch('/api/confirm-delivery', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + session.access_token },
                    body: JSON.stringify({ livraison_id: livraisonId })
                });
                const result = await res.json();
                if (res.ok) {
                    stopTracking();
                    btn.textContent = '✅ Livraison confirmée !';
                    showAlert('Livraison confirmée ! Paiement en cours de traitement.', 'success');
                    updateStatus('inactive', '✅ Livraison terminée');
                } else {
                    throw new Error(result.error || 'Erreur serveur');
                }
            } catch (err) {
                btn.disabled = false;
                btn.textContent = '✅ Confirmer la livraison';
                showAlert('Erreur : ' + err.message, 'error');
            }
        }

        document.getElementById('mode-livreur').addEventListener('click', function () {
            if (mode === 'livreur') return;
            mode = 'livreur';
            stopClientTracking();
            document.getElementById('livreur-controls').style.display = 'flex';
            document.getElementById('client-controls').style.display  = 'none';
            this.classList.add('active');
            document.getElementById('mode-client').classList.remove('active');
        });

        document.getElementById('mode-client').addEventListener('click', function () {
            if (mode === 'client') return;
            mode = 'client';
            if (isTracking) stopTracking();
            document.getElementById('livreur-controls').style.display = 'none';
            document.getElementById('client-controls').style.display  = 'flex';
            this.classList.add('active');
            document.getElementById('mode-livreur').classList.remove('active');
            startClientTracking();
        });

        document.getElementById('start-tracking').addEventListener('click', startTracking);
        document.getElementById('stop-tracking').addEventListener('click', stopTracking);
        document.getElementById('confirm-btn').addEventListener('click', confirmerLivraison);

        function updateStatus(type, message) {
            const el = document.getElementById('status');
            el.textContent = message;
            el.className = 'tracking-status status-' + type;
        }

        function showAlert(message, type) {
            type = type || 'info';
            const container = document.getElementById('alerts-container');
            const alertEl   = document.getElementById('alert-message');
            alertEl.textContent = message;
            alertEl.className   = 'alert alert-' + type;
            container.style.display = 'block';
            setTimeout(function () { container.style.display = 'none'; }, 6000);
        }

        async function logout() {
            const db = window.getSupabaseClient ? window.getSupabaseClient() : null;
            if (db) await db.auth.signOut();
            window.location.href = '/login.html';
        }

        window.addEventListener('DOMContentLoaded', async function () {
            initMap();
            if (!livraisonId) return;
            const db = window.getSupabaseClient ? window.getSupabaseClient() : null;
            if (!db) return;
            const { data: { session } } = await db.auth.getSession();
            if (!session) return;
            const { data: profile } = await db.from('profiles').select('role').eq('id', session.user.id).single();
            const isLivreur = profile && (profile.role === 'livreur' || profile.role === 'les deux');
            if (isLivreur) {
                showAlert('Livraison détectée — démarrage du suivi GPS...', 'info');
                setTimeout(startTracking, 800);
            } else {
                document.getElementById('mode-client').click();
            }
        });

        window.addEventListener('beforeunload', function () { stopTracking(); stopClientTracking(); });
    </script>
</body>
</html>
