<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors ligne · PorteàPorte</title>
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <link rel="stylesheet" href="/assets/a11y.css">
  <style>
    body { background: var(--brand-bg-dark); color: var(--brand-text); min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .box { max-width: 480px; text-align: center; }
    .icon { font-size: 4rem; margin-bottom: 24px; }
    h1 { font-size: 1.6rem; margin: 0 0 12px; }
    p { color: var(--brand-muted); line-height: 1.65; margin: 0 0 28px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: var(--brand-lime); color: var(--brand-bg-dark); border: none; border-radius: 8px; font-weight: 800; cursor: pointer; text-decoration: none; font-size: 0.95rem; }
    .btn:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">📡</div>
    <h1>Vous êtes hors ligne</h1>
    <p>Vérifiez votre connexion Internet et réessayez. Vos données sont en sécurité.</p>
    <button class="btn" onclick="window.location.reload()">↺ Réessayer</button>
  </div>
  <script src="/js/cookie-consent.js" defer></script>
</body>
</html>
