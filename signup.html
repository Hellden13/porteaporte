<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - PorteàPorte</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <link rel="stylesheet" href="/assets/a11y.css">
  <link rel="stylesheet" href="/assets/premium-system.css">
  <link rel="stylesheet" href="/assets/visual-polish.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/modal-helper.js"></script>
  <style>
    body{min-height:100vh;display:grid;place-items:center;padding:24px}
    .auth-card{width:100%;max-width:520px;background:var(--brand-bg-surface);border:1px solid var(--brand-border);border-radius:12px;padding:28px}
    .logo{text-align:center;font-size:1.8rem;font-weight:900;margin-bottom:8px}
    .subtitle{text-align:center;color:var(--brand-muted);margin-bottom:24px}
    .form-group{display:grid;gap:8px;margin-bottom:16px}
    label{font-weight:700}
    .role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .role-option{border:1px solid var(--brand-border);background:var(--brand-bg-dark);color:var(--brand-text);border-radius:8px;padding:12px;text-align:center;cursor:pointer}
    .role-option input{display:none}
    .role-option:has(input:checked){border-color:var(--brand-cyan);background:rgba(0,217,255,.1)}
    .auth-btn{width:100%;margin-top:8px}
    .links{text-align:center;margin-top:16px;color:var(--brand-muted)}
  </style>
</head>
<body>
  <main class="auth-card">
    <div class="logo">PorteàPorte</div>
    <p class="subtitle">Créer un compte pour publier ou livrer des colis.</p>

    <form id="signupForm">
      <div class="form-group">
        <label for="prenom">Prénom</label>
        <input id="prenom" name="prenom" autocomplete="given-name" required>
      </div>
      <div class="form-group">
        <label for="nom">Nom</label>
        <input id="nom" name="nom" autocomplete="family-name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div style="position:relative">
          <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" required style="padding-right:44px;width:100%;box-sizing:border-box">
          <button type="button" onclick="togglePwd('password','eye-pwd')" id="eye-pwd" aria-label="Afficher le mot de passe" title="Afficher/masquer" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#8fa0b4;padding:0;line-height:0;display:flex;align-items:center">
            <svg id="eye-pwd-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Rôle</label>
        <div class="role-grid">
          <label class="role-option"><input type="radio" name="role" value="expediteur" checked>Expéditeur</label>
          <label class="role-option"><input type="radio" name="role" value="livreur">Livreur</label>
          <label class="role-option"><input type="radio" name="role" value="les deux">Les deux</label>
        </div>
      </div>

      <!-- Anti-bot honeypot : champ invisible aux humains, piège les bots qui remplissent tout -->
      <div style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden" aria-hidden="true">
        <label for="website">Ne pas remplir</label>
        <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
      </div>
      <input type="hidden" id="form-rendered-at" value="">

      <button class="auth-btn" type="submit" id="signupBtn">Créer mon compte</button>
      <p style="font-size:.78rem;color:var(--brand-muted);text-align:center;margin-top:10px">
        En créant un compte, tu acceptes nos <a href="/cgu.html" target="_blank">CGU</a> et notre <a href="/confidentialite.html" target="_blank">politique de confidentialité (Loi 25)</a>.
      </p>
    </form>

    <div class="links">Déjà inscrit? <a href="/login.html">Se connecter</a></div>
  </main>

  <script>
    const db = window.getSupabaseClient ? window.getSupabaseClient() : window.db;

    function togglePwd(inputId, btnId) {
      var input = document.getElementById(inputId);
      var icon  = document.getElementById(btnId + '-icon');
      var show  = input.type === 'password';
      input.type = show ? 'text' : 'password';
      icon.innerHTML = show
        ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
    const form = document.getElementById('signupForm');
    const btn = document.getElementById('signupBtn');

    // Honeypot : enregistre le moment où le form est rendu (bots remplissent en <2s)
    document.getElementById('form-rendered-at').value = Date.now();

    function getReferralCodeFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return String(params.get('ref') || '')
        .trim()
        .toUpperCase()
        .replace(/[^A-Z0-9_-]/g, '')
        .slice(0, 32);
    }

    const incomingReferralCode = getReferralCodeFromUrl();
    if (incomingReferralCode) {
      localStorage.setItem('PAP_REFERRAL_CODE', incomingReferralCode);
    }

    function getStoredReferralCode() {
      return String(localStorage.getItem('PAP_REFERRAL_CODE') || '')
        .trim()
        .toUpperCase()
        .replace(/[^A-Z0-9_-]/g, '')
        .slice(0, 32);
    }

    async function claimReferralIfPossible(session) {
      const code = getStoredReferralCode();
      if (!session || !code) return;
      try {
        const res = await fetch('/api/platform?endpoint=referral', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + session.access_token },
          body: JSON.stringify({ endpoint: 'referral', action: 'claim', code })
        });
        const out = await res.json().catch(() => ({}));
        if (res.ok && out.success && out.claim && out.claim.reason !== 'insert_failed') {
          localStorage.removeItem('PAP_REFERRAL_CODE');
        }
      } catch (_) {}
    }

    // Destination après inscription (cohérent avec login.html : next / redirect / return)
    function getSafeNextUrl() {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get('next') || params.get('redirect') || params.get('return');
      if (!raw) return '';
      try {
        const url = new URL(raw, window.location.origin);
        if (url.origin !== window.location.origin) return '';
        const path = url.pathname || '';
        if (!path || path === '/login.html' || path === '/signup.html' || path.startsWith('/api/') || path.startsWith('/admin/')) return '';
        return url.pathname + url.search + url.hash;
      } catch (_) { return ''; }
    }
    const nextUrl = getSafeNextUrl();

    // Le lien "Se connecter" garde la destination
    (function carryNextToLogin() {
      if (!nextUrl) return;
      document.querySelectorAll('.links a[href="/login.html"]').forEach(a => {
        a.href = '/login.html?next=' + encodeURIComponent(nextUrl);
      });
    })();

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Création...';

      // Anti-bot honeypot : si le champ caché est rempli OU si le form est soumis en <2s → bot
      const honeypot = document.getElementById('website').value;
      const renderedAt = parseInt(document.getElementById('form-rendered-at').value, 10) || 0;
      const elapsed = Date.now() - renderedAt;
      if (honeypot || elapsed < 2000) {
        // Réponse silencieuse : on fait croire que ça marche pour ne pas alerter le bot
        btn.textContent = 'Création...';
        setTimeout(() => {
          showSuccess('Compte créé. 📬 Vérifie ton email (et le dossier spam au cas où).');
          btn.textContent = 'Email envoyé';
        }, 1500);
        return;
      }

      const role = new FormData(form).get('role');
      const prenom = form.prenom.value.trim();
      const nom = form.nom.value.trim();
      const email = form.email.value.trim();
      const referralCode = getStoredReferralCode();
      const redirectParams = new URLSearchParams();
      if (nextUrl) redirectParams.set('next', nextUrl);
      if (referralCode) redirectParams.set('ref', referralCode);
      const redirectSuffix = redirectParams.toString() ? '?' + redirectParams.toString() : '';

      const { data, error } = await db.auth.signUp({
        email,
        password: form.password.value,
        options: {
          emailRedirectTo: window.location.origin + '/role-choice.html' + redirectSuffix,
          data: { prenom, nom, role, referral_code: referralCode || null }
        }
      });

      if (error) {
        showError(error.message || 'Inscription impossible.');
        btn.disabled = false;
        btn.textContent = 'Créer mon compte';
        return;
      }

      // Email de bienvenue (best-effort, non bloquant)
      fetch('/api/notifier', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'bienvenue',
          to: email,
          data: { prenom, role }
        })
      }).catch(() => {});

      if (data.session) {
        const emailConfirmed = Boolean(data.user.email_confirmed_at || data.user.confirmed_at);
        await db.from('profiles').upsert({
          id: data.user.id,
          email,
          prenom,
          nom,
          role,
          email_verified: emailConfirmed,
          verification_status: 'pending',
          driver_status: 'not_started',
          mis_a_jour_le: new Date().toISOString()
        }, { onConflict: 'id' });
        await claimReferralIfPossible(data.session);
        if (!emailConfirmed) {
          await db.auth.signOut().catch(() => {});
          showSuccess('Compte créé. 📬 Vérifie ton email (et tes spams au cas où) avant d’ouvrir le dashboard.');
          btn.textContent = 'Email de confirmation envoyé';
          return;
        }
        window.location.href = nextUrl || (role === 'expediteur' ? '/dashboard-expediteur.html' : '/livreur.html');
        return;
      }

      showSuccess('Compte créé. 📬 Vérifie ton email (et tes spams au cas où) pour confirmer ton inscription.');
      btn.textContent = 'Email de confirmation envoyé';
    });
  </script>
  <script src="/js/support-widget.js"></script>
  <script src="/js/cookie-consent.js" defer></script>
</body>
</html>
