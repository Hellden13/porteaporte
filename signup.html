<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - PorteàPorte</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <link rel="stylesheet" href="/assets/a11y.css">
  <link rel="stylesheet" href="/assets/premium-system.css">
  <link rel="stylesheet" href="/assets/visual-polish.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/modal-helper.js"></script>
  <!-- Cloudflare Turnstile : protection anti-bots -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" defer></script>
  <style>
    body{min-height:100vh;display:grid;place-items:center;padding:24px}
    .auth-card{width:100%;max-width:520px;background:var(--brand-bg-surface);border:1px solid var(--brand-border);border-radius:12px;padding:28px}
    .logo{text-align:center;font-size:1.8rem;font-weight:900;margin-bottom:8px}
    .subtitle{text-align:center;color:var(--brand-muted);margin-bottom:24px}
    .form-group{display:grid;gap:8px;margin-bottom:16px}
    label{font-weight:700}
    .role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .role-option{border:1px solid var(--brand-border);background:var(--brand-bg-dark);color:var(--brand-text);border-radius:8px;padding:12px;text-align:center;cursor:pointer}
    .role-option input{display:none}
    .role-option:has(input:checked){border-color:var(--brand-cyan);background:rgba(0,217,255,.1)}
    .auth-btn{width:100%;margin-top:8px}
    .links{text-align:center;margin-top:16px;color:var(--brand-muted)}
  </style>
</head>
<body>
  <main class="auth-card">
    <div class="logo">PorteàPorte</div>
    <p class="subtitle">Créer un compte pour publier ou livrer des colis.</p>

    <form id="signupForm">
      <div class="form-group">
        <label for="prenom">Prénom</label>
        <input id="prenom" name="prenom" autocomplete="given-name" required>
      </div>
      <div class="form-group">
        <label for="nom">Nom</label>
        <input id="nom" name="nom" autocomplete="family-name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" required>
      </div>

      <div class="form-group">
        <label>Rôle</label>
        <div class="role-grid">
          <label class="role-option"><input type="radio" name="role" value="expediteur" checked>Expéditeur</label>
          <label class="role-option"><input type="radio" name="role" value="livreur">Livreur</label>
          <label class="role-option"><input type="radio" name="role" value="les deux">Les deux</label>
        </div>
      </div>

      <!-- Anti-bot Turnstile (Cloudflare) -->
      <div class="form-group" style="display:flex;justify-content:center;margin:14px 0">
        <div class="cf-turnstile" data-sitekey="0x4AAAAAAB1zXxxxxxxxxxxx" data-callback="onTurnstileSuccess" data-theme="dark"></div>
      </div>
      <input type="hidden" id="turnstile-token" name="cf-turnstile-response">

      <button class="auth-btn" type="submit" id="signupBtn" disabled>Créer mon compte</button>
      <p style="font-size:.78rem;color:var(--brand-muted);text-align:center;margin-top:10px">
        En créant un compte, tu acceptes nos <a href="/cgu.html" target="_blank">CGU</a> et notre <a href="/confidentialite.html" target="_blank">politique de confidentialité (Loi 25)</a>.
      </p>
    </form>

    <div class="links">Déjà inscrit? <a href="/login.html">Se connecter</a></div>
  </main>

  <script>
    const db = window.getSupabaseClient ? window.getSupabaseClient() : window.db;
    const form = document.getElementById('signupForm');
    const btn = document.getElementById('signupBtn');
    let turnstileToken = null;

    // Callback Turnstile : déverrouille le bouton submit
    window.onTurnstileSuccess = function (token) {
      turnstileToken = token;
      document.getElementById('turnstile-token').value = token;
      btn.disabled = false;
    };

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Création...';

      // 1) Vérifier Turnstile côté serveur AVANT de créer le compte
      if (!turnstileToken) {
        showError('Anti-robot non validé. Recharge la page.');
        btn.disabled = false;
        btn.textContent = 'Créer mon compte';
        return;
      }
      try {
        const tv = await fetch('/api/turnstile-verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: turnstileToken })
        });
        const tvd = await tv.json();
        if (!tv.ok || !tvd.success) {
          showError('Vérification anti-robot échouée. Recharge la page.');
          btn.disabled = false;
          btn.textContent = 'Créer mon compte';
          return;
        }
      } catch (e) {
        // En cas d'indisponibilité de Turnstile : on log mais laisse passer (fail-open) — éviter de bloquer 100% des users
        console.warn('[turnstile] indisponible, fail-open:', e.message);
      }

      const role = new FormData(form).get('role');
      const prenom = form.prenom.value.trim();
      const nom = form.nom.value.trim();
      const email = form.email.value.trim();

      const { data, error } = await db.auth.signUp({
        email,
        password: form.password.value,
        options: {
          emailRedirectTo: window.location.origin + '/role-choice.html',
          data: { prenom, nom, role }
        }
      });

      if (error) {
        showError(error.message || 'Inscription impossible.');
        btn.disabled = false;
        btn.textContent = 'Créer mon compte';
        return;
      }

      // Email de bienvenue (best-effort, non bloquant)
      fetch('/api/notifier', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'bienvenue',
          to: email,
          data: { prenom, role }
        })
      }).catch(() => {});

      if (data.session) {
        const emailConfirmed = Boolean(data.user.email_confirmed_at || data.user.confirmed_at);
        await db.from('profiles').upsert({
          id: data.user.id,
          email,
          prenom,
          nom,
          role,
          email_verified: emailConfirmed,
          verification_status: 'pending',
          driver_status: 'not_started',
          mis_a_jour_le: new Date().toISOString()
        }, { onConflict: 'id' }).catch(() => {});
        if (!emailConfirmed) {
          await db.auth.signOut().catch(() => {});
          showSuccess('Compte créé. Vérifie ton email avant d’ouvrir un dashboard.');
          btn.textContent = 'Email de confirmation envoyé';
          return;
        }
        window.location.href = role === 'expediteur' ? '/dashboard-expediteur.html' : '/livreur.html';
        return;
      }

      showSuccess('Compte créé. Vérifie ton email pour confirmer ton inscription avant de te connecter.');
      btn.textContent = 'Email de confirmation envoyé';
    });
  </script>
  <script src="/js/support-widget.js"></script>
  <script src="/js/cookie-consent.js" defer></script>
</body>
</html>
