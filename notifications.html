<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Notifications - Porte脙聽Porte">
    <title>Notifications - Porte脙聽Porte</title>
    
    <link rel="stylesheet" href="design-system.css">
    
    <style>
        .notifications-container {
            max-width: 700px;
            margin: 0 auto;
            padding: var(--spacing-lg);
        }

        .notifications-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-xl);
        }

        .notifications-title h1 {
            margin: 0;
        }

        .notification-actions {
            display: flex;
            gap: var(--spacing-sm);
        }

        .notification-actions .btn {
            min-width: 120px;
        }

        .notification-tabs {
            display: flex;
            gap: var(--spacing-md);
            border-bottom: 1px solid var(--color-border);
            margin-bottom: var(--spacing-lg);
            overflow-x: auto;
            padding-bottom: var(--spacing-sm);
        }

        .notification-tab {
            padding: var(--spacing-sm) var(--spacing-md);
            background: transparent;
            border: none;
            color: var(--color-text-secondary);
            cursor: pointer;
            font-weight: var(--font-weight-medium);
            font-size: var(--font-size-sm);
            border-bottom: 2px solid transparent;
            transition: all var(--transition-base);
            white-space: nowrap;
        }

        .notification-tab.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }

        .notifications-list {
            display: grid;
            gap: var(--spacing-md);
        }

        .notification-item {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            display: flex;
            gap: var(--spacing-md);
            align-items: flex-start;
            transition: all var(--transition-base);
            cursor: pointer;
        }

        .notification-item:hover {
            border-color: var(--color-primary);
            background: var(--color-surface-alt);
        }

        .notification-item.unread {
            border-left: 4px solid var(--color-primary);
        }

        .notification-icon {
            font-size: 1.5rem;
            min-width: 32px;
            text-align: center;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: var(--font-weight-semibold);
            color: var(--color-text);
            margin-bottom: var(--spacing-xs);
        }

        .notification-message {
            color: var(--color-text-secondary);
            font-size: var(--font-size-sm);
            line-height: var(--line-height-normal);
            margin-bottom: var(--spacing-xs);
        }

        .notification-time {
            font-size: var(--font-size-xs);
            color: var(--color-text-tertiary);
        }

        .notification-action {
            margin-top: var(--spacing-sm);
        }

        .notification-action .btn {
            min-width: 100px;
            font-size: var(--font-size-xs);
            padding: var(--spacing-xs) var(--spacing-sm);
        }

        .notification-status {
            display: flex;
            gap: var(--spacing-xs);
            align-items: center;
        }

        .status-badge {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-primary);
        }

        .empty-state {
            text-align: center;
            padding: var(--spacing-3xl) var(--spacing-lg);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: var(--spacing-md);
        }

        .empty-state-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-bold);
            margin-bottom: var(--spacing-sm);
        }

        .empty-state-text {
            color: var(--color-text-secondary);
        }

        .badge-success {
            display: inline-block;
            padding: var(--spacing-xs) var(--spacing-sm);
            background: rgba(16, 185, 129, 0.2);
            color: var(--color-success);
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-semibold);
        }

        .badge-warning {
            display: inline-block;
            padding: var(--spacing-xs) var(--spacing-sm);
            background: rgba(245, 158, 11, 0.2);
            color: var(--color-warning);
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-semibold);
        }

        .badge-info {
            display: inline-block;
            padding: var(--spacing-xs) var(--spacing-sm);
            background: rgba(59, 130, 246, 0.2);
            color: var(--color-info);
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-semibold);
        }
    </style>
    <link rel="stylesheet" href="/assets/brand-uniform.css">
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <div class="navbar-brand">冒聼職職 Porte脙聽Porte</div>
                <div id="auth-user-info" class="flex items-center gap-md">
                    <span id="auth-user-name" class="text-sm font-semibold"></span>
                    <button id="auth-logout-btn" class="btn btn-ghost btn-sm" onclick="AUTH_API.logout()">D脙漏connexion</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- NOTIFICATIONS CONTAINER -->
    <div class="notifications-container">
        <!-- HEADER -->
        <div class="notifications-header">
            <div class="notifications-title">
                <h1>冒聼聰聰 Notifications</h1>
                <p class="text-secondary">Restez inform脙漏 de toutes vos activit脙漏s</p>
            </div>
            <div class="notification-actions">
                <button class="btn btn-ghost btn-sm" onclick="markAllAsRead()">Tout lire</button>
                <button class="btn btn-ghost btn-sm" onclick="clearAll()">Tout effacer</button>
            </div>
        </div>

        <!-- TABS -->
        <div class="notification-tabs">
            <button class="notification-tab active" onclick="filterNotifications('all')">冒聼聯卢 Tous (0)</button>
            <button class="notification-tab" onclick="filterNotifications('unread')">冒聼聠聲 Non lus (0)</button>
            <button class="notification-tab" onclick="filterNotifications('missions')">冒聼聯娄 Livraisons (0)</button>
            <button class="notification-tab" onclick="filterNotifications('payments')">冒聼聮掳 Paiements (0)</button>
            <button class="notification-tab" onclick="filterNotifications('messages')">冒聼聮卢 Messages (0)</button>
        </div>

        <!-- NOTIFICATIONS LIST -->
        <div id="notifications-container" class="notifications-list">
            <div class="empty-state">
                <div class="empty-state-icon">冒聼聯颅</div>
                <div class="empty-state-title">Aucune notification</div>
                <div class="empty-state-text">Vous 脙陋tes 脙聽 jour!</div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth-complete.js"></script>
    
    <script>
        let allNotifications = [];
        let currentFilter = 'all';

        // Notifications de d脙漏mo
        const demoNotifications = [
            {
                id: '1',
                type: 'mission_accepted',
                icon: '芒聹聟',
                title: 'Livraison accept脙漏e',
                message: 'Votre livraison "Colis pour Montr脙漏al" a 脙漏t脙漏 accept脙漏e par un livreur',
                timestamp: new Date(Date.now() - 5 * 60000),
                read: false,
                category: 'missions',
                action: 'Voir d脙漏tails'
            },
            {
                id: '2',
                type: 'payment_received',
                icon: '冒聼聮鲁',
                title: 'Paiement re脙搂u',
                message: 'Vous avez re脙搂u $25.00 pour la livraison #12345',
                timestamp: new Date(Date.now() - 30 * 60000),
                read: false,
                category: 'payments',
                action: 'Voir transaction'
            },
            {
                id: '3',
                type: 'coins_earned',
                icon: '冒聼聨聛',
                title: '50 PorteCoins gagn脙漏s!',
                message: 'Vous avez compl脙漏t脙漏 votre 5e livraison! Bonus: 50 PorteCoins',
                timestamp: new Date(Date.now() - 2 * 3600000),
                read: true,
                category: 'missions',
                action: 'Voir r脙漏compenses'
            },
            {
                id: '4',
                type: 'rating_received',
                icon: '芒颅聬',
                title: '5 脙漏toiles re脙搂ues',
                message: 'Un utilisateur vous a laiss脙漏 une excellente 脙漏valuation',
                timestamp: new Date(Date.now() - 5 * 3600000),
                read: true,
                category: 'messages',
                action: 'Voir avis'
            },
            {
                id: '5',
                type: 'new_mission',
                icon: '冒聼聯卢',
                title: 'Nouvelle livraison disponible',
                message: 'Une nouvelle livraison "$30 - Montr脙漏al vers Laval" vient d\'arriver',
                timestamp: new Date(Date.now() - 24 * 3600000),
                read: true,
                category: 'missions',
                action: 'Consulter'
            }
        ];

        async function initPage() {
            if (!await AUTH_API.requireAuth()) {
                return;
            }

            const user = AUTH_API.getUser();
            document.getElementById('auth-user-name').textContent = `${user.prenom} ${user.nom}`;

            // Charger les notifications (d脙漏mo pour maintenant)
            allNotifications = demoNotifications;
            displayNotifications();
            updateTabCounts();
        }

        function displayNotifications() {
            const container = document.getElementById('notifications-container');
            let filtered = allNotifications;

            if (currentFilter !== 'all') {
                filtered = allNotifications.filter(n => n.category === currentFilter);
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">冒聼聯颅</div>
                        <div class="empty-state-title">Aucune notification</div>
                        <div class="empty-state-text">Vous 脙陋tes 脙聽 jour!</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(notif => `
                <div class="notification-item ${!notif.read ? 'unread' : ''}" onclick="markAsRead('${notif.id}')">
                    <div class="notification-icon">${notif.icon}</div>
                    <div class="notification-content">
                        <div class="notification-title">${notif.title}</div>
                        <div class="notification-message">${notif.message}</div>
                        <div class="notification-time">${getTimeAgo(notif.timestamp)}</div>
                        ${notif.action ? `
                            <div class="notification-action">
                                <button class="btn btn-primary btn-sm">${notif.action}</button>
                            </div>
                        ` : ''}
                    </div>
                    ${!notif.read ? `
                        <div class="notification-status">
                            <span class="status-badge"></span>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function filterNotifications(filter) {
            currentFilter = filter;

            // Update tabs
            document.querySelectorAll('.notification-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            displayNotifications();
        }

        function markAsRead(notifId) {
            const notif = allNotifications.find(n => n.id === notifId);
            if (notif) {
                notif.read = true;
                displayNotifications();
                updateTabCounts();
            }
        }

        function markAllAsRead() {
            allNotifications.forEach(n => n.read = true);
            displayNotifications();
            updateTabCounts();
        }

        function clearAll() {
            if (confirm('脙聤tes-vous s脙禄r de vouloir effacer toutes les notifications?')) {
                allNotifications = [];
                displayNotifications();
                updateTabCounts();
            }
        }

        function updateTabCounts() {
            const counts = {
                all: allNotifications.length,
                unread: allNotifications.filter(n => !n.read).length,
                missions: allNotifications.filter(n => n.category === 'missions').length,
                payments: allNotifications.filter(n => n.category === 'payments').length,
                messages: allNotifications.filter(n => n.category === 'messages').length
            };

            document.querySelectorAll('.notification-tab').forEach(tab => {
                const text = tab.textContent;
                if (text.includes('Tous')) {
                    tab.textContent = `冒聼聯卢 Tous (${counts.all})`;
                } else if (text.includes('Non lus')) {
                    tab.textContent = `冒聼聠聲 Non lus (${counts.unread})`;
                } else if (text.includes('Livraisons')) {
                    tab.textContent = `冒聼聯娄 Livraisons (${counts.missions})`;
                } else if (text.includes('Paiements')) {
                    tab.textContent = `冒聼聮掳 Paiements (${counts.payments})`;
                } else if (text.includes('Messages')) {
                    tab.textContent = `冒聼聮卢 Messages (${counts.messages})`;
                }
            });
        }

        function getTimeAgo(date) {
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);

            if (seconds < 60) return '脙聙 l\'instant';
            if (seconds < 3600) return `Il y a ${Math.floor(seconds / 60)}m`;
            if (seconds < 86400) return `Il y a ${Math.floor(seconds / 3600)}h`;
            return `Il y a ${Math.floor(seconds / 86400)}j`;
        }

        // Init
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initPage);
        } else {
            initPage();
        }
    </script>
</body>
</html>
