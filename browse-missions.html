<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Missions disponibles pour livreurs verifies - PorteaPorte">
  <title>Missions disponibles - PorteaPorte</title>
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <link rel="stylesheet" href="/assets/visual-polish.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/modal-helper.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh}
    .topbar{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;padding:18px 24px;background:rgba(10,12,16,.95);border-bottom:1px solid var(--brand-border)}
    .brand{font-weight:900;font-size:22px;letter-spacing:-1px;text-decoration:none;color:var(--brand-text)}
    .page{max-width:1120px;margin:0 auto;padding:32px 20px 56px}
    .hero{display:flex;justify-content:space-between;gap:18px;align-items:flex-end;margin-bottom:24px}
    h1{font-size:34px;line-height:1.12;margin-bottom:8px}
    .muted{color:var(--brand-muted);line-height:1.55}
    .status{border:1px solid var(--brand-border);background:var(--brand-bg-surface);border-radius:8px;padding:12px 14px;color:var(--brand-muted);font-size:14px}
    .missions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .mission-card{background:var(--brand-bg-surface);border:1px solid var(--brand-border);border-radius:10px;padding:18px;display:flex;flex-direction:column;gap:10px}
    .mission-card h2{font-size:18px}
    .pill{display:inline-flex;align-items:center;width:max-content;border:1px solid var(--brand-border);border-radius:999px;padding:4px 9px;color:var(--brand-muted);font-size:12px}
    .route{display:grid;gap:5px;color:var(--brand-text)}
    .meta{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .meta div{border:1px solid var(--brand-border);background:var(--brand-bg-dark);border-radius:8px;padding:9px}
    .meta span{display:block;color:var(--brand-muted);font-size:11px;margin-bottom:2px}
    .price{font-size:26px;font-weight:900;color:var(--brand-lime);margin-top:4px}
    .empty{background:var(--brand-bg-surface);border:1px solid var(--brand-border);border-radius:10px;padding:40px 24px;color:var(--brand-muted);text-align:center}
    .empty-icon{font-size:48px;margin-bottom:12px}
    .empty h3{font-size:18px;color:var(--brand-text);margin-bottom:8px}
    .empty p{font-size:14px;line-height:1.6;margin-bottom:16px}
    .cta-box{background:var(--brand-bg-surface);border:1px solid var(--brand-border);border-radius:12px;padding:40px 24px;text-align:center;margin-top:16px}
    .cta-box .cta-icon{font-size:52px;margin-bottom:16px}
    .cta-box h3{font-size:22px;margin-bottom:8px}
    .cta-box p{color:var(--brand-muted);font-size:14px;line-height:1.6;max-width:420px;margin:0 auto 24px}
    .cta-box .btn{width:auto;display:inline-block;text-decoration:none;padding:13px 28px;font-size:15px}
    .btn{margin-top:auto;width:100%;border:none;border-radius:8px;padding:12px 14px;font-weight:850;cursor:pointer;background:linear-gradient(135deg,var(--brand-cyan),var(--brand-lime));color:var(--brand-bg-dark)}
    .btn.secondary{width:auto;background:var(--brand-bg-surface-light);color:var(--brand-text);border:1px solid var(--brand-border);text-decoration:none}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    /* Matching score */
    .match-bar{margin:6px 0 2px;height:5px;background:var(--brand-border);border-radius:999px;overflow:hidden}
    .match-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--brand-cyan),var(--brand-lime));transition:width .4s ease}
    .match-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--brand-muted);margin-bottom:8px}
    .match-score{font-weight:800;color:var(--brand-lime)}
    .match-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
    .match-tag{padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid}
    .tag-green{color:var(--brand-lime);border-color:rgba(93,191,255,.3);background:rgba(93,191,255,.07)}
    .tag-yellow{color:#fbbf24;border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.07)}
    .tag-red{color:#ff8a8a;border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.07)}
    /* Eco bonus */
    .eco-gain{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:8px 0;padding:8px 12px;border-radius:8px;background:rgba(93,191,255,.07);border:1px solid rgba(93,191,255,.2)}
    .eco-gain-left{font-size:11px;color:var(--brand-lime);font-weight:700}
    .eco-gain-right{font-size:13px;font-weight:900;color:var(--brand-lime)}
    .eco-banner-top{margin-bottom:16px;padding:12px 14px;border-radius:9px;background:rgba(93,191,255,.08);border:1px solid rgba(93,191,255,.25);font-size:13px;color:var(--brand-lime);font-weight:700;display:flex;align-items:center;gap:10px}
    .eco-banner-top span{color:var(--brand-muted);font-weight:400;font-size:12px}
    @media(max-width:720px){.topbar{padding:14px 16px}.hero{display:block}.hero .btn{margin-top:14px}.page{padding:24px 14px}h1{font-size:28px}}
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/index.html">PorteàPorte</a>
    <a class="btn secondary" href="/dashboard-livreur.html">Mon dashboard</a>
  </header>

  <main class="page">
    <section class="hero">
      <div>
        <h1>Missions disponibles</h1>
        <p class="muted">Les adresses completes restent masquees avant acceptation. Seuls les livreurs verifies peuvent voir et accepter les vraies livraisons.</p>
      </div>
      <button class="btn secondary" type="button" onclick="loadMissions()">Rafraichir</button>
    </section>

    <div id="status" class="status" style="display:none"></div>
    <div id="cta-login" style="display:none"></div>
    <section id="missions-list" class="missions-grid" style="margin-top:16px"></section>
  </main>

  <script>
    const db = window.getSupabaseClient();
    let currentSession = null;
    let missions = [];

    function showError(msg) {
      const el = document.getElementById('status');
      if (el) { el.textContent = msg; el.style.color = 'var(--brand-danger, #ff6b6b)'; el.style.display = 'block'; }
      else alert('Erreur: ' + msg);
    }
    function showSuccess(msg) {
      const el = document.getElementById('status');
      if (el) { el.textContent = msg; el.style.color = 'var(--brand-lime, #5dbfff)'; el.style.display = 'block'; }
    }

    function money(value) {
      const n = Number(value || 0);
      return n.toLocaleString('fr-CA', { style: 'currency', currency: 'CAD' });
    }

    function text(value, fallback) {
      return value === null || value === undefined || value === '' ? fallback : String(value);
    }

    /* Échappement HTML — prévention XSS */
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#x27;');
    }

    function setStatus(message, type) {
      const el = document.getElementById('status');
      el.textContent = message;
      el.style.display = 'block';
      el.style.borderColor = type === 'error' ? '#EF4444' : '#1F2937';
      el.style.color = type === 'error' ? '#ffb4b4' : '#A8ACB1';
    }

    function showLoginCta() {
      document.getElementById('status').style.display = 'none';
      document.getElementById('cta-login').style.display = 'block';
      document.getElementById('cta-login').innerHTML = `
        <div class="cta-box">
          <div class="cta-icon">📦</div>
          <h3>Des missions t'attendent</h3>
          <p>Connecte-toi avec ton compte livreur vérifié pour voir les livraisons disponibles dans ta zone et commencer à gagner.</p>
          <a class="btn" href="/login.html">Se connecter</a>
          &nbsp;&nbsp;
          <a class="btn secondary" href="/devenir-livreur.html">Devenir livreur</a>
        </div>`;
    }

    async function requireSession() {
      const { data } = await db.auth.getSession();
      currentSession = data && data.session ? data.session : null;
      if (!currentSession) {
        showLoginCta();
        return false;
      }
      return true;
    }

    async function loadMissions() {
      document.getElementById('cta-login').style.display = 'none';
      document.getElementById('missions-list').innerHTML = '';
      setStatus('Recherche de missions sur ta route...', 'info');
      try {
        if (window.PorteAuth && !await window.PorteAuth.requireVerifiedDriver('/livreur.html')) return;
        if (!await requireSession()) return;
        /* Load eco bonus from profile */
        const { data: prof } = await db.from('profiles').select('eco_bonus,transport_mode').eq('id', currentSession.user.id).single();
        window._livreurEcoBonus = prof?.eco_bonus || 0;
        window._livreurEcoMode  = prof?.transport_mode || '';

        const res = await fetch('/api/available-livraisons', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + currentSession.access_token
          },
          body: JSON.stringify({})
        });
        const out = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error((out.error || `Erreur ${res.status}`) + (out.details ? ': ' + out.details : ''));

        missions = out.livraisons || [];
        renderMissions(out.transport_mode || 'unknown');
      } catch (err) {
        console.error('Missions indisponibles:', err);
        setStatus(err.message || 'Missions indisponibles pour le moment', 'error');
        document.getElementById('missions-list').innerHTML = '';
      }
    }

    function computeMatchScore(m, mode) {
      let score = 60; // base
      const tags = [];

      // Transport compatibility
      const dist = m.distance_km || 0;
      const poids = m.poids_kg || 0;
      if (mode === 'velo') {
        if (dist <= 15 && poids <= 10) { score += 30; tags.push({t:'Trajet idéal vélo', c:'green'}); }
        else if (dist > 30) { score -= 25; tags.push({t:'Trop loin pour vélo', c:'red'}); }
        else if (poids > 15) { score -= 20; tags.push({t:'Colis lourd', c:'yellow'}); }
      } else if (mode === 'voiture') {
        if (dist >= 20 && dist <= 100) { score += 20; tags.push({t:'Distance idéale', c:'green'}); }
        if (poids <= 50) { score += 10; }
      } else if (mode === 'camion' || mode === 'camionnette') {
        if (poids >= 20) { score += 25; tags.push({t:'Charge adaptée', c:'green'}); }
        score += 10;
      } else {
        score += 10;
      }

      // Price attractiveness
      const gain = (m.prix_total || 0) * 0.60;
      if (gain >= 30) { score += 15; tags.push({t:'Bon gain', c:'green'}); }
      else if (gain >= 15) { score += 7; tags.push({t:'Gain correct', c:'yellow'}); }

      // Distance bonus (short = easier)
      if (dist > 0 && dist <= 20) { score += 5; tags.push({t:'Livraison courte', c:'green'}); }

      // Compatibility text hint
      if (m.compatibilite && m.compatibilite.toLowerCase().includes('idéal')) score += 10;

      score = Math.max(10, Math.min(100, score));
      return { score, tags };
    }

    function matchLabel(score) {
      if (score >= 85) return 'Excellent match';
      if (score >= 65) return 'Bon match';
      if (score >= 45) return 'Match moyen';
      return 'Match faible';
    }

    function renderMissions(mode) {
      const container = document.getElementById('missions-list');
      if (!missions.length) {
        document.getElementById('status').style.display = 'none';
        container.innerHTML = `
          <div class="empty" style="grid-column:1/-1">
            <div class="empty-icon">🔍</div>
            <h3>Aucune mission pour l'instant</h3>
            <p>Il n'y a pas encore de livraisons compatibles avec ton mode de transport dans ta zone.<br>Reviens dans quelques minutes ou ajuste ta zone dans ton profil.</p>
            <button class="btn secondary" type="button" onclick="loadMissions()" style="display:inline-block;width:auto;padding:10px 22px">Rafraîchir</button>
          </div>`;
        return;
      }

      // Sort by match score descending
      const scored = missions.map(m => ({ ...m, _match: computeMatchScore(m, mode) }));
      scored.sort((a, b) => b._match.score - a._match.score);

      /* Fetch livreur eco_bonus from profile (stored on loadMissions) */
      const ecoBonus   = currentSession ? (window._livreurEcoBonus || 0) : 0;
      const ecoMode    = window._livreurEcoMode || '';
      const ECO_ICONS  = { pieds:'🚶', velo:'🚴', trottinette:'🛴', skateboard:'🛹', voiture_electrique:'🔋🚗', moto_electrique:'🔋🏍️', camion_electrique:'🔋🚛' };

      let bannerHtml = '';
      if (ecoBonus > 0) {
        bannerHtml = `<div class="eco-banner-top">${ECO_ICONS[ecoMode] || '🌱'} Bonus écologique +${ecoBonus}% actif — ton gain réel est affiché sur chaque mission. <span>Merci de livrer vert !</span></div>`;
      }

      setStatus(`${scored.length} mission(s) · triées par compatibilité · Mode: ${mode}.`, 'info');
      container.innerHTML = bannerHtml + scored.map((m) => {
        const { score, tags } = m._match;
        const fillColor = score >= 75 ? 'var(--brand-lime)' : score >= 50 ? '#fbbf24' : '#EF4444';

        const baseGain = (m.prix_total || 0) * 0.60;
        const ecoGain  = baseGain * (ecoBonus / 100);
        const totalGain = baseGain + ecoGain;

        const gainHtml = ecoBonus > 0
          ? `<div class="eco-gain">
               <span class="eco-gain-left">🌱 Ton gain (60% + ${ecoBonus}% éco)</span>
               <span class="eco-gain-right">${money(totalGain)}</span>
             </div>`
          : `<div style="font-size:12px;color:var(--brand-muted);margin:6px 0">Ton gain estimé : <strong style="color:var(--brand-lime)">${money(baseGain)}</strong></div>`;

        const onRouteBadge = m.on_route
          ? `<span style="display:inline-block;padding:2px 8px;background:rgba(93,191,255,.15);color:#7dffc1;border:1px solid rgba(93,191,255,.4);border-radius:999px;font-size:.72rem;font-weight:800;margin-left:6px">🗺️ Sur ta route</span>`
          : '';
        const detourBadge = (m.detour_km != null && m.detour_km > 0)
          ? `<span style="display:inline-block;padding:2px 8px;background:rgba(255,200,0,.12);color:#ffd700;border-radius:999px;font-size:.72rem;font-weight:700;margin-left:4px">+${m.detour_km} km détour</span>`
          : '';
        const rescueBadge = m.rescue_mode
          ? `<span style="display:inline-block;padding:3px 10px;background:#ff4444;color:#fff;border-radius:999px;font-size:.75rem;font-weight:900;margin-left:6px;animation:rescuePulse 1.2s infinite">🆘 RESCUE +${m.rescue_bonus_pct||20}%</span>`
          : '';
        const rescueStyle = m.rescue_mode
          ? ' style="border:2px solid #ff4444;background:linear-gradient(135deg,rgba(255,68,68,.06),rgba(255,150,0,.04));box-shadow:0 0 30px rgba(255,68,68,.2)"'
          : (m.on_route ? ' style="border-color:rgba(93,191,255,.4);box-shadow:0 0 0 1px rgba(93,191,255,.2)"' : '');
        return `
        <article class="mission-card"${rescueStyle}>
          ${m.rescue_mode ? `<div style="margin-bottom:8px;padding:8px 10px;background:rgba(255,68,68,.1);border-left:3px solid #ff4444;border-radius:6px;font-size:.82rem;color:#ffb0b0"><strong>🆘 MISSION RESCUE</strong><br>Un autre livreur a besoin d'aide. Tu reçois <strong style="color:#ffd700">+${m.rescue_bonus_pct||20}% bonus</strong>. ${m.rescue_pickup_address ? 'Va chercher le colis chez : <strong style="color:#fff">'+m.rescue_pickup_address+'</strong>' : 'Contacte le livreur original pour récupérer le colis.'}</div>` : ''}
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
            <div><span class="pill">${esc(text(m.code, 'Mission'))}</span>${rescueBadge}${onRouteBadge}${detourBadge}</div>
            <span class="match-score">${score}% · ${matchLabel(score)}</span>
          </div>
          <div class="match-bar"><div class="match-fill" style="width:${score}%;background:${fillColor}"></div></div>
          <div class="match-tags">
            ${tags.map(tag => `<span class="match-tag tag-${esc(tag.c)}">${esc(tag.t)}</span>`).join('')}
          </div>
          <h2>${esc(text(m.type_colis, 'Colis'))}</h2>
          <div class="route">
            <div><strong>Départ approx. :</strong> ${esc(text(m.ville_depart, 'Ville masquée'))}</div>
            <div><strong>Arrivée approx. :</strong> ${esc(text(m.ville_arrivee, 'Ville masquée'))}</div>
          </div>
          <div class="meta">
            <div><span>Poids</span>${esc(text(m.poids_kg, 'N/D'))} kg</div>
            <div><span>Distance</span>${m.distance_km ? Number(m.distance_km).toFixed(1) + ' km' : 'N/D'}</div>
            <div><span>Taille</span>${esc(text(m.taille_colis, 'N/D'))}</div>
            <div><span>Dispo destinataire</span>${(Array.isArray(m.destinataire_dispo_jours) && m.destinataire_dispo_jours.length) ? esc(m.destinataire_dispo_jours.join(', ')) + (m.destinataire_dispo_debut ? '<br>' + esc(m.destinataire_dispo_debut.slice(0,5)) + '–' + esc((m.destinataire_dispo_fin || '').slice(0,5)) : '') : 'Flexible'}</div>
          </div>
          <div class="price">${money(m.prix_total)}</div>
          ${gainHtml}
          ${m.rescue_mode
            ? `<button class="btn" type="button" style="background:linear-gradient(135deg,#ff4444,#ff8800);color:#fff;font-weight:900" onclick="acceptRescue('${esc(m.id)}')">🆘 Accepter ce RESCUE (+${m.rescue_bonus_pct||20}% bonus)</button>`
            : `<button class="btn" type="button" onclick="acceptMission('${esc(m.id)}')">Accepter la mission</button>`
          }
        </article>`;
      }).join('');
    }

    // Accepter une mission RESCUE
    async function acceptRescue(id) {
      if (!confirm('🆘 Accepter ce RESCUE ?\n\nTu vas :\n1. Aller chercher le colis chez l\'autre livreur\n2. Continuer la livraison normale\n3. Recevoir ton gain + le bonus')) return;
      const gpsOk = await askGpsConsent({ ville_depart: '—', ville_arrivee: '—', prix_total: 0 });
      if (!gpsOk) return;
      try {
        const res = await fetch('/api/livreur-rescue-accept', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + currentSession.access_token },
          body: JSON.stringify({ livraison_id: id })
        });
        const out = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(out.error || 'Erreur');
        alert('✅ ' + (out.message || 'Rescue acceptée'));
        if (window.papGps?.start) window.papGps.start();
        setTimeout(() => loadMissions(), 1000);
      } catch (err) { alert('❌ ' + err.message); }
    }

    // Animation rescue pulse
    if (!document.querySelector('style[data-rescue]')) {
      const s = document.createElement('style');
      s.dataset.rescue = '1';
      s.textContent = '@keyframes rescuePulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,68,68,.5); } 50% { box-shadow: 0 0 0 8px rgba(255,68,68,0); } }';
      document.head.appendChild(s);
    }

    // Modal de consentement GPS obligatoire
    async function askGpsConsent(mission) {
      return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:99999;display:grid;place-items:center;padding:20px';
        overlay.innerHTML = `
          <div style="max-width:480px;width:100%;background:#0a0e14;border:2px solid rgba(93,191,255,.4);border-radius:14px;padding:28px">
            <div style="text-align:center;margin-bottom:16px">
              <div style="font-size:48px;margin-bottom:8px">🛰️</div>
              <h2 style="margin:0;color:#fff;font-size:1.25rem">Consentement GPS obligatoire</h2>
            </div>
            <p style="color:#a8b0ba;line-height:1.6;font-size:.9rem;margin:0 0 14px">
              En acceptant cette mission, tu acceptes que <strong style="color:#fff">ta position GPS soit suivie en continu</strong> jusqu'à la confirmation de livraison.
            </p>
            <ul style="color:#a8b0ba;font-size:.85rem;line-height:1.7;margin:0 0 16px;padding-left:20px">
              <li>L'expéditeur et le destinataire voient ta position en temps réel</li>
              <li>En cas de litige, le GPS sert de preuve</li>
              <li>Si tu désactives le GPS pendant la livraison, ton compte sera signalé</li>
              <li>Tracking arrêté automatiquement à la fin de la livraison</li>
            </ul>
            <label style="display:flex;gap:10px;align-items:flex-start;padding:12px;background:rgba(93,191,255,.06);border:1px solid rgba(93,191,255,.25);border-radius:8px;cursor:pointer;margin-bottom:14px">
              <input type="checkbox" id="gpsConsentBox" style="margin-top:3px">
              <span style="color:#fff;font-size:.88rem;font-weight:700">J'accepte de partager ma position GPS jusqu'à la fin de la livraison</span>
            </label>
            <div style="display:flex;gap:10px">
              <button id="gpsCancel" style="flex:1;padding:12px;background:#1E2535;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700">Annuler</button>
              <button id="gpsAccept" style="flex:1;padding:12px;background:linear-gradient(135deg,#5dbfff,#78d900);color:#071006;border:none;border-radius:8px;cursor:pointer;font-weight:900" disabled>Continuer</button>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);
        const box = overlay.querySelector('#gpsConsentBox');
        const acceptBtn = overlay.querySelector('#gpsAccept');
        box.onchange = () => { acceptBtn.disabled = !box.checked; };
        overlay.querySelector('#gpsCancel').onclick = () => { overlay.remove(); resolve(false); };
        acceptBtn.onclick = async () => {
          overlay.remove();
          // Demander la permission GPS au navigateur
          if (!navigator.geolocation) {
            alert('Ton navigateur ne supporte pas le GPS. Tu ne peux pas accepter cette mission.');
            resolve(false);
            return;
          }
          try {
            await new Promise((res, rej) => {
              navigator.geolocation.getCurrentPosition(res, rej, { timeout: 10000 });
            });
            resolve(true);
          } catch (e) {
            alert('GPS refusé : tu dois autoriser la géolocalisation pour livrer. Active-le dans les paramètres de ton navigateur.');
            resolve(false);
          }
        };
      });
    }

    async function acceptMission(id) {
      const mission = missions.find((m) => m.id === id);
      if (!mission) return showError('Mission introuvable.');

      // Vérifier la permission GPS avant d'accepter
      const gpsConsent = await askGpsConsent(mission);
      if (!gpsConsent) return;

      const ok = await showModal({
        title: 'Confirmer l\'acceptation',
        description: `Trajet approx.: ${mission.ville_depart || 'depart'} vers ${mission.ville_arrivee || 'arrivee'}\nPaiement propose: ${money(mission.prix_total)}\n\n🛰️ Ton GPS sera activé jusqu'à la livraison complète.`,
        confirmText: 'Accepter et activer GPS',
        cancelText: 'Annuler',
        onConfirm: async () => {
          const res = await fetch('/api/assign-driver', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + currentSession.access_token
            },
            body: JSON.stringify({ livraison_id: id })
          });
          const out = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(out.error || 'Assignation impossible');
          // Démarrer GPS tracker tout de suite
          if (window.papGps && typeof window.papGps.start === 'function') {
            window.papGps.start();
          }
        }
      });

      if (ok) {
        showSuccess('Mission acceptee. Ouverture du dashboard...');
        window.setTimeout(() => { window.location.href = '/dashboard-livreur.html'; }, 1200);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadMissions();
      // Auto-refresh toutes les 45 secondes — nouvelles missions en temps quasi-réel
      let refreshTimer = setInterval(loadMissions, 45000);
      // Arrêter le refresh si l'onglet est caché (économie batterie)
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          clearInterval(refreshTimer);
        } else {
          loadMissions();
          refreshTimer = setInterval(loadMissions, 45000);
        }
      });
    });
  </script>
  <script src="/js/support-widget.js"></script>
  <script src="/js/app-launcher.js" defer></script>
  <script src="/js/gps-tracker.js"></script>
</body>
</html>
