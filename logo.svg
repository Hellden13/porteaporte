<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-label="PorteàPorte — porte de maison + porte de voiture">
  <defs>
    <linearGradient id="ppBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1228"/>
      <stop offset="100%" stop-color="#050a18"/>
    </linearGradient>
    <linearGradient id="ppHouse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#88cfff"/>
      <stop offset="100%" stop-color="#3da9ff"/>
    </linearGradient>
    <linearGradient id="ppCar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5dbfff"/>
      <stop offset="100%" stop-color="#1f8bff"/>
    </linearGradient>
    <radialGradient id="ppGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1f8bff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#050a18" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Plaque arrondie de fond -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#ppBg)" stroke="#1f8bff" stroke-opacity="0.25" stroke-width="1"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#ppGlow)"/>

  <!-- PORTE DE MAISON (gauche) : carré + toit triangulaire -->
  <path d="M 12 50
           L 12 26
           L 22 18
           L 32 26
           L 32 50
           Z"
        fill="url(#ppHouse)"
        stroke="#88cfff"
        stroke-width="1"
        stroke-linejoin="round"/>
  <!-- Petite porte intérieure (maison) -->
  <rect x="18" y="34" width="8" height="16" rx="1" fill="#050a18" fill-opacity="0.4"/>
  <!-- Poignée maison -->
  <circle cx="24" cy="42" r="0.8" fill="#88cfff"/>

  <!-- PORTE DE VOITURE (droite) : rectangle avec fenêtre courbe en haut -->
  <path d="M 34 50
           L 34 32
           Q 34 22 44 22
           L 52 22
           L 52 50
           Z"
        fill="url(#ppCar)"
        stroke="#88cfff"
        stroke-width="1"
        stroke-linejoin="round"/>
  <!-- Fenêtre voiture (vitre) -->
  <path d="M 37 31
           Q 37 26 44 26
           L 49 26
           L 49 33
           L 37 33
           Z"
        fill="#050a18"
        fill-opacity="0.45"/>
  <!-- Poignée voiture -->
  <rect x="46" y="40" width="4" height="1.5" rx="0.7" fill="#88cfff"/>

  <!-- Trait de séparation/connexion entre les 2 portes -->
  <line x1="33" y1="22" x2="33" y2="50" stroke="#5dbfff" stroke-width="0.7" stroke-opacity="0.5"/>
</svg>
