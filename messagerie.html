<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messagerie - PorteàPorte</title>
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--brand-bg-dark);
      color: var(--brand-text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ---- Topbar ---- */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: rgba(10,12,16,.97);
      border-bottom: 1px solid var(--brand-border);
      flex-shrink: 0;
      z-index: 10;
    }
    .brand { font-weight: 900; font-size: 18px; color: var(--brand-lime); text-decoration: none; letter-spacing: -0.5px; }
    .topbar-right { display: flex; gap: 8px; }
    .topbar-btn {
      padding: 6px 12px;
      border: 1px solid var(--brand-border);
      border-radius: 7px;
      background: transparent;
      color: var(--brand-muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all .2s;
    }
    .topbar-btn:hover { border-color: var(--brand-cyan); color: var(--brand-cyan); }

    /* ---- App layout ---- */
    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ---- Conversation list ---- */
    .conv-list {
      border-right: 1px solid var(--brand-border);
      display: flex;
      flex-direction: column;
      background: var(--brand-bg-surface);
      overflow: hidden;
    }
    .conv-list-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--brand-border);
      font-weight: 800;
      font-size: 0.88rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .conv-count {
      background: var(--brand-lime);
      color: var(--brand-bg-dark);
      font-size: 0.7rem;
      font-weight: 900;
      padding: 2px 7px;
      border-radius: 999px;
    }
    .conv-scroll { flex: 1; overflow-y: auto; }
    .conv-scroll::-webkit-scrollbar { width: 3px; }
    .conv-scroll::-webkit-scrollbar-thumb { background: var(--brand-border); }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background .15s;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .conv-item:hover { background: rgba(255,255,255,0.03); }
    .conv-item.active { background: rgba(0,255,159,0.06); border-right: 2px solid var(--brand-lime); }

    .conv-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brand-cyan), var(--brand-lime));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 0.85rem;
      color: var(--brand-bg-dark);
      flex-shrink: 0;
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name { font-weight: 700; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-preview { color: var(--brand-muted); font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .conv-time { color: var(--brand-muted); font-size: 0.7rem; }
    .conv-unread {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--brand-lime);
      color: var(--brand-bg-dark);
      font-size: 0.65rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .conv-empty {
      padding: 32px 16px;
      text-align: center;
      color: var(--brand-muted);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    /* ---- Chat window ---- */
    .chat-window {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--brand-bg-dark);
    }

    /* Chat header */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--brand-border);
      background: var(--brand-bg-surface);
      flex-shrink: 0;
    }
    .chat-header-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brand-cyan), var(--brand-lime));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 0.8rem;
      color: var(--brand-bg-dark);
    }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-weight: 800; font-size: 0.95rem; }
    .chat-header-sub { color: var(--brand-muted); font-size: 0.75rem; margin-top: 1px; }
    .chat-header-actions { display: flex; gap: 8px; }
    .chat-action-btn {
      padding: 6px 12px;
      border: 1px solid var(--brand-border);
      border-radius: 7px;
      background: transparent;
      color: var(--brand-muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all .2s;
    }
    .chat-action-btn:hover { border-color: var(--brand-cyan); color: var(--brand-cyan); }

    /* Message zone */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--brand-border); border-radius: 2px; }

    .msg-group { display: flex; flex-direction: column; gap: 3px; }
    .msg-group.mine { align-items: flex-end; }
    .msg-group.theirs { align-items: flex-start; }

    .msg-sender {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--brand-muted);
      margin-bottom: 3px;
      padding: 0 4px;
    }

    .msg-bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.88rem;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg-group.mine .msg-bubble {
      background: linear-gradient(135deg, rgba(0,255,159,0.22), rgba(0,217,255,0.18));
      border: 1px solid rgba(0,255,159,0.3);
      color: var(--brand-text);
      border-bottom-right-radius: 4px;
    }
    .msg-group.theirs .msg-bubble {
      background: var(--brand-bg-surface);
      border: 1px solid var(--brand-border);
      color: var(--brand-text);
      border-bottom-left-radius: 4px;
    }
    .msg-time { font-size: 0.68rem; color: var(--brand-muted); margin-top: 2px; padding: 0 4px; }

    /* System messages */
    .msg-system {
      text-align: center;
      color: var(--brand-muted);
      font-size: 0.75rem;
      padding: 4px 0;
    }

    /* Mission info card inside chat */
    .mission-card-chat {
      background: var(--brand-bg-surface);
      border: 1px solid var(--brand-border);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 8px;
      max-width: 360px;
      align-self: center;
    }
    .mission-card-chat .mc-label { color: var(--brand-muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .mission-card-chat .mc-route { font-weight: 800; font-size: 0.92rem; margin-bottom: 4px; }
    .mission-card-chat .mc-price { color: var(--brand-lime); font-weight: 900; font-size: 1.1rem; }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 4px;
      padding: 8px 14px;
      background: var(--brand-bg-surface);
      border: 1px solid var(--brand-border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing-indicator.show { display: flex; }
    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--brand-muted);
      animation: typing 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* Input bar */
    .input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid var(--brand-border);
      background: var(--brand-bg-surface);
      flex-shrink: 0;
    }
    .input-bar textarea {
      flex: 1;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      padding: 10px 14px;
      background: var(--brand-bg-dark);
      border: 1px solid var(--brand-border);
      border-radius: 10px;
      color: var(--brand-text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      overflow-y: auto;
      transition: border-color .2s;
    }
    .input-bar textarea:focus { border-color: var(--brand-cyan); }
    .input-bar textarea::placeholder { color: var(--brand-muted); }
    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--brand-lime), var(--brand-cyan));
      color: var(--brand-bg-dark);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity .2s, transform .2s;
    }
    .send-btn:hover { opacity: .88; transform: scale(1.05); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* Attachments bar */
    .attach-bar {
      display: flex;
      gap: 6px;
      padding: 8px 20px 0;
      flex-shrink: 0;
    }
    .attach-chip {
      padding: 5px 10px;
      border: 1px solid var(--brand-border);
      border-radius: 999px;
      background: transparent;
      color: var(--brand-muted);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }
    .attach-chip:hover { border-color: var(--brand-cyan); color: var(--brand-cyan); }

    /* No conversation selected */
    .no-conv {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--brand-muted);
      text-align: center;
      padding: 32px;
    }
    .no-conv-icon { font-size: 52px; opacity: 0.4; }
    .no-conv h2 { font-size: 1rem; font-weight: 700; color: var(--brand-text); }
    .no-conv p { font-size: 0.85rem; max-width: 300px; line-height: 1.6; }

    /* Date separator */
    .date-sep {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--brand-muted);
      font-size: 0.72rem;
      font-weight: 700;
    }
    .date-sep::before, .date-sep::after { content: ''; flex: 1; height: 1px; background: var(--brand-border); }

    /* Responsive */
    @media (max-width: 700px) {
      .app { grid-template-columns: 1fr; }
      .conv-list { display: none; }
      .conv-list.mobile-open { display: flex; position: absolute; inset: 0; top: 57px; z-index: 20; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a class="brand" href="/index.html">PorteàPorte</a>
    <div class="topbar-right">
      <a class="topbar-btn" href="/dashboard-livreur.html">Dashboard</a>
      <a class="topbar-btn" href="/browse-missions.html">Missions</a>
    </div>
  </header>

  <div class="app">

    <!-- Conversation list -->
    <aside class="conv-list">
      <div class="conv-list-header">
        Messages
        <span class="conv-count" id="convCount">0</span>
      </div>
      <div class="conv-scroll" id="convScroll">
        <div class="conv-empty">Chargement des conversations…</div>
      </div>
    </aside>

    <!-- Chat window -->
    <div class="chat-window" id="chatWindow">
      <div class="no-conv" id="noConv">
        <div class="no-conv-icon">💬</div>
        <h2>Tes messages</h2>
        <p>Sélectionne une conversation à gauche pour commencer à échanger avec un livreur ou un expéditeur.</p>
      </div>

      <!-- Chat zone (hidden until conv selected) -->
      <div id="chatZone" style="display:none;flex-direction:column;flex:1;overflow:hidden;display:none">

        <div class="chat-header" id="chatHeader">
          <div class="chat-header-avatar" id="chatAvatar">?</div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chatName">–</div>
            <div class="chat-header-sub" id="chatSub">–</div>
          </div>
          <div class="chat-header-actions">
            <a class="chat-action-btn" id="chatMissionLink" href="#">Voir la mission</a>
          </div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="typing-indicator" id="typingIndicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>

        <div class="attach-bar">
          <button class="attach-chip" onclick="sendQuickReply('En route ! 🚴')">En route !</button>
          <button class="attach-chip" onclick="sendQuickReply('Colis récupéré 📦')">Colis récupéré</button>
          <button class="attach-chip" onclick="sendQuickReply('Je serai là dans 10 min')">10 min</button>
          <button class="attach-chip" onclick="sendQuickReply('Livré avec succès ✅')">Livré ✅</button>
        </div>

        <div class="input-bar">
          <textarea
            id="msgInput"
            placeholder="Écris ton message…"
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const db = window.db || window.getSupabaseClient();
    let session = null;
    let conversations = [];
    let activeConvId = null;
    let realtimeSub = null;

    /* ============================
       INIT
    ============================= */
    async function init() {
      const { data } = await db.auth.getSession();
      if (!data?.session) { window.location.href = '/login.html'; return; }
      session = data.session;
      await loadConversations();
      /* Check URL param for auto-open */
      const params = new URLSearchParams(window.location.search);
      const convId = params.get('conv') || params.get('livraison');
      if (convId) await openConvByLivraison(convId);
    }

    /* ============================
       CONVERSATIONS
    ============================= */
    async function loadConversations() {
      const { data } = await db
        .from('messages')
        .select('livraison_id, expediteur_id, destinataire_id, contenu, cree_le, lu')
        .or(`expediteur_id.eq.${session.user.id},destinataire_id.eq.${session.user.id}`)
        .order('cree_le', { ascending: false });

      if (!data?.length) {
        document.getElementById('convScroll').innerHTML =
          '<div class="conv-empty">Aucune conversation pour l\'instant.<br>Accepte ou envoie une mission pour démarrer un chat.</div>';
        return;
      }

      /* Group by livraison_id */
      const map = new Map();
      for (const msg of data) {
        const key = msg.livraison_id || (msg.expediteur_id < msg.destinataire_id
          ? msg.expediteur_id + '_' + msg.destinataire_id
          : msg.destinataire_id + '_' + msg.expediteur_id);
        if (!map.has(key)) map.set(key, { ...msg, key, unread: 0 });
        if (!msg.lu && msg.destinataire_id === session.user.id) map.get(key).unread++;
      }
      conversations = [...map.values()];
      document.getElementById('convCount').textContent = conversations.length;
      await renderConversations();
    }

    async function renderConversations() {
      const scroll = document.getElementById('convScroll');
      if (!conversations.length) {
        scroll.innerHTML = '<div class="conv-empty">Aucune conversation.</div>';
        return;
      }

      /* Fetch other party profiles */
      const otherIds = conversations.map(c =>
        c.expediteur_id === session.user.id ? c.destinataire_id : c.expediteur_id
      ).filter(Boolean);

      const { data: profiles } = await db.from('profiles').select('id,nom,email').in('id', otherIds);
      const profileMap = Object.fromEntries((profiles || []).map(p => [p.id, p]));

      scroll.innerHTML = conversations.map(c => {
        const otherId = c.expediteur_id === session.user.id ? c.destinataire_id : c.expediteur_id;
        const other = profileMap[otherId] || {};
        const name = other.nom || other.email?.split('@')[0] || 'Utilisateur';
        const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
        const time = new Date(c.cree_le).toLocaleTimeString('fr-CA', { hour: '2-digit', minute: '2-digit' });
        const preview = c.contenu?.slice(0, 40) + (c.contenu?.length > 40 ? '…' : '');
        return `
          <div class="conv-item ${activeConvId === c.key ? 'active' : ''}" onclick="openConv('${c.key}', '${otherId}', '${c.livraison_id || ''}', '${name}')">
            <div class="conv-avatar">${initials}</div>
            <div class="conv-info">
              <div class="conv-name">${name}</div>
              <div class="conv-preview">${preview || 'Aucun message'}</div>
            </div>
            <div class="conv-meta">
              <span class="conv-time">${time}</span>
              ${c.unread ? `<span class="conv-unread">${c.unread}</span>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    /* ============================
       OPEN CONVERSATION
    ============================= */
    async function openConv(key, otherId, livraisonId, otherName) {
      activeConvId = key;
      document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
      const item = [...document.querySelectorAll('.conv-item')].find(el => el.onclick?.toString().includes(key));
      if (item) item.classList.add('active');

      /* Update header */
      const initials = otherName.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      document.getElementById('chatAvatar').textContent = initials;
      document.getElementById('chatName').textContent = otherName;
      if (livraisonId) {
        document.getElementById('chatSub').textContent = 'Mission · ' + livraisonId.slice(0, 8).toUpperCase();
        document.getElementById('chatMissionLink').href = '/suivi-livraison.html?id=' + livraisonId;
      } else {
        document.getElementById('chatSub').textContent = 'Conversation directe';
        document.getElementById('chatMissionLink').style.display = 'none';
      }

      document.getElementById('noConv').style.display = 'none';
      const cz = document.getElementById('chatZone');
      cz.style.display = 'flex';
      cz.style.flexDirection = 'column';
      cz.style.flex = '1';
      cz.style.overflow = 'hidden';

      await loadMessages(otherId, livraisonId);
      subscribeRealtime(otherId, livraisonId);
      markRead(livraisonId || otherId);
    }

    async function openConvByLivraison(livraisonId) {
      /* Find or create conv with the other party on this livraison */
      const { data } = await db
        .from('livraisons')
        .select('expediteur_id, livreur_id')
        .eq('id', livraisonId)
        .single();
      if (!data) return;
      const otherId = data.expediteur_id === session.user.id ? data.livreur_id : data.expediteur_id;
      if (!otherId) return;
      const { data: other } = await db.from('profiles').select('nom,email').eq('id', otherId).single();
      const name = other?.nom || other?.email?.split('@')[0] || 'Utilisateur';
      const key = livraisonId;
      await openConv(key, otherId, livraisonId, name);
    }

    /* ============================
       MESSAGES
    ============================= */
    async function loadMessages(otherId, livraisonId) {
      let query = db.from('messages').select('*').order('cree_le', { ascending: true });
      if (livraisonId) {
        query = query.eq('livraison_id', livraisonId);
      } else {
        query = query.or(
          `and(expediteur_id.eq.${session.user.id},destinataire_id.eq.${otherId}),` +
          `and(expediteur_id.eq.${otherId},destinataire_id.eq.${session.user.id})`
        );
      }
      const { data } = await query.limit(100);
      renderMessages(data || []);
    }

    function renderMessages(msgs) {
      const el = document.getElementById('messages');
      if (!msgs.length) {
        el.innerHTML = `
          <div class="msg-system">Aucun message pour l'instant. Dis bonjour !</div>
          <div class="mission-card-chat">
            <div class="mc-label">Mission en cours</div>
            <div class="mc-route">Détails disponibles après connexion</div>
          </div>`;
        scrollBottom();
        return;
      }

      let lastDate = '';
      el.innerHTML = msgs.map(msg => {
        const mine = msg.expediteur_id === session.user.id;
        const d = new Date(msg.cree_le);
        const dateStr = d.toLocaleDateString('fr-CA', { weekday: 'short', month: 'short', day: 'numeric' });
        const time = d.toLocaleTimeString('fr-CA', { hour: '2-digit', minute: '2-digit' });

        let out = '';
        if (dateStr !== lastDate) {
          lastDate = dateStr;
          out += `<div class="date-sep">${dateStr}</div>`;
        }
        out += `
          <div class="msg-group ${mine ? 'mine' : 'theirs'}">
            <div class="msg-bubble">${escHtml(msg.contenu)}</div>
            <div class="msg-time">${time}${mine ? (msg.lu ? ' · Lu' : '') : ''}</div>
          </div>`;
        return out;
      }).join('');

      scrollBottom();
    }

    function scrollBottom() {
      const el = document.getElementById('messages');
      el.scrollTop = el.scrollHeight;
    }

    /* ============================
       SEND MESSAGE
    ============================= */
    async function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || !activeConvId) return;

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      input.value = '';
      autoResize(input);

      /* Get other party from active conv */
      const conv = conversations.find(c => c.key === activeConvId);
      const otherId = conv ? (conv.expediteur_id === session.user.id ? conv.destinataire_id : conv.expediteur_id) : null;
      const livraisonId = conv?.livraison_id || null;

      const { error } = await db.from('messages').insert({
        expediteur_id: session.user.id,
        destinataire_id: otherId,
        livraison_id: livraisonId,
        contenu: text,
        lu: false
      });

      if (error) console.error('Envoi message:', error.message);
      btn.disabled = false;

      /* Reload messages */
      if (otherId) await loadMessages(otherId, livraisonId);
    }

    function sendQuickReply(text) {
      document.getElementById('msgInput').value = text;
      sendMessage();
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    /* ============================
       REALTIME SUBSCRIPTION
    ============================= */
    function subscribeRealtime(otherId, livraisonId) {
      if (realtimeSub) { db.removeChannel(realtimeSub); realtimeSub = null; }

      realtimeSub = db.channel('messages-live')
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'messages',
          filter: livraisonId
            ? `livraison_id=eq.${livraisonId}`
            : `destinataire_id=eq.${session.user.id}`
        }, async () => {
          await loadMessages(otherId, livraisonId);
          await loadConversations();
        })
        .subscribe();
    }

    /* ============================
       MARK READ
    ============================= */
    async function markRead(context) {
      await db.from('messages')
        .update({ lu: true })
        .eq('destinataire_id', session.user.id)
        .eq('lu', false);
    }

    /* ============================
       UTILS
    ============================= */
    function escHtml(s) {
      return String(s || '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/\n/g,'<br>');
    }

    init();
  </script>
  <script src="/js/support-widget.js"></script>
</body>
</html>
