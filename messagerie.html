<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messagerie — PorteàPorte</title>
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <link rel="stylesheet" href="/assets/visual-polish.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--brand-bg-dark); color: var(--brand-text); min-height: 100vh; display: flex; flex-direction: column; }

    .topbar { display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(10,12,16,.97);border-bottom:1px solid var(--brand-border);position:sticky;top:0;z-index:100; }
    .brand { font-weight:900;font-size:19px;color:var(--brand-lime);text-decoration:none; }
    .topbar-right { display:flex;gap:8px;align-items:center; }
    .topbar-btn { padding:7px 13px;border:1px solid var(--brand-border);border-radius:7px;background:transparent;color:var(--brand-muted);font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s; }
    .topbar-btn:hover { border-color:var(--brand-cyan);color:var(--brand-cyan); }

    .chat-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      flex: 1;
      height: calc(100vh - 57px);
      overflow: hidden;
    }

    /* Colonne gauche */
    .conv-list { border-right: 1px solid var(--brand-border); display: flex; flex-direction: column; overflow: hidden; }
    .conv-list-header { padding: 18px 16px 12px; border-bottom: 1px solid var(--brand-border); }
    .conv-list-title { font-weight: 800; font-size: 1rem; }
    .conv-list-sub { font-size: .75rem; color: var(--brand-muted); margin-top: 2px; }
    .conv-items { flex: 1; overflow-y: auto; }
    .conv-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--brand-border); cursor: pointer; transition: background .15s; }
    .conv-item:hover { background: rgba(255,255,255,.04); }
    .conv-item.active { background: rgba(184,245,62,.06); border-left: 3px solid var(--brand-lime); }
    .conv-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--brand-lime), var(--brand-cyan)); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: .9rem; color: #0A0C10; flex-shrink: 0; }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name { font-weight: 700; font-size: .88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-preview { font-size: .75rem; color: var(--brand-muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-meta { text-align: right; flex-shrink: 0; }
    .conv-time { font-size: .72rem; color: var(--brand-muted); }
    .conv-badge { display: inline-block; background: var(--brand-lime); color: #0A0C10; border-radius: 50%; width: 18px; height: 18px; font-size: .7rem; font-weight: 800; line-height: 18px; text-align: center; margin-top: 4px; }
    .conv-empty { padding: 32px 16px; text-align: center; color: var(--brand-muted); font-size: .85rem; }

    /* Colonne droite */
    .chat-area { display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 16px 20px; border-bottom: 1px solid var(--brand-border); display: flex; align-items: center; gap: 14px; }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-weight: 800; font-size: .95rem; }
    .chat-header-sub { font-size: .75rem; color: var(--brand-muted); margin-top: 2px; }
    .chat-header-link { font-size: .75rem; color: var(--brand-cyan); text-decoration: none; font-weight: 700; }
    .chat-header-link:hover { text-decoration: underline; }

    .chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--brand-muted); gap: 12px; }
    .chat-empty-icon { font-size: 3rem; opacity: .5; }
    .chat-empty-text { font-size: .9rem; }

    /* Messages */
    .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-bubble { max-width: 68%; padding: 10px 14px; border-radius: 16px; font-size: .88rem; line-height: 1.5; word-break: break-word; }
    .msg-row.mine .msg-bubble { background: linear-gradient(135deg, var(--brand-lime), #7fff6a); color: #0A0C10; border-bottom-right-radius: 4px; }
    .msg-row.theirs .msg-bubble { background: var(--brand-bg-surface); border: 1px solid var(--brand-border); color: var(--brand-text); border-bottom-left-radius: 4px; }
    .msg-time { font-size: .68rem; color: var(--brand-muted); padding-bottom: 2px; white-space: nowrap; }
    .msg-date-divider { text-align: center; font-size: .72rem; color: var(--brand-muted); margin: 8px 0; position: relative; }
    .msg-date-divider::before, .msg-date-divider::after { content: ''; position: absolute; top: 50%; width: 36%; height: 1px; background: var(--brand-border); }
    .msg-date-divider::before { left: 0; }
    .msg-date-divider::after { right: 0; }

    /* Saisie */
    .chat-input-area { padding: 14px 20px; border-top: 1px solid var(--brand-border); display: flex; gap: 10px; align-items: flex-end; }
    .chat-input { flex: 1; background: var(--brand-bg-surface); border: 1px solid var(--brand-border); border-radius: 12px; padding: 10px 14px; color: var(--brand-text); font-size: .9rem; resize: none; outline: none; min-height: 42px; max-height: 120px; font-family: inherit; transition: border .2s; }
    .chat-input:focus { border-color: var(--brand-lime); }
    .chat-send { width: 42px; height: 42px; border-radius: 50%; border: none; background: var(--brand-lime); color: #0A0C10; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity .2s; flex-shrink: 0; }
    .chat-send:hover { opacity: .85; }
    .chat-send:disabled { opacity: .4; cursor: not-allowed; }

    /* Mobile */
    @media (max-width: 700px) {
      .chat-layout { grid-template-columns: 1fr; }
      .conv-list { display: flex; }
      .chat-area { display: none; }
      .chat-layout.chat-open .conv-list { display: none; }
      .chat-layout.chat-open .chat-area { display: flex; }
      .back-btn { display: flex !important; }
    }
    .back-btn { display: none; align-items: center; gap: 6px; background: transparent; border: none; color: var(--brand-muted); font-size: .85rem; font-weight: 700; cursor: pointer; padding: 0; }
    .back-btn:hover { color: var(--brand-text); }
  </style>
</head>
<body>

  <header class="topbar">
    <a class="brand" href="/index.html">PorteàPorte</a>
    <div class="topbar-right">
      <a class="topbar-btn" id="backDashBtn" href="/dashboard-livreur.html">← Dashboard</a>
      <button class="topbar-btn" onclick="logout()">Déconnecter</button>
    </div>
  </header>

  <div class="chat-layout" id="chatLayout">

    <div class="conv-list">
      <div class="conv-list-header">
        <div class="conv-list-title">Messages</div>
        <div class="conv-list-sub" id="convCount">Chargement…</div>
      </div>
      <div class="conv-items" id="convItems">
        <div class="conv-empty">Chargement…</div>
      </div>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="chat-empty" id="chatEmpty">
        <div class="chat-empty-icon">💬</div>
        <div class="chat-empty-text">Sélectionne une conversation</div>
      </div>

      <div id="chatActive" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <div class="chat-header">
          <button class="back-btn" onclick="closeMobileChat()">← Retour</button>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chatPartnerName">—</div>
            <div class="chat-header-sub" id="chatLivraisonInfo">—</div>
          </div>
          <a class="chat-header-link" id="chatTrackLink" href="#" target="_blank">Suivi →</a>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="chat-input-area">
          <textarea class="chat-input" id="chatInput" placeholder="Écris un message…" rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="chat-send" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    const db = window.getSupabaseClient();
    let session = null;
    let profile = null;
    let conversations = [];
    let activeConvId = null;
    let activePartnerId = null;

    async function init() {
      const { data } = await db.auth.getSession();
      if (!data?.session) { window.location.href = '/login.html'; return; }
      session = data.session;

      const { data: p } = await db.from('profiles').select('*').eq('id', session.user.id).single();
      if (!p) { window.location.href = '/login.html'; return; }
      profile = p;

      const btn = document.getElementById('backDashBtn');
      if (['marchand', 'expediteur'].includes(p.role)) btn.href = '/dashboard-marchand.html';

      await loadConversations();
      subscribeRealtime();
    }

    async function loadConversations() {
      const { data: msgs, error } = await db
        .from('messages')
        .select('id, livraison_id, expediteur_id, destinataire_id, contenu, lu, cree_le')
        .or(`expediteur_id.eq.${session.user.id},destinataire_id.eq.${session.user.id}`)
        .order('cree_le', { ascending: false });

      if (error) { console.error('[msg]', error); return; }

      // Grouper par livraison_id
      const convMap = {};
      for (const m of msgs || []) {
        if (!convMap[m.livraison_id]) convMap[m.livraison_id] = { lastMsg: m, unread: 0 };
        if (!m.lu && m.destinataire_id === session.user.id) convMap[m.livraison_id].unread++;
      }

      if (!Object.keys(convMap).length) {
        document.getElementById('convItems').innerHTML = '<div class="conv-empty">Aucune conversation pour l\'instant</div>';
        document.getElementById('convCount').textContent = '0 conversation';
        conversations = [];
        return;
      }

      const livraisonIds = Object.keys(convMap);
      const { data: livs } = await db
        .from('livraisons')
        .select('id, adresse_pickup, adresse_livraison, livreur_id, expediteur_id')
        .in('id', livraisonIds);

      const partnerIds = new Set();
      for (const l of livs || []) {
        const pid = l.livreur_id === session.user.id ? l.expediteur_id : l.livreur_id;
        if (pid) partnerIds.add(pid);
      }

      const { data: profs } = await db.from('profiles').select('id, nom').in('id', [...partnerIds]);
      const profMap = {};
      for (const pr of profs || []) profMap[pr.id] = pr;

      conversations = (livs || []).map(l => {
        const partnerId = l.livreur_id === session.user.id ? l.expediteur_id : l.livreur_id;
        const conv = convMap[l.id] || {};
        return {
          livraisonId: l.id,
          partnerId,
          partnerName: profMap[partnerId]?.nom || 'Utilisateur',
          lastMsg: conv.lastMsg,
          unread: conv.unread || 0,
          pickup: l.adresse_pickup || '',
          destination: l.adresse_livraison || '',
        };
      }).filter(c => c.lastMsg)
        .sort((a, b) => new Date(b.lastMsg.cree_le) - new Date(a.lastMsg.cree_le));

      renderConvList();
    }

    function renderConvList() {
      const el = document.getElementById('convItems');
      const count = conversations.length;
      document.getElementById('convCount').textContent = count + ' conversation' + (count !== 1 ? 's' : '');

      if (!count) {
        el.innerHTML = '<div class="conv-empty">Aucune conversation</div>';
        return;
      }

      el.innerHTML = conversations.map(c => {
        const init = (c.partnerName || '?')[0].toUpperCase();
        const time = fmtTime(c.lastMsg.cree_le);
        const preview = c.lastMsg.expediteur_id === session.user.id
          ? 'Vous : ' + c.lastMsg.contenu
          : c.lastMsg.contenu;
        const active = c.livraisonId === activeConvId ? 'active' : '';
        return `
          <div class="conv-item ${active}" onclick="openConv('${c.livraisonId}','${c.partnerId}')">
            <div class="conv-avatar">${init}</div>
            <div class="conv-info">
              <div class="conv-name">${esc(c.partnerName)}</div>
              <div class="conv-preview">${esc(preview.slice(0,60))}</div>
            </div>
            <div class="conv-meta">
              <div class="conv-time">${time}</div>
              ${c.unread ? `<div class="conv-badge">${c.unread}</div>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    async function openConv(livraisonId, partnerId) {
      activeConvId = livraisonId;
      activePartnerId = partnerId;

      document.getElementById('chatEmpty').style.display = 'none';
      document.getElementById('chatActive').style.display = 'flex';
      document.getElementById('chatLayout').classList.add('chat-open');

      const conv = conversations.find(c => c.livraisonId === livraisonId);
      document.getElementById('chatPartnerName').textContent = conv?.partnerName || '—';
      document.getElementById('chatLivraisonInfo').textContent =
        conv ? `${conv.pickup.slice(0,30)} → ${conv.destination.slice(0,30)}` : '—';
      document.getElementById('chatTrackLink').href = `/gps-tracker.html?id=${livraisonId}`;

      renderConvList();
      await loadMessages(livraisonId);

      // Marquer lus
      await db.from('messages').update({ lu: true })
        .eq('livraison_id', livraisonId)
        .eq('destinataire_id', session.user.id)
        .eq('lu', false);
      if (conv) { conv.unread = 0; renderConvList(); }
    }

    async function loadMessages(livraisonId) {
      const { data: msgs } = await db
        .from('messages')
        .select('id, expediteur_id, contenu, cree_le')
        .eq('livraison_id', livraisonId)
        .order('cree_le', { ascending: true });

      const area = document.getElementById('messagesArea');
      if (!msgs?.length) {
        area.innerHTML = '<div style="text-align:center;color:var(--brand-muted);font-size:.82rem;margin-top:24px">Commencez la conversation</div>';
        return;
      }

      let html = '';
      let lastDate = '';
      for (const m of msgs) {
        const d = new Date(m.cree_le);
        const dateStr = d.toLocaleDateString('fr-CA', { weekday: 'long', month: 'long', day: 'numeric' });
        if (dateStr !== lastDate) {
          html += `<div class="msg-date-divider">${dateStr}</div>`;
          lastDate = dateStr;
        }
        const mine = m.expediteur_id === session.user.id;
        const time = d.toLocaleTimeString('fr-CA', { hour: '2-digit', minute: '2-digit' });
        html += `<div class="msg-row ${mine ? 'mine' : 'theirs'}">
          <div class="msg-bubble">${esc(m.contenu)}</div>
          <div class="msg-time">${time}</div>
        </div>`;
      }
      area.innerHTML = html;
      area.scrollTop = area.scrollHeight;
    }

    async function sendMessage() {
      if (!activeConvId || !activePartnerId) return;
      const input = document.getElementById('chatInput');
      const contenu = input.value.trim();
      if (!contenu) return;

      document.getElementById('sendBtn').disabled = true;
      input.value = '';
      autoResize(input);

      const { error } = await db.from('messages').insert({
        livraison_id: activeConvId,
        expediteur_id: session.user.id,
        destinataire_id: activePartnerId,
        contenu,
        lu: false,
        cree_le: new Date().toISOString()
      });

      document.getElementById('sendBtn').disabled = false;
      if (error) { console.error('[msg] Erreur envoi:', error); input.value = contenu; autoResize(input); }
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function subscribeRealtime() {
      db.channel('msg-live')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, async (payload) => {
          const m = payload.new;
          if (m.expediteur_id !== session.user.id && m.destinataire_id !== session.user.id) return;

          if (m.livraison_id === activeConvId) {
            const area = document.getElementById('messagesArea');
            const d = new Date(m.cree_le);
            const time = d.toLocaleTimeString('fr-CA', { hour: '2-digit', minute: '2-digit' });
            const mine = m.expediteur_id === session.user.id;
            const row = document.createElement('div');
            row.className = 'msg-row ' + (mine ? 'mine' : 'theirs');
            row.innerHTML = `<div class="msg-bubble">${esc(m.contenu)}</div><div class="msg-time">${time}</div>`;
            area.appendChild(row);
            area.scrollTop = area.scrollHeight;
            if (!mine) await db.from('messages').update({ lu: true }).eq('id', m.id);
          }

          await loadConversations();
        })
        .subscribe();
    }

    function closeMobileChat() {
      document.getElementById('chatLayout').classList.remove('chat-open');
    }

    function fmtTime(iso) {
      const d = new Date(iso);
      const diff = Date.now() - d;
      if (diff < 60000) return 'À l\'instant';
      if (diff < 3600000) return Math.floor(diff / 60000) + ' min';
      if (diff < 86400000) return d.toLocaleTimeString('fr-CA', { hour: '2-digit', minute: '2-digit' });
      return d.toLocaleDateString('fr-CA', { month: 'short', day: 'numeric' });
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function logout() {
      await db.auth.signOut();
      window.location.href = '/login.html';
    }

    init();
  </script>
</body>
</html>
