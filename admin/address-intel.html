<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intelligence Adresses - Admin PorteàPorte</title>
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <style>
    body { padding: 24px; min-height: 100vh; }
    .wrap { max-width: 1080px; margin: 0 auto; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .search { width: 100%; padding: 12px; background: var(--brand-bg-surface); border: 1px solid var(--brand-border); border-radius: 8px; color: #fff; font-size: .95rem; margin-bottom: 16px; }
    .note-card { background: var(--brand-bg-surface); border: 1px solid var(--brand-border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
    .note-head { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: .72rem; font-weight: 800; text-transform: uppercase; }
    .meta { color: var(--brand-muted); font-size: .8rem; }
    .actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .btn-sm { padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; font-size: .82rem; }
    .empty { text-align: center; color: var(--brand-muted); padding: 40px; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <h1>💡 Intelligence Adresses</h1>
      <a class="btn secondary" href="/admin/dashboard-admin.html">← Dashboard admin</a>
    </div>
    <input class="search" id="search" placeholder="🔍 Rechercher par adresse, ville, catégorie, note..." oninput="render()">
    <div id="list"><p class="empty">Chargement…</p></div>
  </main>

  <script>
    let all = [];
    let session = null;
    const LABELS = {
      animal:{icon:'🐕',name:'Animal'},acces:{icon:'🪜',name:'Accès'},code_sonnette:{icon:'🚪',name:'Code'},
      stationnement:{icon:'🅿️',name:'Stationnement'},securite:{icon:'⚠️',name:'Sécurité'},
      comportement:{icon:'😡',name:'Comportement'},do_not_deliver:{icon:'🚫',name:'NE PAS LIVRER'},
      horaires:{icon:'⏰',name:'Horaires'},reception:{icon:'🏢',name:'Réception'},pourboire:{icon:'💸',name:'Pourboire'},autre:{icon:'💡',name:'Info'}
    };
    async function init() {
      const db = window.getSupabaseClient ? window.getSupabaseClient() : window.supabase;
      const { data: sess } = await db.auth.getSession();
      if (!sess?.session) { window.location.href = '/login.html'; return; }
      session = sess.session;
      const { data: prof } = await db.from('profiles').select('role').eq('id', session.user.id).single();
      if (prof?.role !== 'admin') { alert('Accès admin requis'); window.location.href = '/'; return; }
      const r = await db.from('address_intelligence').select('*').order('created_at', { ascending: false }).limit(500);
      all = r.data || [];
      render();
    }
    function render() {
      const q = document.getElementById('search').value.toLowerCase();
      const list = all.filter(n => !q || n.address_normalized.includes(q) || (n.ville||'').toLowerCase().includes(q) || n.category.includes(q) || n.note.toLowerCase().includes(q));
      const html = list.map(n => {
        const lbl = LABELS[n.category] || LABELS.autre;
        const date = new Date(n.created_at).toLocaleString('fr-CA');
        return `
          <div class="note-card">
            <div class="note-head">
              <div>
                <span class="pill" style="background:rgba(255,200,0,.15);color:#ffd700">${lbl.icon} ${lbl.name}</span>
                ${n.admin_validated ? '<span class="pill" style="background:rgba(0,255,159,.15);color:#7dffc1;margin-left:6px">✓ VALIDÉ</span>' : ''}
                ${n.admin_blocked ? '<span class="pill" style="background:rgba(255,90,90,.15);color:#ffb0b0;margin-left:6px">✗ BLOQUÉ</span>' : ''}
                <strong style="margin-left:10px">${n.address_original || n.address_normalized}</strong>
              </div>
              <div class="meta">Sévérité ${n.severity}/5 · ✓ ${n.validated_count} · ✗ ${n.contested_count} · ${date}</div>
            </div>
            <div style="color:#e8edf5;font-size:.92rem">${n.note}</div>
            <div class="actions">
              <button class="btn-sm" style="background:rgba(0,255,159,.15);color:#7dffc1;border:1px solid rgba(0,255,159,.4)" onclick="adminAction('${n.id}','validate')">✓ Valider</button>
              <button class="btn-sm" style="background:rgba(255,90,90,.15);color:#ffb0b0;border:1px solid rgba(255,90,90,.4)" onclick="adminAction('${n.id}','block')">⚠️ Bloquer</button>
              <button class="btn-sm" style="background:rgba(0,0,0,.3);color:#a8b0ba;border:1px solid #444" onclick="adminAction('${n.id}','delete')">🗑️ Supprimer</button>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('list').innerHTML = html || '<div class="empty">Aucune note.</div>';
    }
    async function adminAction(id, action) {
      if (action === 'delete' && !confirm('Supprimer cette note ?')) return;
      const res = await fetch('/api/address-intel-admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
        body: JSON.stringify({ intel_id: id, action })
      });
      if (!res.ok) { const o = await res.json().catch(()=>({})); alert('Erreur : ' + (o.error||'')); return; }
      const r = (window.getSupabaseClient?.() || window.supabase).from('address_intelligence').select('*').order('created_at', { ascending: false }).limit(500);
      all = (await r).data || [];
      render();
    }
    init();
  </script>
</body>
</html>
