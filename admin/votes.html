<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Votes communautaires — Admin</title>
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <style>
    body { padding: 24px; min-height: 100vh; background: #05080c; color: #fff; }
    .wrap { max-width: 960px; margin: 0 auto; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    h1 { margin: 0; }
    .panel { background: var(--brand-bg-surface); border: 1px solid var(--brand-border); border-radius: 14px; padding: 22px; margin-bottom: 18px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid label { display: block; font-size: .8rem; color: var(--brand-muted); margin-bottom: 4px; font-weight: 700; }
    .form-grid input, .form-grid textarea, .form-grid select { width: 100%; padding: 10px; background: #05080c; color: #fff; border: 1px solid #1E2535; border-radius: 8px; box-sizing: border-box; }
    .form-grid .span-2 { grid-column: span 2; }
    .org-check { padding: 10px 14px; background: #05080c; border: 1px solid #1E2535; border-radius: 8px; margin-bottom: 6px; display: flex; gap: 10px; cursor: pointer; }
    .org-check input { width: auto; margin: 0; }
    .vote-card { background: var(--brand-bg-surface); border: 1px solid var(--brand-border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .vote-card.ouvert { border-color: rgba(93,191,255,.4); }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: .7rem; font-weight: 800; }
    .badge.ouvert { background: rgba(93,191,255,.15); color: #7dffc1; }
    .badge.ferme { background: rgba(168,176,186,.15); color: #a8b0ba; }
    .btn-sm { padding: 8px 14px; border-radius: 8px; font-size: .85rem; font-weight: 700; cursor: pointer; border: none; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <h1>🗳️ Votes communautaires</h1>
      <a class="btn secondary" href="/admin/dashboard-admin.html">← Admin</a>
    </div>

    <div class="panel">
      <h2 style="margin:0 0 14px">+ Créer un nouveau vote</h2>
      <div class="form-grid">
        <div><label>Titre</label><input id="titre" placeholder="Vote du T1 2026"></div>
        <div><label>Période</label><input id="periode" placeholder="Q1 2026"></div>
        <div class="span-2"><label>Description</label><textarea id="description" rows="2" placeholder="Qui mérite le don ce trimestre ?"></textarea></div>
        <div><label>Montant total à répartir ($)</label><input id="montant" type="number" min="0" step="1" placeholder="500"></div>
        <div><label>Date de fermeture</label><input id="fin" type="datetime-local"></div>
        <div class="span-2"><label>Organismes éligibles</label><div id="orgs-checklist"></div></div>
      </div>
      <button class="btn-sm" style="background:linear-gradient(135deg,#5dbfff,#78d900);color:#071006;margin-top:14px" onclick="createVote()">🗳️ Lancer le vote (notif à tous)</button>
      <div id="create-msg" style="margin-top:10px;font-size:.85rem"></div>
    </div>

    <div class="panel">
      <h2 style="margin:0 0 14px">📋 Votes existants</h2>
      <div id="list"></div>
    </div>
  </main>

  <script>
    let session = null, db = null, orgs = [];
    async function init() {
      db = window.getSupabaseClient ? window.getSupabaseClient() : window.supabase;
      const { data: sess } = await db.auth.getSession();
      if (!sess?.session) { window.location.href = '/login.html'; return; }
      session = sess.session;
      const { data: prof } = await db.from('profiles').select('role').eq('id', session.user.id).single();
      if (prof?.role !== 'admin') { alert('Accès admin requis'); window.location.href = '/'; return; }
      const { data: o } = await db.from('organismes_partenaires').select('id,nom').eq('actif', true);
      orgs = o || [];
      document.getElementById('orgs-checklist').innerHTML = orgs.map(o => `<label class="org-check"><input type="checkbox" value="${o.id}" checked> ${o.nom}</label>`).join('');
      // Date default = +14 jours
      const d = new Date(Date.now() + 14*86400000);
      document.getElementById('fin').value = d.toISOString().slice(0,16);
      load();
    }
    async function load() {
      const { data } = await db.from('community_votes').select('*').order('cree_le', { ascending: false });
      const list = document.getElementById('list');
      if (!data?.length) { list.innerHTML = '<p style="color:var(--brand-muted)">Aucun vote.</p>'; return; }
      list.innerHTML = data.map(v => `
        <div class="vote-card ${v.statut}">
          <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;align-items:center">
            <div><strong>${v.titre}</strong> <span class="badge ${v.statut}">${v.statut}</span></div>
            <div style="color:var(--brand-muted);font-size:.85rem">${v.montant_total_cad} $ · jusqu'au ${new Date(v.fin).toLocaleDateString('fr-CA')}</div>
          </div>
          <div style="color:var(--brand-muted);font-size:.85rem;margin-top:6px">${v.description || ''}</div>
          ${v.statut === 'ouvert' ? `<button class="btn-sm" style="background:rgba(255,90,90,.15);color:#ffb0b0;border:1px solid rgba(255,90,90,.4);margin-top:10px" onclick="closeVote('${v.id}')">🔒 Fermer le vote</button>` : ''}
          ${v.resultats ? `<pre style="background:#05080c;padding:10px;border-radius:8px;margin-top:10px;font-size:.78rem;overflow:auto">${JSON.stringify(v.resultats, null, 2)}</pre>` : ''}
        </div>
      `).join('');
    }
    async function createVote() {
      const msg = document.getElementById('create-msg');
      const titre = document.getElementById('titre').value.trim();
      if (!titre) { msg.style.color = '#ffb0b0'; msg.textContent = '⚠️ Titre requis'; return; }
      const orgIds = Array.from(document.querySelectorAll('#orgs-checklist input:checked')).map(i => i.value);
      const payload = {
        titre, periode: document.getElementById('periode').value, description: document.getElementById('description').value,
        montant_total_cad: Number(document.getElementById('montant').value)||0,
        fin: new Date(document.getElementById('fin').value).toISOString(),
        organismes_ids: orgIds
      };
      const res = await fetch('/api/platform?endpoint=admin-vote-create', {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
        body: JSON.stringify(payload)
      });
      const out = await res.json().catch(() => ({}));
      if (!res.ok) { msg.style.color = '#ffb0b0'; msg.textContent = '❌ ' + (out.error || 'Erreur'); return; }
      msg.style.color = '#7dffc1';
      msg.textContent = '✅ Vote créé et notif envoyée à la communauté !';
      load();
    }
    async function closeVote(id) {
      if (!confirm('Fermer ce vote et calculer les résultats ?')) return;
      const res = await fetch('/api/platform?endpoint=admin-vote-close', {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
        body: JSON.stringify({ vote_id: id })
      });
      const out = await res.json().catch(() => ({}));
      alert(res.ok ? `✅ ${out.nb_votants} votants · Résultats calculés` : ('❌ ' + (out.error || 'Erreur')));
      load();
    }
    init();
  </script>
  <script src="/js/admin-alert-bell.js" defer></script>
</body>
</html>
