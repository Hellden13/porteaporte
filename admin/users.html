<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utilisateurs - Admin PorteàPorte</title>
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <style>
    body { padding: 24px; min-height: 100vh; }
    .wrap { max-width: 1280px; margin: 0 auto; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    h1 { margin: 0; }
    .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab { padding: 8px 14px; background: var(--brand-bg-surface); border: 1px solid var(--brand-border); border-radius: 8px; cursor: pointer; font-weight: 700; color: var(--brand-muted); font-size: .85rem; }
    .tab.active { background: var(--brand-lime); color: #071008; border-color: var(--brand-lime); }
    .tab .count { background: rgba(0,0,0,.15); padding: 2px 7px; border-radius: 999px; font-size: .7rem; margin-left: 6px; }
    .search { width: 100%; padding: 10px 14px; background: var(--brand-bg-surface); border: 1px solid var(--brand-border); border-radius: 8px; color: #fff; font-size: .9rem; margin-bottom: 14px; }
    .user-card { background: var(--brand-bg-surface); border: 1px solid var(--brand-border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
    .user-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; }
    .user-info { display: flex; gap: 12px; align-items: center; flex: 1; min-width: 200px; }
    .avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--brand-cyan), var(--brand-lime)); display: flex; align-items: center; justify-content: center; color: #001828; font-weight: 900; }
    .pill { display: inline-block; padding: 3px 9px; border-radius: 999px; font-size: .68rem; font-weight: 800; text-transform: uppercase; }
    .pill.verified { background: rgba(93,191,255,.15); color: #7dffc1; }
    .pill.pending { background: rgba(255,200,0,.15); color: #ffd700; }
    .pill.rejected { background: rgba(255,90,90,.15); color: #ffb0b0; }
    .pill.suspended { background: rgba(255,90,90,.25); color: #ff6b6b; }
    .pill.not_started { background: rgba(168,176,186,.15); color: #a8b0ba; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .btn-sm { padding: 7px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: .8rem; }
    .meta { color: var(--brand-muted); font-size: .82rem; }
    .empty { text-align: center; color: var(--brand-muted); padding: 40px; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <h1>👥 Gestion utilisateurs</h1>
      <a class="btn secondary" href="/admin/dashboard-admin.html">← Dashboard admin</a>
    </div>
    <input class="search" id="search" placeholder="🔍 Rechercher email, nom, ID..." oninput="render()">
    <div class="filters" id="filters"></div>
    <div id="list"><p class="empty">Les utilisateurs apparaitront ici quand la synchronisation sera terminee.</p></div>
  </main>

  <script>
    let all = [];
    let session = null;
    let currentTab = 'all';

    async function init() {
      const db = window.getSupabaseClient ? window.getSupabaseClient() : window.supabase;
      const { data: sess } = await db.auth.getSession();
      if (!sess?.session) { window.location.href = '/login.html'; return; }
      session = sess.session;
      const { data: prof } = await db.from('profiles').select('role').eq('id', session.user.id).single();
      if (prof?.role !== 'admin') { alert('Accès admin requis'); window.location.href = '/'; return; }

      const { data } = await db.from('profiles').select('id,email,prenom,nom,role,driver_status,verification_status,suspendu,cree_le,ville,stripe_identity_status').order('cree_le', { ascending: false });
      all = data || [];
      renderFilters();
      render();
    }

    function renderFilters() {
      const counts = {
        all: all.length,
        pending: all.filter(u => u.driver_status === 'pending_review').length,
        verified: all.filter(u => u.driver_status === 'verified').length,
        suspended: all.filter(u => u.suspendu).length,
        not_started: all.filter(u => !u.driver_status || u.driver_status === 'not_started').length,
        livreurs: all.filter(u => ['livreur','les deux'].includes(u.role)).length
      };
      const labels = {
        all: '📋 Tous',
        pending: '⏳ En attente',
        verified: '✅ Vérifiés',
        suspended: '🚫 Suspendus',
        not_started: '🆕 Nouveaux',
        livreurs: '🚗 Livreurs'
      };
      document.getElementById('filters').innerHTML = Object.entries(counts).map(([key, n]) => `
        <div class="tab ${currentTab === key ? 'active' : ''}" onclick="setTab('${key}')">${labels[key]} <span class="count">${n}</span></div>
      `).join('');
    }

    function setTab(tab) {
      currentTab = tab;
      renderFilters();
      render();
    }

    function render() {
      const q = document.getElementById('search').value.toLowerCase();
      let users = all;
      if (currentTab === 'pending') users = users.filter(u => u.driver_status === 'pending_review');
      else if (currentTab === 'verified') users = users.filter(u => u.driver_status === 'verified');
      else if (currentTab === 'suspended') users = users.filter(u => u.suspendu);
      else if (currentTab === 'not_started') users = users.filter(u => !u.driver_status || u.driver_status === 'not_started');
      else if (currentTab === 'livreurs') users = users.filter(u => ['livreur','les deux'].includes(u.role));
      if (q) users = users.filter(u => (u.email||'').toLowerCase().includes(q) || (u.prenom||'').toLowerCase().includes(q) || (u.nom||'').toLowerCase().includes(q) || (u.id||'').includes(q));

      const list = document.getElementById('list');
      if (!users.length) { list.innerHTML = '<div class="empty">Aucun utilisateur dans cette catégorie.</div>'; return; }
      list.innerHTML = users.map(u => {
        const nom = [u.prenom, u.nom].filter(Boolean).join(' ') || 'Sans nom';
        const init = (u.prenom?.[0] || u.email?.[0] || '?').toUpperCase();
        const date = u.cree_le ? new Date(u.cree_le).toLocaleDateString('fr-CA') : '—';
        return `
          <div class="user-card">
            <div class="user-head">
              <div class="user-info">
                <div class="avatar">${init}</div>
                <div>
                  <div style="font-weight:800">${nom} <span style="font-size:.7rem;color:#a8b0ba;font-weight:600">[${u.role||'?'}]</span></div>
                  <div class="meta">${u.email||''} · ${u.ville||'—'} · inscrit ${date}</div>
                </div>
              </div>
              <div style="display:flex;gap:6px;flex-wrap:wrap">
                ${u.driver_status ? `<span class="pill ${u.driver_status}">${u.driver_status}</span>` : ''}
                ${u.suspendu ? `<span class="pill suspended">SUSPENDU</span>` : ''}
                ${u.stripe_identity_status ? `<span class="pill ${u.stripe_identity_status === 'verified' ? 'verified' : 'pending'}">Stripe: ${u.stripe_identity_status}</span>` : ''}
              </div>
            </div>
            <div class="actions">
              ${u.driver_status === 'pending_review' ? `
                <button class="btn-sm" style="background:rgba(93,191,255,.15);color:#7dffc1;border:1px solid rgba(93,191,255,.4)" onclick="setStatus('${u.id}','verified')">✅ Approuver</button>
                <button class="btn-sm" style="background:rgba(255,90,90,.15);color:#ffb0b0;border:1px solid rgba(255,90,90,.4)" onclick="setStatus('${u.id}','rejected')">❌ Rejeter</button>
              ` : ''}
              ${!u.suspendu ? `
                <button class="btn-sm" style="background:rgba(255,150,0,.15);color:#ffb74d;border:1px solid rgba(255,150,0,.4)" onclick="toggleSuspend('${u.id}',true)">🚫 Suspendre</button>
              ` : `
                <button class="btn-sm" style="background:rgba(93,191,255,.15);color:#7dffc1;border:1px solid rgba(93,191,255,.4)" onclick="toggleSuspend('${u.id}',false)">✅ Réactiver</button>
              `}
              ${u.driver_status !== 'verified' && u.role && ['livreur','les deux'].includes(u.role) ? `
                <button class="btn-sm" style="background:rgba(0,217,255,.15);color:#7de4ff;border:1px solid rgba(0,217,255,.4)" onclick="setStatus('${u.id}','verified')">⚡ Force verified</button>
              ` : ''}
              <a class="btn-sm" style="background:rgba(93,191,255,.12);color:#5dbfff;border:1px solid rgba(93,191,255,.3);text-decoration:none" href="/livreur-card.html?id=${u.id}" target="_blank">🆔 Voir carte</a>
            </div>
          </div>
        `;
      }).join('');
    }

    async function setStatus(id, status) {
      if (!confirm('Changer le statut à "' + status + '" ?')) return;
      const db = window.getSupabaseClient ? window.getSupabaseClient() : window.supabase;
      const { error } = await db.from('profiles').update({ driver_status: status, verification_status: status === 'verified' ? 'verified' : (status === 'rejected' ? 'rejected' : 'pending') }).eq('id', id);
      if (error) { alert('Erreur : ' + error.message); return; }
      const u = all.find(x => x.id === id);
      if (u) { u.driver_status = status; }
      renderFilters();
      render();
    }

    async function toggleSuspend(id, suspend) {
      if (!confirm(suspend ? 'Suspendre cet utilisateur ?' : 'Réactiver cet utilisateur ?')) return;
      const db = window.getSupabaseClient ? window.getSupabaseClient() : window.supabase;
      const { error } = await db.from('profiles').update({ suspendu: suspend }).eq('id', id);
      if (error) { alert('Erreur : ' + error.message); return; }
      const u = all.find(x => x.id === id);
      if (u) u.suspendu = suspend;
      renderFilters();
      render();
    }

    init();
  </script>
  <script src="/js/admin-alert-bell.js" defer></script>
</body>
</html>
