<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>🗺️ Gestion des lieux safe — Admin</title>
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <link rel="stylesheet" href="/assets/a11y.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <style>
    body { padding:20px; min-height:100vh; background:#05080c; color:var(--brand-text); font-family:'Inter',system-ui,sans-serif; }
    .wrap { max-width:1280px; margin:0 auto; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:18px; }
    h1 { margin:0 0 4px; font-size:1.45rem; }
    .sub { color:var(--brand-muted); font-size:.9rem; margin-bottom:18px; }
    .btn { padding:9px 16px; background:linear-gradient(135deg,#5dbfff,#3da9ff); color:#051022; border:0; border-radius:8px; font-weight:800; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
    .btn.ghost { background:transparent; color:var(--brand-text); border:1px solid var(--brand-border); }
    .btn.sm { padding:5px 11px; font-size:.78rem; }
    .btn.danger { background:linear-gradient(135deg,#ff7a7a,#ff5252); color:#fff; }

    .filters { display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap; padding:14px 16px; background:var(--brand-bg-surface); border:1px solid var(--brand-border); border-radius:10px; }
    .filters input, .filters select { padding:8px 12px; background:var(--brand-bg-dark); color:var(--brand-text); border:1px solid var(--brand-border); border-radius:6px; font:inherit; }
    .filters label { font-size:.85rem; color:var(--brand-muted); display:flex; gap:6px; align-items:center; }

    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:18px; }
    .stat { background:var(--brand-bg-surface); border:1px solid var(--brand-border); border-radius:10px; padding:12px 14px; text-align:center; }
    .stat .val { font-size:1.5rem; font-weight:900; color:#5dbfff; line-height:1; }
    .stat .lbl { font-size:.72rem; color:var(--brand-muted); text-transform:uppercase; margin-top:4px; letter-spacing:.05em; }

    .table-wrap { background:var(--brand-bg-surface); border:1px solid var(--brand-border); border-radius:10px; overflow:auto; }
    table { width:100%; border-collapse:collapse; min-width:900px; }
    th { background:rgba(255,255,255,.04); color:var(--brand-muted); font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; padding:9px 11px; text-align:left; font-weight:700; }
    td { padding:10px 11px; font-size:.85rem; border-top:1px solid var(--brand-border); }
    tr:hover td { background:rgba(255,255,255,.02); }
    .pill { display:inline-block; padding:2px 8px; border-radius:99px; font-size:.7rem; font-weight:700; }
    .pill.verified { background:rgba(125,255,193,.12); color:#7dffc1; }
    .pill.inactive { background:rgba(255,90,90,.12); color:#ff7a7a; }
    .row-actions { display:flex; gap:6px; }

    /* Modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.85); backdrop-filter:blur(8px); z-index:9990; display:none; align-items:flex-start; justify-content:center; padding:30px 16px; overflow-y:auto; }
    .modal-overlay.open { display:flex; }
    .modal { background:#0a0f17; border:1px solid var(--brand-border); border-radius:14px; padding:24px 28px; max-width:680px; width:100%; }
    .modal h2 { margin:0 0 16px; font-size:1.15rem; }
    .modal .field { margin-bottom:12px; }
    .modal label { display:block; font-size:.78rem; font-weight:700; color:var(--brand-muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:.04em; }
    .modal input, .modal select, .modal textarea { width:100%; padding:9px 12px; background:#05080c; color:var(--brand-text); border:1px solid var(--brand-border); border-radius:6px; font:inherit; box-sizing:border-box; }
    .modal .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .modal .row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
    .modal .check-row { display:flex; gap:14px; flex-wrap:wrap; margin:8px 0; font-size:.88rem; }
    .modal .check-row label { display:flex; gap:6px; align-items:center; text-transform:none; letter-spacing:0; font-size:.88rem; color:var(--brand-text); cursor:pointer; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; padding-top:14px; border-top:1px solid var(--brand-border); }

    .empty { text-align:center; padding:40px; color:var(--brand-muted); }
  </style>
</head>
<body>

<main class="wrap">
  <div class="topbar">
    <div>
      <h1>🗺️ Gestion des lieux safe</h1>
      <div class="sub">Ajoute, modifie ou désactive des lieux de rencontre sécuritaires.</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="openModal()">+ Nouveau lieu</button>
      <button class="btn ghost sm" onclick="loadList()">🔄 Rafraîchir</button>
      <a class="btn ghost sm" href="/admin/dashboard-admin.html">← Admin</a>
    </div>
  </div>

  <div class="filters">
    <label>Ville : <input id="filter-city" type="text" placeholder="Ex: Québec" oninput="debouncedReload()"></label>
    <label><input type="checkbox" id="filter-inactive" onchange="loadList()"> Inclure désactivés</label>
    <div style="margin-left:auto;color:var(--brand-muted);font-size:.78rem" id="last-load">—</div>
  </div>

  <div class="stats" id="stats"></div>

  <div id="content">
    <div class="empty">⏳ Chargement…</div>
  </div>
</main>

<!-- Modal édition -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title">Nouveau lieu</h2>
    <input type="hidden" id="pt-id">
    <div class="row2">
      <div class="field">
        <label>Ville *</label>
        <input id="pt-city" type="text" placeholder="Québec" required>
      </div>
      <div class="field">
        <label>Secteur / Quartier</label>
        <input id="pt-sector" type="text" placeholder="Sainte-Foy">
      </div>
    </div>
    <div class="field">
      <label>Nom du lieu *</label>
      <input id="pt-name" type="text" placeholder="Tim Hortons Bd Laurier" required>
    </div>
    <div class="field">
      <label>Adresse complète *</label>
      <input id="pt-address" type="text" placeholder="2700 Bd Laurier, Québec, QC G1V 2L8" required>
    </div>
    <div class="row3">
      <div class="field">
        <label>Latitude *</label>
        <input id="pt-lat" type="number" step="0.000001" placeholder="46.7800" required>
      </div>
      <div class="field">
        <label>Longitude *</label>
        <input id="pt-lng" type="number" step="0.000001" placeholder="-71.2700" required>
      </div>
      <div class="field">
        <label>Type</label>
        <select id="pt-type">
          <option value="restaurant">☕ Restaurant</option>
          <option value="commerce">🛒 Commerce</option>
          <option value="station_essence">⛽ Station essence</option>
          <option value="gare">🚆 Gare</option>
          <option value="metro">🚇 Métro</option>
          <option value="stationnement">🅿️ Stationnement</option>
          <option value="autre">📍 Autre</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Heures d'ouverture</label>
      <input id="pt-hours" type="text" placeholder="24/7  ou  Lun-Dim 7h-23h">
    </div>
    <div class="field">
      <label>Notes (visible aux users)</label>
      <textarea id="pt-notes" rows="2" placeholder="Ex: Grand stationnement, accès Route 116"></textarea>
    </div>
    <div class="field">
      <label>URL photo (optionnel)</label>
      <input id="pt-photo" type="url" placeholder="https://...">
    </div>
    <div class="check-row">
      <label><input id="pt-cameras" type="checkbox"> 📹 Caméras</label>
      <label><input id="pt-lit" type="checkbox" checked> 💡 Bien éclairé</label>
      <label><input id="pt-parking" type="checkbox" checked> 🅿️ Stationnement gratuit</label>
      <label><input id="pt-verified" type="checkbox" checked> ✓ Vérifié</label>
      <label><input id="pt-active" type="checkbox" checked> ✅ Actif</label>
    </div>

    <p style="font-size:.78rem;color:var(--brand-muted);margin-top:14px">💡 Astuce : récupère lat/lng en clic-droit sur <a href="https://www.google.com/maps" target="_blank" style="color:#5dbfff">Google Maps</a> → 1er menu = coordonnées copiables.</p>

    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal()">Annuler</button>
      <button class="btn" id="save-btn" onclick="savePoint()">💾 Sauvegarder</button>
    </div>
  </div>
</div>

<script src="/js/admin-alert-bell.js" defer></script>

<script>
  const db = window.db || window.getSupabaseClient();
  let allPoints = [];
  let _reloadTimer = null;

  function debouncedReload() {
    clearTimeout(_reloadTimer);
    _reloadTimer = setTimeout(loadList, 350);
  }

  function esc(s) { return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
  const TYPE_ICON = { restaurant:'☕', commerce:'🛒', station_essence:'⛽', gare:'🚆', metro:'🚇', stationnement:'🅿️', autre:'📍' };

  async function loadList() {
    const { data: { session } } = await db.auth.getSession();
    if (!session) { location.href = '/login.html?next=' + encodeURIComponent(location.pathname); return; }

    const city = document.getElementById('filter-city').value.trim();
    const includeInactive = document.getElementById('filter-inactive').checked;

    document.getElementById('content').innerHTML = '<div class="empty">⏳ Chargement…</div>';
    try {
      const r = await fetch('/api/platform?endpoint=admin-safe-points-list', {
        method: 'POST',
        headers: { 'Content-Type':'application/json', Authorization: 'Bearer ' + session.access_token },
        body: JSON.stringify({ endpoint: 'admin-safe-points-list', city, include_inactive: includeInactive })
      });
      const d = await r.json();
      if (!r.ok) { document.getElementById('content').innerHTML = '<div class="empty">⚠️ ' + (d.error||r.status) + '</div>'; return; }
      allPoints = d.points || [];
      renderStats(d);
      renderTable(allPoints);
      document.getElementById('last-load').textContent = 'MAJ ' + new Date().toLocaleTimeString('fr-CA');
    } catch (e) {
      document.getElementById('content').innerHTML = '<div class="empty">⚠️ ' + e.message + '</div>';
    }
  }

  function renderStats(d) {
    const cityChips = Object.entries(d.by_city || {})
      .sort((a,b) => b[1]-a[1])
      .map(([city, n]) => '<div class="stat"><div class="val">' + n + '</div><div class="lbl">' + esc(city) + '</div></div>')
      .join('');
    document.getElementById('stats').innerHTML =
      '<div class="stat" style="border-color:#5dbfff"><div class="val">' + d.total + '</div><div class="lbl">Total</div></div>' +
      cityChips;
  }

  function renderTable(points) {
    if (!points.length) {
      document.getElementById('content').innerHTML = '<div class="empty">Aucun lieu trouvé. <button class="btn sm" onclick="openModal()">+ En ajouter un</button></div>';
      return;
    }
    const rows = points.map(p => {
      const gmaps = 'https://www.google.com/maps?q=' + p.lat + ',' + p.lng;
      const pills = [];
      if (!p.active) pills.push('<span class="pill inactive">Désactivé</span>');
      if (p.verified) pills.push('<span class="pill verified">✓ Vérifié</span>');
      return '<tr>' +
        '<td>' + (TYPE_ICON[p.type]||'📍') + ' <strong>' + esc(p.name) + '</strong><br><span style="color:var(--brand-muted);font-size:.78rem">' + esc(p.address) + '</span></td>' +
        '<td>' + esc(p.city) + (p.sector ? '<br><span style="color:var(--brand-muted);font-size:.78rem">' + esc(p.sector) + '</span>' : '') + '</td>' +
        '<td><a href="' + gmaps + '" target="_blank" style="color:#5dbfff;font-family:monospace;font-size:.78rem">' + p.lat.toFixed(4) + ', ' + p.lng.toFixed(4) + '</a></td>' +
        '<td style="font-size:.78rem">' + (p.hours || '—') + '</td>' +
        '<td>' + pills.join(' ') + '</td>' +
        '<td><div class="row-actions">' +
          '<button class="btn sm ghost" onclick="editPoint(\'' + p.id + '\')">✏️ Modifier</button>' +
          '<button class="btn sm danger" onclick="deletePoint(\'' + p.id + '\', \'' + esc(p.name) + '\')">🗑️</button>' +
        '</div></td>' +
      '</tr>';
    }).join('');
    document.getElementById('content').innerHTML =
      '<div class="table-wrap"><table><thead><tr><th>Lieu</th><th>Ville / Secteur</th><th>GPS</th><th>Horaires</th><th>Statuts</th><th></th></tr></thead><tbody>' + rows + '</tbody></table></div>';
  }

  function openModal() {
    document.getElementById('modal-title').textContent = 'Nouveau lieu';
    ['pt-id','pt-city','pt-sector','pt-name','pt-address','pt-lat','pt-lng','pt-hours','pt-notes','pt-photo'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('pt-type').value = 'restaurant';
    document.getElementById('pt-cameras').checked = false;
    document.getElementById('pt-lit').checked = true;
    document.getElementById('pt-parking').checked = true;
    document.getElementById('pt-verified').checked = true;
    document.getElementById('pt-active').checked = true;
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function editPoint(id) {
    const p = allPoints.find(x => x.id === id);
    if (!p) return;
    document.getElementById('modal-title').textContent = '✏️ Modifier : ' + p.name;
    document.getElementById('pt-id').value = p.id;
    document.getElementById('pt-city').value = p.city || '';
    document.getElementById('pt-sector').value = p.sector || '';
    document.getElementById('pt-name').value = p.name || '';
    document.getElementById('pt-address').value = p.address || '';
    document.getElementById('pt-lat').value = p.lat || '';
    document.getElementById('pt-lng').value = p.lng || '';
    document.getElementById('pt-type').value = p.type || 'autre';
    document.getElementById('pt-hours').value = p.hours || '';
    document.getElementById('pt-notes').value = p.notes || '';
    document.getElementById('pt-photo').value = p.photo_url || '';
    document.getElementById('pt-cameras').checked = !!p.has_cameras;
    document.getElementById('pt-lit').checked = p.well_lit !== false;
    document.getElementById('pt-parking').checked = p.parking_free !== false;
    document.getElementById('pt-verified').checked = p.verified !== false;
    document.getElementById('pt-active').checked = p.active !== false;
    document.getElementById('modal').classList.add('open');
  }

  async function savePoint() {
    const btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = '⏳ Sauvegarde…';
    try {
      const { data: { session } } = await db.auth.getSession();
      const id = document.getElementById('pt-id').value;
      const point = {
        ...(id ? { id } : {}),
        city: document.getElementById('pt-city').value.trim(),
        sector: document.getElementById('pt-sector').value.trim() || null,
        name: document.getElementById('pt-name').value.trim(),
        address: document.getElementById('pt-address').value.trim(),
        lat: parseFloat(document.getElementById('pt-lat').value),
        lng: parseFloat(document.getElementById('pt-lng').value),
        type: document.getElementById('pt-type').value,
        hours: document.getElementById('pt-hours').value.trim() || null,
        notes: document.getElementById('pt-notes').value.trim() || null,
        photo_url: document.getElementById('pt-photo').value.trim() || null,
        has_cameras: document.getElementById('pt-cameras').checked,
        well_lit: document.getElementById('pt-lit').checked,
        parking_free: document.getElementById('pt-parking').checked,
        verified: document.getElementById('pt-verified').checked,
        active: document.getElementById('pt-active').checked
      };
      const r = await fetch('/api/platform?endpoint=admin-safe-points-upsert', {
        method: 'POST',
        headers: { 'Content-Type':'application/json', Authorization: 'Bearer ' + session.access_token },
        body: JSON.stringify({ endpoint: 'admin-safe-points-upsert', point })
      });
      const d = await r.json();
      if (!r.ok) { alert('❌ ' + (d.error || r.status) + (d.details ? '\n' + d.details : '')); return; }
      closeModal();
      loadList();
    } catch (e) {
      alert('❌ ' + e.message);
    } finally {
      btn.disabled = false; btn.textContent = '💾 Sauvegarder';
    }
  }

  async function deletePoint(id, name) {
    if (!confirm('Désactiver "' + name + '" ?\n(Les nouveaux trajets ne pourront plus le choisir.\nLes trajets existants l\'affichent toujours.)')) return;
    try {
      const { data: { session } } = await db.auth.getSession();
      const r = await fetch('/api/platform?endpoint=admin-safe-points-delete', {
        method: 'POST',
        headers: { 'Content-Type':'application/json', Authorization: 'Bearer ' + session.access_token },
        body: JSON.stringify({ endpoint: 'admin-safe-points-delete', id })
      });
      const d = await r.json();
      if (!r.ok) { alert('❌ ' + (d.error || r.status)); return; }
      loadList();
    } catch (e) {
      alert('❌ ' + e.message);
    }
  }

  loadList();
</script>

</body>
</html>
