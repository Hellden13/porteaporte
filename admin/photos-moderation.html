<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modération photos — Admin PorteàPorte</title>
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <style>
    body { background:#0a0c10; color:#e9edf4; font-family:system-ui,sans-serif; margin:0; padding:24px; }
    .wrap { max-width:1100px; margin:0 auto; }
    h1 { color:#5dbfff; margin:0 0 8px; }
    .sub { color:#888; margin-bottom:24px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:18px; }
    .card { background:#13182a; border:1px solid #2a3142; border-radius:14px; overflow:hidden; }
    .card .photo { width:100%; height:260px; object-fit:cover; background:#222; cursor:pointer; }
    .card .info { padding:14px; }
    .card .name { font-weight:800; font-size:1rem; margin-bottom:4px; }
    .card .meta { font-size:.78rem; color:#888; margin-bottom:8px; }
    .card .actions { display:flex; gap:8px; padding:0 14px 14px; }
    .card .actions button { flex:1; padding:10px; border:0; border-radius:8px; font-weight:800; cursor:pointer; font-size:.9rem; }
    .btn-approve { background:linear-gradient(135deg,#7fe5a3,#4caf50); color:#0a2a14; }
    .btn-reject  { background:linear-gradient(135deg,#ff8c8c,#e74c3c); color:#fff; }
    .empty { text-align:center; padding:60px 20px; color:#888; font-size:1.05rem; }
    .empty .em { font-size:3rem; margin-bottom:14px; }
    .stat { background:#1a2a3a; padding:12px 18px; border-radius:10px; margin-bottom:20px; display:inline-block; }
    .stat strong { color:#5dbfff; font-size:1.5rem; margin-right:6px; }
    a.back { color:#888; text-decoration:none; }
    a.back:hover { color:#5dbfff; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.85); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
    .modal img { max-width:100%; max-height:90vh; border-radius:12px; }
    .modal.open { display:flex; cursor:pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/admin/dashboard-admin.html">← Tableau de bord admin</a>
    <h1>📸 Modération des photos de profil</h1>
    <p class="sub">Approuve ou rejette les photos soumises. Les photos rejetées sont supprimées du profil.</p>
    <div class="stat"><strong id="count">—</strong> en attente</div>
    <div id="grid" class="grid"><div class="empty">Chargement…</div></div>
  </div>

  <div class="modal" id="modal" onclick="this.classList.remove('open')">
    <img id="modal-img" src="" alt="">
  </div>

  <script>
    let session = null;
    function openModal(src) {
      document.getElementById('modal-img').src = src;
      document.getElementById('modal').classList.add('open');
    }
    async function load() {
      const db = window.getSupabaseClient && window.getSupabaseClient();
      if (!db) { alert('Supabase non chargé'); return; }
      const { data: { session: s } } = await db.auth.getSession();
      if (!s) { location.href = '/login.html?redirect=/admin/photos-moderation.html'; return; }
      session = s;
      try {
        const r = await fetch('/api/platform?endpoint=admin-photos-pending', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + s.access_token },
          body: JSON.stringify({ endpoint: 'admin-photos-pending' })
        });
        const d = await r.json();
        if (!r.ok) { alert('Erreur : ' + (d.error || r.status)); return; }
        const totalCount = (d.count || 0) + (d.count_pets || 0);
        document.getElementById('count').textContent = totalCount;
        renderGrid(d.pending || [], d.pending_pets || []);
      } catch (e) { alert('Erreur : ' + e.message); }
    }
    function renderGrid(profileItems, petItems) {
      const grid = document.getElementById('grid');
      if (!profileItems.length && !petItems.length) {
        grid.innerHTML = '<div class="empty"><div class="em">🎉</div>Aucune photo en attente de modération !</div>';
        return;
      }
      const profileCards = profileItems.map(p => {
        const name = (p.prenom || '') + ' ' + (p.nom || '');
        const role = p.role === 'admin' ? '🛡️ Admin' : (p.role === 'livreur' ? '🚗 Livreur' : '👤 Membre');
        const dateStr = p.photo_submitted_at ? new Date(p.photo_submitted_at).toLocaleDateString('fr-CA', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
        const safePhoto = String(p.photo_url || '').replace(/'/g, '');
        const safeId = String(p.id || '').replace(/'/g, '');
        return `
          <div class="card" data-id="${safeId}" data-kind="profile">
            <div style="background:#5dbfff;color:#051022;padding:6px 12px;font-size:.72rem;font-weight:900;text-transform:uppercase;">👤 Photo profil</div>
            <img class="photo" src="${safePhoto}" alt="Photo de ${name}" onclick="openModal('${safePhoto}')" onerror="this.style.background='#3a1414';this.alt='Image non chargée'">
            <div class="info">
              <div class="name">${name.trim() || 'Sans nom'}</div>
              <div class="meta">${role} · ${p.ville || 'Ville inconnue'} · ${dateStr}</div>
            </div>
            <div class="actions">
              <button class="btn-reject" onclick="moderate('${safeId}', 'reject', 'profile')">✗ Refuser</button>
              <button class="btn-approve" onclick="moderate('${safeId}', 'approve', 'profile')">✓ Approuver</button>
            </div>
          </div>
        `;
      }).join('');
      const petCards = petItems.map(p => {
        const name = (p.prenom || '') + ' ' + (p.nom || '');
        const petInfo = [p.pet_name, p.pet_species, p.pet_breed].filter(Boolean).join(' · ') || 'Animal';
        const safePhoto = String(p.pet_photo_url || '').replace(/'/g, '');
        const safeId = String(p.id || '').replace(/'/g, '');
        return `
          <div class="card" data-id="${safeId}" data-kind="pet">
            <div style="background:#ffd166;color:#1a1100;padding:6px 12px;font-size:.72rem;font-weight:900;text-transform:uppercase;">🐾 Photo animal</div>
            <img class="photo" src="${safePhoto}" alt="Animal de ${name}" onclick="openModal('${safePhoto}')" onerror="this.style.background='#3a1414';this.alt='Image non chargée'">
            <div class="info">
              <div class="name">${petInfo}</div>
              <div class="meta">Passager : ${name.trim() || 'Anonyme'}</div>
            </div>
            <div class="actions">
              <button class="btn-reject" onclick="moderate('${safeId}', 'reject', 'pet')">✗ Refuser</button>
              <button class="btn-approve" onclick="moderate('${safeId}', 'approve', 'pet')">✓ Approuver</button>
            </div>
          </div>
        `;
      }).join('');
      grid.innerHTML = profileCards + petCards;
    }
    async function moderate(userId, action, kind) {
      let reason = '';
      if (action === 'reject') {
        reason = prompt('Raison du refus (optionnel) :') || '';
      } else {
        if (!confirm('Approuver cette photo ? Elle sera visible aux autres utilisateurs.')) return;
      }
      try {
        const body = { endpoint: 'admin-photo-moderate', user_id: userId, action, reason };
        if (kind === 'pet') body.kind = 'pet';
        const r = await fetch('/api/platform?endpoint=admin-photo-moderate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + session.access_token },
          body: JSON.stringify(body)
        });
        const d = await r.json();
        if (!r.ok) { alert('Erreur : ' + (d.error || r.status)); return; }
        // Retire la carte
        const card = document.querySelector('.card[data-id="' + userId + '"]');
        if (card) card.remove();
        const countEl = document.getElementById('count');
        countEl.textContent = Math.max(0, parseInt(countEl.textContent, 10) - 1);
        if (parseInt(countEl.textContent, 10) === 0) {
          document.getElementById('grid').innerHTML = '<div class="empty"><div class="em">🎉</div>Aucune photo en attente de modération !</div>';
        }
      } catch (e) { alert('Erreur : ' + e.message); }
    }
    load();
  </script>
</body>
</html>
