<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vérification livreur - PorteàPorte</title>
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <link rel="stylesheet" href="/assets/visual-polish.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/modal-helper.js"></script>
  <style>
    body{padding:24px}
    .wrap{max-width:900px;margin:0 auto}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:24px}
    .brand{text-decoration:none;font-size:1.25rem}
    .panel{background:var(--brand-bg-surface);border:1px solid var(--brand-border);border-radius:10px;padding:24px;margin-bottom:16px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
    label{display:grid;gap:7px;font-weight:700;color:var(--brand-text)}
    .hint{color:var(--brand-muted);line-height:1.6}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    .btn{display:inline-flex;width:auto;text-decoration:none}
    .state-panel{display:none}
    .state-panel.show{display:block}
    .state-title{font-size:1.35rem;font-weight:900;margin:0 0 8px}
    .state-note{color:var(--brand-muted);line-height:1.6;margin:0}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <a class="brand" href="/index.html">PorteàPorte</a>
      <a class="btn secondary" id="driverDashboardLink" href="/dashboard-livreur.html">Dashboard</a>
    </div>

    <section class="panel">
      <h1>Vérification livreur</h1>
      <p class="hint">Pour protéger les expéditeurs, les colis et les adresses, un livreur doit être vérifié avant de voir les vraies missions. Pour la livraison à pied ou à vélo, un permis de conduire n'est pas obligatoire.</p>
    </section>

    <section id="verificationState" class="panel state-panel" aria-live="polite"></section>

    <form id="driverForm" class="panel">
      <div class="grid">
        <label>Prénom
          <input id="prenom" name="prenom" autocomplete="given-name" required>
        </label>
        <label>Nom
          <input id="nom" name="nom" autocomplete="family-name" required>
        </label>
        <label>Téléphone
          <input id="telephone" name="telephone" autocomplete="tel" required>
        </label>
        <label>Ville principale
          <input id="ville" name="ville" autocomplete="address-level2" required>
        </label>
        <label>Province
          <select id="province" name="province">
            <option value="QC">Québec</option>
            <option value="ON">Ontario</option>
            <option value="NB">Nouveau-Brunswick</option>
          </select>
        </label>
        <label>Mode de livraison
          <select id="transport_mode" name="transport_mode">
            <option value="walking">À pied</option>
            <option value="bike">Vélo</option>
            <option value="car">Auto</option>
            <option value="van">Fourgonnette</option>
          </select>
        </label>
      </div>

      <label style="margin-top:14px">
        Zone ou trajet habituel
        <textarea id="trajet" name="trajet" rows="4" placeholder="Exemple : Rosemont, Plateau, centre-ville Montréal"></textarea>
      </label>

      <label style="margin-top:14px;display:flex;grid-template-columns:auto 1fr;align-items:flex-start;gap:10px;font-weight:500">
        <input id="consent" type="checkbox" required style="width:auto;margin-top:4px">
        <span>J'accepte les conditions livreur et je consens à la vérification de mon profil.</span>
      </label>

      <div class="actions">
        <button class="btn" type="submit">Envoyer ma vérification</button>
        <a class="btn secondary" href="/profile.html">Mon profil</a>
      </div>
    </form>
  </main>

  <script>
    const db = window.getSupabaseClient ? window.getSupabaseClient() : window.supabase;
    const form = document.getElementById('driverForm');
    const statePanel = document.getElementById('verificationState');

    function renderState(profile) {
      if (!statePanel || !profile) return;
      const status = profile.driver_status || 'not_started';
      const isDriverRole = ['livreur', 'les deux', 'admin'].includes(profile.role);
      let html = '';

      if (profile.role === 'admin') {
        html = '<div class="state-title">Acces admin detecte</div><p class="state-note">Ton compte admin peut ouvrir les outils d administration ou les espaces de test.</p><div class="actions"><a class="btn" href="/admin/dashboard-admin.html">Dashboard admin</a><a class="btn secondary" href="/dashboard-livreur.html">Espace livreur</a></div>';
      } else if (!isDriverRole) {
        html = '<div class="state-title">Ajouter le role livreur</div><p class="state-note">Ton compte est expediteur. Remplis ce formulaire pour demander aussi l acces livreur.</p>';
      } else if (status === 'verified') {
        html = '<div class="state-title">Profil livreur verifie</div><p class="state-note">Ton profil est actif. Tu peux voir les missions compatibles avec ton mode de transport.</p><div class="actions"><a class="btn" href="/dashboard-livreur.html">Ouvrir mon dashboard livreur</a><a class="btn secondary" href="/profile.html">Mon profil</a></div>';
        form.style.display = 'none';
      } else if (status === 'pending_review') {
        html = '<div class="state-title">Dossier en revision</div><p class="state-note">Ta demande livreur est envoyee. Les vraies missions et les adresses restent bloquees jusqu a validation admin.</p><div class="actions"><a class="btn secondary" href="/dashboard-expediteur.html">Espace expediteur</a><a class="btn secondary" href="/profile.html">Mon profil</a></div>';
        form.style.display = 'none';
      } else if (status === 'rejected') {
        html = '<div class="state-title">Verification a reprendre</div><p class="state-note">Ton dossier doit etre corrige. Mets tes informations a jour puis renvoie la demande.</p>';
      }

      if (html) {
        statePanel.innerHTML = html;
        statePanel.classList.add('show');
      }
    }

    async function init() {
      const { data } = await db.auth.getSession();
      if (!data || !data.session) {
        window.location.href = '/login.html';
        return;
      }
      const user = data.session.user;
      const { data: profile } = await db.from('profiles').select('*').eq('id', user.id).single();
      const dash = document.getElementById('driverDashboardLink');
      if (dash && profile && profile.role !== 'admin' && profile.driver_status !== 'verified') {
        dash.textContent = profile.driver_status === 'pending_review' ? 'Dossier en revision' : 'Verification';
        dash.href = profile.driver_status === 'pending_review' ? '#verificationState' : '#driverForm';
        dash.setAttribute('aria-disabled', 'true');
      }
      if (profile && !['livreur', 'les deux', 'admin'].includes(profile.role)) {
        showError('Ton compte est encore seulement expéditeur. En envoyant ce formulaire, on ajoute aussi le rôle livreur à ton profil.');
      }
      if (profile) {
        renderState(profile);
        document.getElementById('prenom').value = profile.prenom || '';
        document.getElementById('nom').value = profile.nom || '';
        document.getElementById('telephone').value = profile.telephone || '';
        document.getElementById('ville').value = profile.ville || '';
        document.getElementById('province').value = profile.province || 'QC';
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const { data } = await db.auth.getSession();
      if (!data || !data.session) {
        window.location.href = '/login.html';
        return;
      }

      const roleRes = await fetch('/api/platform?endpoint=set-role', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + data.session.access_token
        },
        body: JSON.stringify({ role: 'livreur' })
      });
      if (!roleRes.ok) {
        const roleResult = await roleRes.json().catch(() => ({}));
        showError(roleResult.error || 'Impossible d’ajouter le rôle livreur pour le moment.');
        return;
      }

      const body = {
        prenom: document.getElementById('prenom').value.trim(),
        nom: document.getElementById('nom').value.trim(),
        telephone: document.getElementById('telephone').value.trim(),
        ville: document.getElementById('ville').value.trim(),
        province: document.getElementById('province').value,
        vehicule: document.getElementById('transport_mode').value,
        transport_mode: document.getElementById('transport_mode').value,
        trajet: document.getElementById('trajet').value.trim(),
        consent_accepted: form.consent.checked
      };

      const res = await fetch('/api/platform?endpoint=submit-driver-verification', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + data.session.access_token
        },
        body: JSON.stringify(body)
      });
      const result = await res.json().catch(() => ({}));
      if (!res.ok) {
        showError(result.error || 'Vérification impossible pour le moment.');
        return;
      }
      showSuccess('Demande envoyée. Ton profil livreur est maintenant en révision.');
      setTimeout(() => { window.location.href = '/livreur.html'; }, 1200);
    });

    init();
  </script>
  <script src="/js/support-widget.js"></script>
  <script src="/js/app-launcher.js" defer></script>
</body>
</html>
