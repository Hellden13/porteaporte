<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — PorteàPorte</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:radial-gradient(ellipse at center, rgba(93,191,255,.08) 0%, #05080c 70%); color:#fff; padding:20px; font-family:Inter,Arial,sans-serif; }
    .card { max-width:520px; text-align:center; padding:40px 30px; }
    .num { font-size:clamp(5rem, 18vw, 9rem); font-weight:900; line-height:1; margin:0 0 10px; background:linear-gradient(135deg,#00d9ff,#5dbfff); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    h1 { margin:0 0 14px; font-size:1.8rem; }
    p { color:#a8b0ba; line-height:1.7; margin:0 0 28px; }
    .btn-grid { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
    .btn { padding:14px 26px; border-radius:12px; text-decoration:none; font-weight:900; }
    .primary { background:linear-gradient(135deg,#00d9ff,#5dbfff); color:#001828; }
    .ghost { border:1px solid #1E2535; color:#fff; background:transparent; }
  </style>
</head>
<body>
  <div class="card">
    <div class="num">404</div>
    <h1>🧭 Page introuvable</h1>
    <p>Cette page a peut-être déménagé, ou n'a jamais existé. Pas de panique — on te ramène au bon endroit.</p>
    <div class="btn-grid">
      <a href="/" class="btn primary">🏠 Accueil</a>
      <a href="/faq.html" class="btn ghost">❓ FAQ</a>
      <a href="/contact.html" class="btn ghost">📧 Contact</a>
    </div>
    <p style="margin-top:32px;font-size:.78rem;color:#6d7886">Bêta — PorteàPorte construit avec 🤍 au Québec</p>
  </div>
</body>
</html>
