<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - PorteaPorte</title>
  <link rel="stylesheet" href="design-system.css">
  <link rel="stylesheet" href="/assets/brand-uniform.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/modal-helper.js"></script>
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg);
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
    }
    
    .login-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: var(--spacing-xl);
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .login-card h1 {
      color: var(--accent);
      margin-bottom: var(--spacing-lg);
      font-size: 28px;
      text-align: center;
    }
    
    .form-group {
      margin-bottom: var(--spacing-lg);
    }
    
    .form-group label {
      display: block;
      color: var(--text-primary);
      margin-bottom: var(--spacing-sm);
      font-weight: 600;
    }
    
    .form-group input {
      width: 100%;
      padding: var(--spacing-md);
      background: var(--bg-primary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 16px;
      transition: border-color 0.2s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .login-btn {
      width: 100%;
      padding: var(--spacing-md);
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .login-btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }
    
    .login-btn:active {
      transform: translateY(0);
    }
    
    .signup-link {
      text-align: center;
      margin-top: var(--spacing-lg);
      color: var(--text-primary);
    }
    
    .signup-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    
    .signup-link a:hover {
      text-decoration: underline;
    }
    
    .back-link {
      text-align: center;
      margin-bottom: var(--spacing-lg);
    }
    
    .back-link a {
      color: var(--text-primary);
      text-decoration: none;
      transition: color 0.2s;
    }
    
    .back-link a:hover {
      color: var(--accent);
    }
    
    .loading {
      display: none;
      text-align: center;
      color: var(--accent);
    }
    
    @media (max-width: 480px) {
      .login-card {
        padding: var(--spacing-lg);
      }
      
      .login-card h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="back-link">
        <a href="index.html">← Retour</a>
      </div>
      
      <h1>Connexion</h1>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="votre@email.com">
        </div>
        
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>
        
        <button type="submit" class="login-btn" id="loginBtn">Se connecter</button>
        <div class="loading" id="loading">Connexion en cours...</div>
      </form>
      
      <div class="signup-link">
        Pas encore inscrit? <a href="role-choice.html">S'inscrire</a>
      </div>
    </div>
  </div>

  <script>
    const db = window.supabase;
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      document.getElementById('loginBtn').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      
      try {
        const { data, error } = await db.auth.signInWithPassword({
          email,
          password
        });
        
        if (error) throw error;
        
        window.showSuccess('Connexion reussie!');
        setTimeout(() => {
          window.location = '/dashboard-livreur.html';
        }, 1500);
        
      } catch (error) {
        window.showError('Erreur: ' + error.message);
        document.getElementById('loginBtn').style.display = 'block';
        document.getElementById('loading').style.display = 'none';
      }
    });
  </script>
</body>
</html>
